name: Trello Tasks Manager

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'setup | add-card | read-status'
        required: true
        default: read-status
      card_name:
        description: 'Card title (for add-card)'
        required: false
        default: ''
      card_desc:
        description: 'Card description / answer (for add-card)'
        required: false
        default: ''
      list_name:
        description: 'Target list name (for add-card)'
        required: false
        default: '📋 Мне сделать'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Install requests
        run: pip install requests -q

      - name: Run Trello action
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
          GH_REPO: ${{ github.repository }}
          ACTION: ${{ inputs.action }}
          CARD_NAME: ${{ inputs.card_name }}
          CARD_DESC: ${{ inputs.card_desc }}
          LIST_NAME: ${{ inputs.list_name }}
        run: |
          python3 << 'PYEOF'
          import os, requests, json

          key      = os.environ['TRELLO_API_KEY']
          token    = os.environ['TRELLO_TOKEN']
          gh_token = os.environ['GH_TOKEN']
          gh_repo  = os.environ['GH_REPO']
          action   = os.environ['ACTION']
          board_id = '69f5ee59565cd64f2e9da2ff'

          BASE = 'https://api.trello.com/1'
          AUTH = {'key': key, 'token': token}

          def get_lists():
              r = requests.get(f'{BASE}/boards/{board_id}/lists', params={**AUTH, 'filter': 'open'})
              return {l['name']: l['id'] for l in r.json()}

          def post_to_issue(body):
              requests.post(
                  f'https://api.github.com/repos/{gh_repo}/issues/1/comments',
                  headers={'Authorization': f'Bearer {gh_token}', 'Content-Type': 'application/json'},
                  json={'body': body}
              )

          lines = []

          if action == 'setup':
              lists = get_lists()
              desired = [
                  '📋 Мне сделать',
                  '❓ Вопрос к Клоду',
                  '✅ Готово',
              ]
              for name in desired:
                  if name not in lists:
                      rc = requests.post(f'{BASE}/lists', params=AUTH,
                          json={'name': name, 'idBoard': board_id, 'pos': 'bottom'})
                      if rc.status_code == 200:
                          lines.append(f'✅ Создан список: {name}')
                      else:
                          lines.append(f'❌ Ошибка создания {name}: {rc.text[:120]}')
                  else:
                      lines.append(f'ℹ️ Уже есть: {name}')
              body = '**Trello setup:**\n' + '\n'.join(lines)
              print(body)
              post_to_issue(body)

          elif action == 'add-card':
              card_name = os.environ.get('CARD_NAME', '')
              card_desc = os.environ.get('CARD_DESC', '')
              list_name = os.environ.get('LIST_NAME', '📋 Мне сделать')
              if not card_name:
                  print('No card name'); exit(1)
              lists = get_lists()
              target = lists.get(list_name)
              if not target:
                  print(f'List not found: {list_name}')
                  print('Available:', list(lists.keys()))
                  exit(1)
              rc = requests.post(f'{BASE}/cards', params=AUTH,
                  json={'name': card_name, 'desc': card_desc, 'idList': target, 'pos': 'bottom'})
              if rc.status_code == 200:
                  card = rc.json()
                  body = f'**Trello card added:**\n📋 {card_name}\n[Открыть]({card["url"]})'
                  print(body)
                  post_to_issue(body)
              else:
                  print(f'Error: {rc.text}'); exit(1)

          elif action == 'read-status':
              lists = get_lists()
              result = []
              for list_name, list_id in lists.items():
                  r = requests.get(f'{BASE}/lists/{list_id}/cards',
                      params={**AUTH, 'fields': 'name,desc,dateLastActivity'})
                  cards = r.json()
                  if cards:
                      result.append(f'\n**{list_name}** ({len(cards)} карточки)')
                      for c in cards:
                          result.append(f'  - {c["name"]}')
              body = '**Trello статус:**' + ('\n'.join(result) if result else '\n_Карточек нет_')
              print(body)
              post_to_issue(body)

          PYEOF
