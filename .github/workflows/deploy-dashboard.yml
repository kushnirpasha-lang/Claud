name: Deploy agents dashboard to VPS

# Деплоит дашборд: agents.html (статика) + web.py (Flask-маршруты).
# /agents и /dashboard оба ведут на один дашборд.
# После копирования web.py перезапускает сервис assistant.
# SSH-секреты — единая пара SSH_HOST + SSH_PRIVATE_KEY.

on:
  push:
    branches: [claude/hairlove]
    paths:
      - 'assistant/static/agents.html'
      - 'assistant/web.py'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "assistant/static/agents.html,assistant/web.py"
          target: /opt/assistant
          strip_components: 1

      - name: Restart service and verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            systemctl restart assistant
            sleep 2
            systemctl status assistant --no-pager | head -6
            grep -c "ntip" /opt/assistant/static/agents.html && echo "OK: дашборд с тултипами на /agents и /dashboard"
