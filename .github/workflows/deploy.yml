name: Deploy to VPS

on:
  push:
    branches: [claude/obshak]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python-файлы + статика дашборда ────────────────────────────────────
      - name: Copy Python files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "assistant/main.py,assistant/telethon_user.py,assistant/requirements.txt,assistant/bot.py,assistant/claude_client.py,assistant/web.py,assistant/trello_client.py,assistant/instagram_client.py,assistant/google_drive_client.py,assistant/image_processor.py,assistant/image_ai_processor.py,assistant/static/agents.html,assistant/static/index.html,assistant/static/instagram.html,assistant/static/dashboard.html,assistant/static/map.html"
          target: /opt/assistant
          strip_components: 1

      # ── Шаблон проектов ─────────────────────────────────────────────────────
      - name: Copy project template to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "projects/"
          target: /root/projects
          strip_components: 1

      # ── Глобальные файлы Claude ─────────────────────────────────────────────
      - name: Copy global Claude files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "global_claude/CLAUDE.md"
          target: /root/.claude
          strip_components: 1

      - name: Copy событие.sh to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "global_claude/событие.sh"
          target: /root/.claude
          strip_components: 1

      # ── Настройка на сервере ────────────────────────────────────────────────
      - name: Run setup on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Install dependencies
            /opt/assistant/venv/bin/pip install -r /opt/assistant/requirements.txt -q

            # Create data directory for dashboard events
            mkdir -p /opt/assistant/data

            # Make scripts executable
            chmod +x /root/projects/новый-проект.sh 2>/dev/null || true
            chmod +x /root/projects/запуск.sh 2>/dev/null || true
            chmod +x /root/.claude/событие.sh 2>/dev/null || true

            # Инициализируем git для hairlove если нет
            if [ ! -d /root/projects/hairlove/.git ]; then
              cd /root/projects/hairlove && git init -q && git add . && git commit -q -m "🌱 инициализация hairlove" || true
              echo "✅ Проект hairlove инициализирован"
            fi

            # Update credentials from secrets
            grep -q "TELEGRAM_API_ID" /opt/assistant/.env || echo "TELEGRAM_API_ID=38039077" >> /opt/assistant/.env
            grep -q "TELEGRAM_API_HASH" /opt/assistant/.env || echo "TELEGRAM_API_HASH=5dda659889e12536b8d78a4444e960ae" >> /opt/assistant/.env
            grep -q "OPENAI_API_KEY" /opt/assistant/.env || echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> /opt/assistant/.env
            grep -q "TRELLO_API_KEY" /opt/assistant/.env || echo "TRELLO_API_KEY=${{ secrets.TRELLO_API_KEY }}" >> /opt/assistant/.env
            grep -q "TRELLO_TOKEN" /opt/assistant/.env || echo "TRELLO_TOKEN=${{ secrets.TRELLO_TOKEN }}" >> /opt/assistant/.env
            grep -q "TRELLO_BOARD_ID" /opt/assistant/.env || echo "TRELLO_BOARD_ID=69f5ee59565cd64f2e9da2ff" >> /opt/assistant/.env
            grep -q "INSTAGRAM_USER_ID" /opt/assistant/.env || echo "INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}" >> /opt/assistant/.env
            # Always update Instagram token in case it changed
            sed -i '/^INSTAGRAM_ACCESS_TOKEN=/d' /opt/assistant/.env
            echo "INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> /opt/assistant/.env
            # Always update bot token in case it changed
            sed -i '/^TELEGRAM_BOT_TOKEN=/d' /opt/assistant/.env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> /opt/assistant/.env

            # Authorize Telethon (only if session doesn't exist yet)
            if [ ! -f /opt/assistant/user_session.session ]; then
              cd /opt/assistant && export $(grep -v '^#' .env | xargs)
              venv/bin/python3 - << 'PYEOF'
            import asyncio
            from telethon import TelegramClient
            import os

            async def auth():
                c = TelegramClient(
                    '/opt/assistant/user_session',
                    int(os.environ['TELEGRAM_API_ID']),
                    os.environ['TELEGRAM_API_HASH']
                )
                await c.connect()
                print("Session created, waiting for manual auth")
                await c.disconnect()

            asyncio.run(auth())
            PYEOF
            fi

            # Google Service Account credentials
            echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > /opt/assistant/google_service_account.json

            # Ensure uploads directory exists
            mkdir -p /opt/assistant/static/uploads
            chmod 755 /opt/assistant/static/uploads

            # Restart service
            systemctl restart assistant
            sleep 4
            systemctl status assistant --no-pager

      # ── Тестовый прогон: HairLove события в дашборд ────────────────────────
      - name: Send HairLove demo events to dashboard
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Удаляем устаревшие demo-события (старый проект "demo")
            if [ -f /opt/assistant/data/events.jsonl ]; then
              grep -v '"project":"demo"' /opt/assistant/data/events.jsonl > /opt/assistant/data/events.tmp || true
              mv /opt/assistant/data/events.tmp /opt/assistant/data/events.jsonl
              # Также удаляем уже существующие hairlove-события чтобы не дублировались при повторных деплоях
              grep -v '"project":"hairlove"' /opt/assistant/data/events.jsonl > /opt/assistant/data/events.tmp || true
              mv /opt/assistant/data/events.tmp /opt/assistant/data/events.jsonl
            fi

            BASE="http://127.0.0.1:8080/events"
            H="Content-Type: application/json"
            send() { curl -s -X POST "$BASE" -H "$H" -d "$1" >/dev/null; sleep 1; }

            send '{"project":"hairlove","agent":"coordinator","type":"start","message":"маршрут: исследование рынка — салоны красоты Киев"}'
            send '{"project":"hairlove","agent":"planning","type":"start","message":"формулирую задачу: позиционирование HairLove как B2B-витрины"}'
            send '{"project":"hairlove","agent":"planning","type":"step","message":"определил 4 ключевых конкурента для анализа"}'
            send '{"project":"hairlove","agent":"planning","type":"complete","message":"бриф готов → competitors","artifact":"artifacts/planning/2026-05-06-бриф.md","hand_off_to":"competitors"}'
            send '{"project":"hairlove","agent":"coordinator","type":"handoff","message":"передача: planning → competitors"}'
            send '{"project":"hairlove","agent":"competitors","type":"start","message":"начинаю анализ конкурентов в нише салонов красоты"}'
            send '{"project":"hairlove","agent":"competitors","type":"step","message":"изучаю G.Bar, Beauty Hub, OneSalon"}'
            send '{"project":"hairlove","agent":"competitors","type":"step","message":"анализирую Instagram и рекламные креативы"}'
            send '{"project":"hairlove","agent":"competitors","type":"complete","message":"анализ готов → strategy","artifact":"artifacts/competitors/2026-05-06-салоны.md","hand_off_to":"strategy"}'
            send '{"project":"hairlove","agent":"coordinator","type":"handoff","message":"передача: competitors → strategy"}'
            send '{"project":"hairlove","agent":"strategy","type":"start","message":"читаю анализ, определяю направление: B2B витрина"}'
            send '{"project":"hairlove","agent":"strategy","type":"complete","message":"стратегия готова: фокус на B2B + сеть локальных мастеров","artifact":"artifacts/strategy/2026-05-06-направление.md"}'
            send '{"project":"hairlove","agent":"site","type":"start","message":"проектирую B2B-лендинг"}'
            send '{"project":"hairlove","agent":"copy","type":"start","message":"пишу тексты бренда для лендинга"}'
            send '{"project":"hairlove","agent":"instagram","type":"start","message":"планирую контент-план на месяц"}'
            send '{"project":"hairlove","agent":"ads","type":"start","message":"настраиваю Meta Ads на B2B аудиторию"}'
            send '{"project":"hairlove","agent":"docs","type":"start","message":"запускаю трекер сертификации · дедлайн 03.08.2026"}'
            send '{"project":"hairlove","agent":"docs","type":"step","message":"запрос на завод: рецептура + INCI + CoA для CPSR"}'
            send '{"project":"hairlove","agent":"docs","type":"step","message":"нотификация e-Cosmetics МОЗ Украины — в процессе"}'
            send '{"project":"hairlove","agent":"coordinator","type":"complete","message":"маршрут завершён. Итог: HairLove запущен ✅"}'
            echo "✅ HairLove события отправлены"
