name: Prepare Instagram Preview

on:
  push:
    branches: [claude/update-nodejs-actions-M3RLv, main]
    paths: ['_ig_pending/**']

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "_ig_pending/image.jpg,_ig_pending/caption.txt,_ig_pending/session_id.txt"
          target: /tmp/ig_pending/
          strip_components: 1

      - name: Create preview session on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            SESSION_ID=$(cat /tmp/ig_pending/session_id.txt | tr -d '[:space:]')
            echo "Session ID: $SESSION_ID"

            # Copy image to uploads folder
            cp /tmp/ig_pending/image.jpg /opt/assistant/static/uploads/${SESSION_ID}.jpg
            echo "Image copied"

            # Build JSON payload safely via virtualenv python
            /opt/assistant/venv/bin/python3 - << PYEOF
            import requests

            session_id = open('/tmp/ig_pending/session_id.txt').read().strip()
            caption    = open('/tmp/ig_pending/caption.txt').read().strip()

            # Use GitHub raw URL (HTTPS) — Instagram API requires HTTPS
            image_url = 'https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/_ig_pending/image.jpg'

            payload = {
                'session_id': session_id,
                'image_url':  image_url,
                'caption':    caption,
            }
            r = requests.post('http://localhost:8080/api/instagram/session-create', json=payload)
            print('API response:', r.status_code, r.text)
            PYEOF

            echo "Preview URL: http://${{ secrets.SSH_HOST }}/instagram/preview/${SESSION_ID}"
