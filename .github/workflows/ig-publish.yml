name: Publish to Instagram

on:
  repository_dispatch:
    types: [instagram_publish]

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Post to Instagram and notify VPS
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          VPS_HOST: ${{ secrets.SSH_HOST }}
          SESSION_ID: ${{ github.event.client_payload.session_id }}
          IMAGE_URL: ${{ github.event.client_payload.image_url }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          CAPTION='${{ github.event.client_payload.caption }}'
          echo "=== INSTAGRAM PUBLISH ==="
          echo "Session: $SESSION_ID"
          echo "Image: $IMAGE_URL"
          echo "User ID: $INSTAGRAM_USER_ID"

          # Step 1: create media container (Instagram Login token uses graph.instagram.com)
          CONTAINER=$(curl -s -X POST \
            "https://graph.instagram.com/v21.0/${INSTAGRAM_USER_ID}/media" \
            -d "image_url=${IMAGE_URL}" \
            --data-urlencode "caption=${CAPTION}" \
            -d "access_token=${INSTAGRAM_ACCESS_TOKEN}")
          echo "Container response: $CONTAINER"

          CONTAINER_ID=$(echo "$CONTAINER" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id', ''))" 2>/dev/null || echo "")
          ERROR_MSG=$(echo "$CONTAINER" | python3 -c "import sys,json; d=json.load(sys.stdin); e=d.get('error',{}); print(str(e.get('code','')) + ': ' + e.get('message','') + ' type:' + e.get('type',''))" 2>/dev/null || echo "parse error")

          if [ -z "$CONTAINER_ID" ]; then
            echo "FAILED: $ERROR_MSG"
            curl -s -X POST "http://${VPS_HOST}/api/instagram/session/${SESSION_ID}/mark-result" \
              -H "Content-Type: application/json" \
              -d "{\"ok\": false, \"error\": \"${ERROR_MSG}\"}" || true
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/kushnirpasha-lang/Claud/issues/1/comments" \
              -d "{\"body\": \"Instagram publish FAILED\nSession: ${SESSION_ID}\nError: ${ERROR_MSG}\nImage: ${IMAGE_URL}\"}" || true
            exit 1
          fi

          echo "Container ID: $CONTAINER_ID"

          # Step 2: publish
          RESULT=$(curl -s -X POST \
            "https://graph.instagram.com/v21.0/${INSTAGRAM_USER_ID}/media_publish" \
            -d "creation_id=${CONTAINER_ID}" \
            -d "access_token=${INSTAGRAM_ACCESS_TOKEN}")
          echo "Publish response: $RESULT"

          POST_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          if [ -n "$POST_ID" ]; then
            echo "Published! Post ID: $POST_ID"
            curl -s -X POST "http://${VPS_HOST}/api/instagram/session/${SESSION_ID}/mark-result" \
              -H "Content-Type: application/json" \
              -d "{\"ok\": true, \"id\": \"${POST_ID}\"}" || true
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/kushnirpasha-lang/Claud/issues/1/comments" \
              -d "{\"body\": \"Instagram PUBLISHED!\nPost ID: ${POST_ID}\nSession: ${SESSION_ID}\"}" || true
          else
            PUBLISH_ERR=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); e=d.get('error',{}); print(str(e.get('code','')) + ': ' + e.get('message','unknown') + ' type:' + e.get('type',''))" 2>/dev/null || echo "unknown")
            echo "Publish failed: $PUBLISH_ERR"
            curl -s -X POST "http://${VPS_HOST}/api/instagram/session/${SESSION_ID}/mark-result" \
              -H "Content-Type: application/json" \
              -d "{\"ok\": false, \"error\": \"${PUBLISH_ERR}\"}" || true
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/kushnirpasha-lang/Claud/issues/1/comments" \
              -d "{\"body\": \"Instagram media_publish FAILED\nSession: ${SESSION_ID}\nError: ${PUBLISH_ERR}\"}" || true
            exit 1
          fi
