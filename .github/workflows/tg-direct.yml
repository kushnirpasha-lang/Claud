name: TG Send Test
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/tg-direct.yml

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Saved Messages via Telethon
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
          GH_REPO: ${{ github.repository }}
          SCRIPT_B64: 
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN,GH_REPO,SCRIPT_B64
          script_stop: false
          script: |
            export $(grep -v '^#' /opt/assistant/.env | xargs) 2>/dev/null || true
            cd /opt/assistant
            echo "$SCRIPT_B64" | base64 -d > /tmp/tg_saved.py
            RESULT=$(venv/bin/python3 /tmp/tg_saved.py 2>&1)
            echo "RESULT: $RESULT"
            PAYLOAD=$(printf 'telethon saved messages test:\n```\n%s\n```' "$RESULT" | python3 -c "import sys,json; print(json.dumps({'body': sys.stdin.read()}))")
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$GH_REPO/issues/1/comments" \
              -d "$PAYLOAD" || true
