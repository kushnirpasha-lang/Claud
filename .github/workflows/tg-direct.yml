name: TG Direct Send
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/tg-direct.yml

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.MY_PAT }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Diagnose bot
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.parse

          token = os.environ['TOKEN']

          def tg(method, params=''):
            url = f'https://api.telegram.org/bot{token}/{method}{params}'
            with urllib.request.urlopen(url) as r:
              return json.loads(r.read())

          me = tg('getMe')
          username = me.get('result', {}).get('username', '?')
          bot_name = me.get('result', {}).get('first_name', '?')

          wh = tg('getWebhookInfo')
          webhook_url = wh.get('result', {}).get('url', 'нет')

          upd = tg('getUpdates', '?limit=5')
          updates = upd.get('result', [])
          updates_count = len(updates)
          chat_id = ''
          if updates:
            chat_id = str(updates[-1].get('message', {}).get('chat', {}).get('id', ''))

          msg = f'TG Diagnostic:\nbot=@{username} ({bot_name})\nwebhook={webhook_url}\nupdates_count={updates_count}\nchat_id={chat_id}'
          print(msg)

          gh_token = os.environ.get('GH_TOKEN', '')
          gh_repo = os.environ.get('GH_REPO', '')
          if gh_token and gh_repo:
            body = json.dumps({'body': msg}).encode()
            req = urllib.request.Request(
              f'https://api.github.com/repos/{gh_repo}/issues/1/comments',
              data=body,
              headers={'Authorization': f'Bearer {gh_token}', 'Content-Type': 'application/json'}
            )
            urllib.request.urlopen(req)
            print('Posted to issue #1')

          if chat_id:
            send_data = urllib.parse.urlencode({
              'chat_id': chat_id,
              'text': 'ТЕСТ\n2026-05-15\n(от бота @' + username + ')'
            }).encode()
            req2 = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=send_data
            )
            result = urllib.request.urlopen(req2).read()
            print('Sent message:', result[:100])
          PYEOF
# trigger 6
