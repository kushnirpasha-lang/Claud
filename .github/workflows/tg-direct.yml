name: TG Send Test
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/tg-direct.yml

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Saved Messages via Telethon
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          script: |
            export $(grep -v '^#' /opt/assistant/.env | xargs) 2>/dev/null || true
            TODAY=$(date +%Y-%m-%d)
            cd /opt/assistant
            venv/bin/python3 - <<'PYEOF'
import asyncio, os, sys
sys.path.insert(0, '/opt/assistant')
from telethon import TelegramClient

async def main():
    c = TelegramClient('/opt/assistant/user_session',
                       int(os.environ['TELEGRAM_API_ID']),
                       os.environ['TELEGRAM_API_HASH'])
    await c.connect()
    if not await c.is_user_authorized():
        print("❌ Telethon не авторизован")
        await c.disconnect()
        return
    import datetime
    today = datetime.date.today().isoformat()
    await c.send_message('me', f'✅ ТЕСТ Telethon\n{today}\n\nСообщение в Избранное — бесплатно!')
    await c.disconnect()
    print("✅ Сообщение отправлено в Избранное")

asyncio.run(main())
PYEOF
# trigger 3
