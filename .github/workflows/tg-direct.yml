name: TG Direct Send
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/tg-direct.yml

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check server bot setup
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
          GH_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN,GH_REPO
          script_stop: false
          script: |
            export $(grep -v '^#' /opt/assistant/.env | xargs) 2>/dev/null || true
            echo "=== bot.py message handler ==="
            grep -n "chat_id\|chat\.id\|from_user\|message" /opt/assistant/bot.py | head -30
            echo "=== any stored chat_ids ==="
            grep -r "chat_id" /opt/assistant/*.py 2>/dev/null | grep -v "def\|#" | head -20
            echo "=== getUpdates from server ==="
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?limit=5&offset=-5"
