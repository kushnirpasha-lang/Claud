name: TG Direct Send
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/tg-direct.yml

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose and send
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.parse

          token = os.environ['TOKEN']
          gh_token = os.environ.get('GH_TOKEN', '')
          gh_repo = os.environ.get('GH_REPO', '')

          def tg_get(method, params=''):
            url = f'https://api.telegram.org/bot{token}/{method}{params}'
            with urllib.request.urlopen(url, timeout=10) as r:
              return json.loads(r.read())

          me = tg_get('getMe')
          username = me.get('result', {}).get('username', '?')
          bot_name = me.get('result', {}).get('first_name', '?')

          wh = tg_get('getWebhookInfo')
          webhook_url = wh.get('result', {}).get('url', 'none')

          upd = tg_get('getUpdates', '?limit=5')
          updates = upd.get('result', [])
          chat_id = ''
          if updates:
            msg = updates[-1].get('message', {})
            chat_id = str(msg.get('chat', {}).get('id', ''))

          report = (
            f'TG Diagnostic:\n'
            f'bot=@{username} ({bot_name})\n'
            f'webhook={webhook_url}\n'
            f'updates_count={len(updates)}\n'
            f'chat_id={chat_id}'
          )
          print(report)

          if gh_token and gh_repo:
            body = json.dumps({'body': report}).encode()
            req = urllib.request.Request(
              f'https://api.github.com/repos/{gh_repo}/issues/1/comments',
              data=body,
              headers={'Authorization': f'Bearer {gh_token}', 'Content-Type': 'application/json'}
            )
            urllib.request.urlopen(req)
            print('Posted to issue')

          if chat_id:
            data = urllib.parse.urlencode({
              'chat_id': chat_id,
              'text': f'ТЕСТ\n2026-05-15\nbot=@{username}'
            }).encode()
            req2 = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=data
            )
            print(urllib.request.urlopen(req2).read().decode())
          else:
            print('NO CHAT ID - message not sent')
          PYEOF
# trigger 7
