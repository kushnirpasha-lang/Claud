name: TG Send Test
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/tg-direct.yml

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message via bot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          script: |
            export $(grep -v '^#' /opt/assistant/.env | xargs) 2>/dev/null || true
            CHAT_ID=$(cat /opt/assistant/chat_id.txt 2>/dev/null || echo "")
            echo "chat_id from file: $CHAT_ID"
            if [ -z "$CHAT_ID" ]; then
              echo "❌ chat_id.txt пустой — Павел ещё не написал боту после деплоя"
              exit 1
            fi
            TODAY=$(date +%Y-%m-%d)
            RESULT=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${CHAT_ID}" \
              -d "text=ТЕСТ%0A${TODAY}")
            echo "Result: $RESULT"
            echo "$RESULT" | grep -q '"ok":true' && echo "✅ Сообщение доставлено" || echo "❌ Ошибка"
# trigger 2
