name: TG Direct Send
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/tg-direct.yml

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send via server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
          GH_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN,GH_REPO
          script_stop: false
          script: |
            export $(grep -v '^#' /opt/assistant/.env | xargs) 2>/dev/null || true
            python3 << 'PYEOF'
            import os, json, urllib.request, urllib.parse, sys
            sys.path.insert(0, '/opt/assistant')

            token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
            if not token:
              print('ERROR: no TELEGRAM_BOT_TOKEN in .env')
              exit(1)

            # Get chat_id from updates (server polling resets offset so this might work)
            upd = json.loads(urllib.request.urlopen(
              f'https://api.telegram.org/bot{token}/getUpdates?limit=20&offset=-20',
              timeout=10
            ).read())
            updates = upd.get('result', [])
            chat_id = ''
            if updates:
              chat_id = str(updates[-1].get('message', {}).get('chat', {}).get('id', ''))

            print(f'updates={len(updates)}, chat_id={chat_id}')

            if chat_id:
              data = urllib.parse.urlencode({
                'chat_id': chat_id,
                'text': 'ТЕСТ\n2026-05-15\nСистема работает!'
              }).encode()
              result = urllib.request.urlopen(
                urllib.request.Request(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  data=data
                ), timeout=10
              ).read()
              print('Sent:', result.decode()[:100])
            else:
              print('chat_id not found in updates')
            PYEOF
# trigger 8
