name: Find Instagram Business ID

on:
  workflow_dispatch:

jobs:
  find-id:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Find correct Instagram Business Account ID
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          python3 - << 'PYEOF'
          import os, json, requests

          token = os.environ['INSTAGRAM_ACCESS_TOKEN']
          gh_token = os.environ['GH_TOKEN']

          # Get Facebook Pages managed by user
          pages = requests.get(
              "https://graph.facebook.com/v21.0/me/accounts",
              params={"access_token": token, "fields": "id,name,instagram_business_account"}
          ).json()

          result = f"Pages: {json.dumps(pages, ensure_ascii=False, indent=2)}\n\n"

          # Also try getting Instagram accounts directly
          ig = requests.get(
              "https://graph.facebook.com/v21.0/me",
              params={"access_token": token, "fields": "id,name,instagram_accounts"}
          ).json()
          result += f"Me+IG: {json.dumps(ig, ensure_ascii=False, indent=2)}"

          requests.post(
              "https://api.github.com/repos/kushnirpasha-lang/Claud/issues/1/comments",
              headers={"Authorization": f"token {gh_token}"},
              json={"body": result}
          )
          print(result)
          PYEOF
