                  ('12:30', '📑 РУЧ Карусель #2', 'Що таке pH 4.5 і чому це важливо', 'Сделать карусель + опубликовать', 'Слайды'),
                  ('19:00', 'АВТО фото', 'Liquid Lamellar Filler-Mask #5', 'Ничего не делать', 'Lamellar Water 200 ml | 5.png'),
              ]),
              ('17.05', 'Нд', [
                  ('20:00', '🎬 РУЧ Reels #3', 'Один день майстра в Одесі (20 сек)', 'Снять lifestyle-Reels + опубликовать', 'Майстер + Liquid Lamellar'),
              ]),
