                  ('19:00', 'АВТО фото', '20 IN 1 Crème-Spray #12', 'Ничего не делать', 'Cream Spray 200 ml |12.png'),
              ]),
              ('02.06', 'Вт', [
                  ('20:30', '🎬 РУЧ Reels #9 КОЛАБ #2', 'Мікро-інфлюенсер з 20 IN 1 (транзишн до/после)', '⚠️ Договориться с инфлюенсером', 'Контент от инфлюенсера'),
              ]),
              ('03.06', 'Ср', [
                  ('19:00', 'АВТО фото', '20 IN 1 Crème-Spray #13', 'Ничего не делать', 'Cream Spray 200 ml |13.png'),
              ]),
              ('04.06', 'Чт', [
                  ('12:30', '📑 РУЧ Карусель #8 UGC #1', 'Перші відгуки майстрів-партнерів (5 слайдів)', 'Собрать UGC + опубликовать (нужны реальные отзывы)', 'Слайды'),
                  ('19:00', 'АВТО фото', '20 IN 1 Crème-Spray #14', '⚠️ ПОСЛЕДНИЙ из текущей очереди!', 'Cream Spray 200 ml |14.png'),
              ]),
              ('05.06', 'Пт', [
                  ('19:00', '🆕 НОВЕ фото', 'Trio HairLove — flat-lay 3 продуктов', '⚠️ Снять до 04.06 + добавить в очередь!', 'trio-flatlay-1.png'),
                  ('20:30', '🎬 РУЧ Reels #10', 'Як обирали етикетку — Constellation Jade Raster (22 сек)', 'Снять текстуру бумаги + опубликовать', 'Текстура'),
              ]),
              ('06.06', 'Сб', [
                  ('13:00', '📑 РУЧ Карусель #9', 'Що питають клієнти у майстра (8 слайдів)', 'Сделать + опубликовать', 'Слайды'),
                  ('19:00', '🆕 НОВЕ фото', 'Lifestyle: рука + Thermo Protector', '⚠️ Снять до 05.06', 'lifestyle-thermo-hand.png'),
              ]),
              ('07.06', 'Нд', [
                  ('20:00', '🎬 РУЧ Reels #11', 'Live з майстром Одеси cut-down (30 сек)', 'Провести live → нарезать → опубликовать', 'Live'),
              ]),
              ('08.06', 'Пн', [
                  ('19:00', '🆕 НОВЕ фото-brand', 'Текст на cream: "Не магія. Склад."', '⚠️ Сделать в Canva + добавить в очередь', 'manifesto-cream-2.png'),
              ]),
              ('09.06', 'Вт', [
                  ('12:30', '📑 РУЧ Карусель #10', 'Перші 30 днів @hair_love_company — звіт', 'Сделать + опубликовать', 'Слайды'),
                  ('19:00', '🆕 НОВЕ фото', 'Liquid Lamellar — крем-піна крупный план', '⚠️ Снять макро', 'lamellar-foam-macro.png'),
              ]),
              ('10.06', 'Ср', [
                  ('20:30', '🎬 РУЧ Reels #12', 'Протокол майстра — три продукти разом (28 сек)', 'Снять последовательность Thermo → Lamellar → Cream', 'Послідовність'),
              ]),
              ('11.06', 'Чт', [
                  ('13:00', '📑 РУЧ Карусель #11', 'Чек-лист догляду на літо (9 слайдів)', 'Сделать + опубликовать (saves-контент)', 'Слайды'),
