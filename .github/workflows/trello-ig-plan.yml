                  ('13:00', '📑 РУЧ Карусель #3', 'Склад 20 IN 1 Crème-Spray — 10 слайдів', 'Сделать карусель + опубликовать', 'Слайды'),
                  ('19:00', 'АВТО фото', '20 IN 1 Crème-Spray #5', 'Ничего не делать', 'Cream Spray 200 ml |5.jpg'),
