          key      = os.environ['TRELLO_API_KEY']
          token    = os.environ['TRELLO_TOKEN']
          gh_token = os.environ['GH_TOKEN']
          gh_repo  = os.environ['GH_REPO']
          board_id = '69f5ee59565cd64f2e9da2ff'

          BASE = 'https://api.trello.com/1'
          AUTH = {'key': key, 'token': token}

          # Get Instagram план list
          r = requests.get(f'{BASE}/boards/{board_id}/lists', params={**AUTH, 'filter': 'open'})
          lists = {l['name']: l['id'] for l in r.json()}

          ig_list_name = '🗓 Instagram план'
          ig_id = lists.get(ig_list_name)
          if not ig_id:
              rc = requests.post(f'{BASE}/lists', params=AUTH,
                  json={'name': ig_list_name, 'idBoard': board_id, 'pos': 'top'})
              ig_id = rc.json()['id']

          # Clear existing cards
          existing = requests.get(f'{BASE}/lists/{ig_id}/cards', params={**AUTH, 'fields': 'id'}).json()
          for c in existing:
              requests.delete(f'{BASE}/cards/{c["id"]}', params=AUTH)

          # Daily plan: one card per day with all content for that day
          # Format: (date, day_name, items)
          # Each item: (time, format, theme, action, photo)
          plan = [
              ('12.05', 'Вт', [
