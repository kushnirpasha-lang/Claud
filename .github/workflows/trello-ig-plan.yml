              ]),
              ('25.05', 'Пн', [
                  ('19:00', 'АВТО фото', 'Liquid Lamellar Filler-Mask #7', 'Ничего не делать', 'Lamellar Water 200 ml | 7.png'),
              ]),
              ('26.05', 'Вт', [
                  ('12:30', '📑 РУЧ Карусель #5 B2B', 'Як майстер заробляє +220 грн з take-home (6 слайдів)', 'B2B-карусель для майстрів — опубликовать', 'Слайды'),
                  ('19:00', 'АВТО фото', '20 IN 1 Crème-Spray #8', 'Ничего не делать', 'Cream Spray 200 ml |8.png'),
              ]),
              ('27.05', 'Ср', [
