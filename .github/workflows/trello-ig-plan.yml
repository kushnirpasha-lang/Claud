              ]),
          ]

          # Create header card with legend
          legend_desc = (
              '**КАК ЧИТАТЬ ПЛАН:**\n\n'
              '✅ **АВТО фото** — публикуется автоматически в 19:00 Киев. Ничего не делать.\n'
              '🎬 **РУЧ Reels** — нужно снять/смонтировать видео и опубликовать вручную (20:30 обычно).\n'
              '📑 **РУЧ Карусель** — сделать в Canva (7-10 слайдов) и опубликовать вручную (12:30-13:00).\n'
              '🆕 **НОВЕ фото** — нужно СНЯТЬ новое фото и добавить в очередь posting-queue.json.\n\n'
              '**⚠️ КРИТИЧНО:**\n'
              'До 04.06 нужно снять 6 новых фото — иначе автопостинг встанет 05.06:\n'
              '• manifesto-cream-1.png (на 14.05)\n'
              '• lifestyle-lamellar-sunday.png (на 24.05)\n'
              '• trio-flatlay-1.png (на 05.06)\n'
              '• lifestyle-thermo-hand.png (на 06.06)\n'
              '• manifesto-cream-2.png (на 08.06)\n'
              '• lamellar-foam-macro.png (на 09.06)\n'
              '• trio-flatlay-2.png (на 11.06)\n\n'
              '**Колаб с инфлюенсерами (Reels #6 и #9) — бартер: флакон → Reels+сторіс.**\n'
              'Список 25 микро-инфлюенсеров: artifacts/competitors/2026-05-10-одесса-список-салоны-инфлюенсеры.md\n\n'
              'Полный план: artifacts/instagram/2026-05-12-контент-план-30-днів.md'
          )

          requests.post(f'{BASE}/cards', params=AUTH, json={
              'name': '📖 ЛЕГЕНДА — как читать план',
              'desc': legend_desc,
              'idList': ig_id,
              'pos': 'top'
          })

          # Day cards
          count = 1
          for date_str, day_name, items in plan:
              # Build description
              desc_lines = []
              has_manual = False
              for time, fmt, theme, action, photo in items:
                  desc_lines.append(f'**{time} · {fmt}**')
                  desc_lines.append(f'Тема: {theme}')
                  if photo and photo != '—':
                      desc_lines.append(f'Фото/контент: `{photo}`')
                  desc_lines.append(f'Действие: {action}')
                  desc_lines.append('')
                  if 'РУЧ' in fmt or 'НОВЕ' in fmt:
                      has_manual = True

              # Title indicates if manual work needed
              flag = '⚡' if has_manual else '✅'
              title = f'{flag} {date_str} ({day_name}) — {len(items)} {"пост" if len(items)==1 else "поста"}'

              requests.post(f'{BASE}/cards', params=AUTH, json={
                  'name': title,
                  'desc': '\n'.join(desc_lines),
                  'idList': ig_id,
                  'pos': 'bottom'
              })
              count += 1

          # Report
          body = (
              f'**✅ Instagram план в Trello обновлён**\n\n'
              f'- Карточек добавлено: {count} (1 легенда + {count-1} дней)\n'
              f'- Период: 12.05.2026 → 11.06.2026\n'
              f'- Каждая карточка = 1 день со всеми постами\n'
              f'- ⚡ в названии = есть ручная работа\n'
              f'- ✅ в названии = только автопостинг\n\n'
              f'Открой первую карточку "📖 ЛЕГЕНДА" чтобы понять обозначения.'
          )
          requests.post(
              f'https://api.github.com/repos/{gh_repo}/issues/1/comments',
              headers={'Authorization': f'Bearer {gh_token}', 'Content-Type': 'application/json'},
              json={'body': body}
          )
          print(body)
          PYEOF
