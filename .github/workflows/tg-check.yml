name: TG Auth Check
on:
  workflow_dispatch:
    inputs:
      step:
        description: 'request or signin'
        required: true
        default: request
      code:
        description: 'Code from Telegram'
        required: false
        default: ''
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Execute on server
        id: exec
        run: |
          STEP="${{ inputs.step }}"
          CODE="${{ inputs.code }}"
          RESULT=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 root@${{ secrets.SSH_HOST }} "
            export \$(grep -v '^#' /opt/assistant/.env | xargs) 2>/dev/null
            cd /opt/assistant
            if [ \"$STEP\" = \"request\" ]; then
              venv/bin/python3 -c \"
import asyncio, os
from telethon import TelegramClient
async def main():
    c = TelegramClient('/opt/assistant/user_session', int(os.environ['TELEGRAM_API_ID']), os.environ['TELEGRAM_API_HASH'])
    await c.connect()
    if await c.is_user_authorized():
        me = await c.get_me()
        print('ALREADY_AUTH: ' + me.first_name + ' @' + str(me.username))
    else:
        sent = await c.send_code_request('+380637353733')
        open('/tmp/tg_hash','w').write(sent.phone_code_hash)
        print('CODE_SENT to +380637353733')
    await c.disconnect()
asyncio.run(main())
\"
            elif [ \"$STEP\" = \"signin\" ]; then
              venv/bin/python3 -c \"
import asyncio, os
from telethon import TelegramClient
from telethon.errors import SessionPasswordNeededError
async def main():
    h = open('/tmp/tg_hash').read().strip()
    c = TelegramClient('/opt/assistant/user_session', int(os.environ['TELEGRAM_API_ID']), os.environ['TELEGRAM_API_HASH'])
    await c.connect()
    try:
        await c.sign_in('+380637353733', '$CODE', phone_code_hash=h)
        me = await c.get_me()
        print('SUCCESS: ' + me.first_name + ' @' + str(me.username))
    except SessionPasswordNeededError:
        print('2FA_REQUIRED')
    except Exception as e:
        print('ERROR: ' + str(e))
    await c.disconnect()
asyncio.run(main())
\"
              systemctl restart assistant
            fi
          " 2>&1 || echo "SSH_FAILED")
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "Result: $RESULT"

      - name: Post result to issue
        run: |
          RESULT="${{ steps.exec.outputs.result }}"
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/issues/1/comments \
            -d "{\"body\":\"**Step:** ${{ inputs.step }}\n\n**Result:**\n\`\`\`\n${RESULT}\n\`\`\`\"}"
