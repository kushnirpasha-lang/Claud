name: TG Auth Check
"on":
  workflow_dispatch:
    inputs:
      step:
        description: 'request or signin'
        required: true
        default: request
      code:
        description: 'Code from Telegram (for signin step)'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          STEP: ${{ inputs.step }}
          CODE: ${{ inputs.code }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
          GH_REPO: ${{ github.repository }}
          REQ_B64: 
          SIGN_B64: 
          TRELLO_B64: 
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: STEP,CODE,GH_TOKEN,GH_REPO,REQ_B64,SIGN_B64,TRELLO_B64
          script_stop: false
          script: |
            export $(grep -v '^#' /opt/assistant/.env | xargs) 2>/dev/null || true
            cd /opt/assistant

            if [ "$STEP" = "request" ]; then
              echo "$REQ_B64" | base64 -d > /tmp/tg_req.py
              RESULT=$(venv/bin/python3 /tmp/tg_req.py 2>&1)
            elif [ "$STEP" = "signin" ]; then
              echo "$SIGN_B64" | base64 -d > /tmp/tg_sign.py
              RESULT=$(venv/bin/python3 /tmp/tg_sign.py "$CODE" 2>&1)
              systemctl restart assistant || true
            elif [ "$STEP" = "trello" ]; then
              echo "$TRELLO_B64" | base64 -d > /tmp/trello_check.py
              RESULT=$(venv/bin/python3 /tmp/trello_check.py 2>&1)
            else
              RESULT="Unknown step"
            fi

            echo "RESULT: $RESULT"
            PAYLOAD=$(printf '**%s result:**\n```\n%s\n```' "$STEP" "$RESULT" | python3 -c "import sys,json; print(json.dumps({'body': sys.stdin.read()}))")
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$GH_REPO/issues/1/comments" \
              -d "$PAYLOAD" || true
