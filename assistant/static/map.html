<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Карта агентов</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

:root, [data-theme="dark"] {
  --bg: #0a0a12;
  --surface: #12121e;
  --surface2: #1a1a2e;
  --border: rgba(255,255,255,.07);
  --text: #e0e0f0;
  --muted: #5a5a78;
  --accent: #7c6af7;
  --accent2: #5fd8c4;
  --green: #3dd68c;
  --amber: #f5a623;
}
[data-theme="light"] {
  --bg: #f4f4f8;
  --surface: #ffffff;
  --surface2: #f0f0f5;
  --border: rgba(0,0,0,.08);
  --text: #1a1a2e;
  --muted: #8888a8;
  --accent: #6355d8;
  --accent2: #0fa89a;
  --green: #1aad6a;
  --amber: #d4881f;
  --red: #f05c5c;
}

body {
  background: var(--bg);
  color: var(--text);
  font: 13px/1.4 -apple-system, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

header h1 { font-size: 15px; font-weight: 600; }
header .subtitle { font-size: 11px; color: var(--muted); }

.live-dot {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  flex-shrink: 0;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.nav-links { margin-left: auto; display: flex; gap: 8px; }
.nav-links a {
  font-size: 12px; color: var(--muted); text-decoration: none;
  padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
  transition: all .2s;
}
.nav-links a:hover { color: var(--text); border-color: var(--accent); }

/* Agent grid */
.grid-container {
  flex: 1;
  overflow: auto;
  padding: 28px 32px;
}

.project-section { margin-bottom: 40px; }
.project-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.project-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.agents-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.agent-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  width: 180px;
  cursor: default;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  position: relative;
}

.agent-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,106,247,.12);
  transform: translateY(-1px);
}

.agent-card.state-active {
  border-color: var(--green);
  box-shadow: 0 0 14px rgba(61,214,140,.25);
  animation: glow 2s infinite;
}
@keyframes glow { 0%,100%{box-shadow:0 0 8px rgba(61,214,140,.2)} 50%{box-shadow:0 0 20px rgba(61,214,140,.4)} }

.agent-card.state-complete { border-color: var(--accent2); }
.agent-card.state-error { border-color: var(--red); }

.agent-icon { font-size: 20px; margin-bottom: 6px; }
.agent-name { font-size: 13px; font-weight: 600; }
.agent-desc { font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

.agent-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  margin-top: 8px;
  padding: 2px 7px;
  border-radius: 4px;
  background: rgba(255,255,255,.04);
  color: var(--muted);
}
.badge-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--muted);
}
.state-active .badge-dot { background: var(--green); animation: pulse 1.5s infinite; }
.state-complete .badge-dot { background: var(--accent2); }
.state-error .badge-dot { background: var(--red); }

/* Last event strip */
.last-event {
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  padding: 10px 24px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }
.ts-info { margin-left: auto; font-size: 11px; color: var(--muted); }

/* Tooltip */
.tooltip {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 11px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  max-width: 260px;
  z-index: 100;
  line-height: 1.5;
}
.tooltip.visible { opacity: 1; }
.tooltip strong { color: var(--text); display: block; margin-bottom: 2px; }
.tooltip small { color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="live-dot" id="liveDot"></div>
  <div>
    <h1>Карта агентов</h1>
    <div class="subtitle" id="subtitle">Загрузка...</div>
  </div>
  <div class="nav-links">
    <a href="/dashboard">Дашборд</a>
    <a href="/agents">Галактика</a>
    <button onclick="toggleTheme()" style="font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;" id="themeBtn">☀️</button>
  </div>
</header>

<div class="grid-container" id="gridContainer">
  <div style="color:var(--muted);padding:40px 0;text-align:center">Загрузка агентов...</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>активен</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div>завершил</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--muted)"></div>ожидает</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>ошибка</div>
  <span class="ts-info" id="tsInfo">Обновляется каждые 2 сек</span>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── Icons per agent name ────────────────────────────────────────────────────
const ICONS = {
  coordinator: '🎯', planning: '📋', competitors: '🔍', strategy: '🧭',
  brandbook: '🎨', copy: '✍️', 'text-editor': '📝', site: '🌐',
  instagram: '📱', growth: '🚀', ads: '📢', documents: '📄',
  research: '🔬', finance: '💰', hr: '👥', default: '🤖'
};

function icon(name) { return ICONS[name] || ICONS.default; }

// ── State ───────────────────────────────────────────────────────────────────
const agentStates = {};   // agent → {state, lastMsg, lastTs}
const knownAgents = {};   // project → [{name, description}]
let lastEventTs = '';

// ── Render ──────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('gridContainer');
  const projects = Object.keys(knownAgents);
  if (!projects.length) return;

  let html = '';
  projects.forEach(proj => {
    const agents = knownAgents[proj];
    html += `<div class="project-section">
      <div class="project-title">${proj}</div>
      <div class="agents-grid" id="grid-${proj}">`;

    agents.forEach(a => {
      const st = agentStates[a.name] || {};
      const stateClass = st.state ? `state-${st.state}` : '';
      const stateLabel = st.state === 'active' ? 'активен' :
                         st.state === 'complete' ? 'готово' :
                         st.state === 'error' ? 'ошибка' : 'ожидает';
      const shortDesc = (a.description || '').split('.')[0].slice(0, 60);
      const lastMsg = st.lastMsg ? st.lastMsg.slice(0, 50) : '';

      html += `<div class="agent-card ${stateClass}"
        data-name="${a.name}" data-desc="${a.description || ''}">
        <div class="agent-icon">${icon(a.name)}</div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-desc">${shortDesc}</div>
        ${lastMsg ? `<div class="last-event">${lastMsg}</div>` : ''}
        <div class="agent-badge">
          <span class="badge-dot"></span>${stateLabel}
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;

  // Tooltip
  container.querySelectorAll('.agent-card').forEach(card => {
    card.addEventListener('mouseenter', e => {
      const name = card.dataset.name;
      const desc = card.dataset.desc;
      const st = agentStates[name] || {};
      tooltip.innerHTML = `<strong>${icon(name)} ${name}</strong>
        <small>${desc || 'нет описания'}</small>
        ${st.lastMsg ? `<small style="margin-top:4px;color:var(--accent2)">↳ ${st.lastMsg}</small>` : ''}`;
      tooltip.classList.add('visible');
    });
    card.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 10) + 'px';
    });
    card.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
  });

  const total = projects.reduce((s, p) => s + knownAgents[p].length, 0);
  document.getElementById('subtitle').textContent =
    `${projects.length} проект(а) · ${total} агентов`;
}

// ── Load agents list ────────────────────────────────────────────────────────
async function loadAgents(project) {
  try {
    const res = await fetch(`/api/agents/list?project=${project}`);
    if (!res.ok) return;
    const data = await res.json();
    if (data.agents && data.agents.length) {
      knownAgents[project] = data.agents;
      render();
    }
  } catch {}
}

// ── Apply events ─────────────────────────────────────────────────────────────
function applyEvents(events) {
  events.forEach(e => {
    const agent = e.agent;
    if (!agent) return;
    const type = e.type;
    let state = agentStates[agent]?.state || 'idle';

    if (type === 'start' || type === 'step') state = 'active';
    else if (type === 'complete') state = 'complete';
    else if (type === 'error') state = 'error';

    agentStates[agent] = { state, lastMsg: e.message || '', lastTs: e.ts };

    if (e.ts > lastEventTs) {
      lastEventTs = e.ts;
      document.getElementById('tsInfo').textContent =
        'Последнее: ' + new Date(e.ts).toLocaleTimeString('ru-RU');
    }

    // Auto-add unknown agents from events
    const proj = e.project || 'hairlove';
    if (!knownAgents[proj]) knownAgents[proj] = [];
    if (!knownAgents[proj].find(a => a.name === agent)) {
      knownAgents[proj].push({ name: agent, description: '' });
    }
  });
  render();
}

// ── SSE ──────────────────────────────────────────────────────────────────────
function connectStream() {
  const es = new EventSource(`/api/agents/stream?since=${lastEventTs}`);
  es.onmessage = e => {
    try { applyEvents([JSON.parse(e.data)]); } catch {}
  };
  es.onerror = () => {
    es.close();
    document.getElementById('liveDot').style.background = 'var(--amber)';
    setTimeout(connectStream, 3000);
  };
  es.onopen = () => {
    document.getElementById('liveDot').style.background = 'var(--green)';
  };
}

// ── Init ─────────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

async function init() {
  // Load known projects' agents from filesystem
  await Promise.all(['hairlove', 'mikhtavai'].map(loadAgents));

  // Load event history
  try {
    const res = await fetch('/api/agents/events?limit=300');
    const events = await res.json();
    applyEvents(events);
  } catch {}

  connectStream();
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}

init();
</script>
</body>
</html>
