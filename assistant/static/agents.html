<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Система агентов — Pavel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4ff;
      --surface: #ffffff;
      --surface-2: #f8f7ff;
      --border: #e8e5f5;
      --border-strong: #d0cce8;
      --text: #1a1a2e;
      --text-muted: #6b6a85;
      --text-dim: #9594ad;
      --accent: #6366f1;
      --accent-soft: #eef0ff;
      --green: #22c55e;
      --green-soft: #dcfce7;
      --orange: #f59e0b;
      --orange-soft: #fef3c7;
      --purple: #a855f7;
      --purple-soft: #f3e8ff;
      --red: #ef4444;
      --blue: #3b82f6;
      --shadow-sm: 0 1px 3px rgba(26,26,46,0.07);
      --shadow: 0 2px 10px rgba(99,102,241,0.09), 0 1px 3px rgba(26,26,46,0.06);
      --shadow-lg: 0 8px 28px rgba(99,102,241,0.13), 0 2px 8px rgba(26,26,46,0.07);
      --radius: 16px;
    }
    [data-theme="dark"] {
      --bg: #0e0e1a;
      --surface: #1a1a2e;
      --surface-2: #14142a;
      --border: rgba(120,120,180,0.2);
      --border-strong: rgba(120,120,180,0.35);
      --text: #e8e8f0;
      --text-muted: #9594ad;
      --text-dim: #6b6a85;
      --accent: #818cf8;
      --accent-soft: rgba(99,102,241,0.15);
      --green-soft: rgba(34,197,94,0.15);
      --orange-soft: rgba(245,158,11,0.15);
      --purple-soft: rgba(168,85,247,0.15);
      --shadow: 0 2px 8px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 28px rgba(0,0,0,0.55);
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; gap: 16px; z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; white-space: nowrap; }
    .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); flex-shrink: 0; }
    .header-center { color: var(--text-muted); font-size: 13px; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .theme-switch { display: flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
    .theme-btn { border: none; background: transparent; padding: 4px 11px; font-size: 12px; color: var(--text-muted); cursor: pointer; border-radius: 999px; font-family: inherit; transition: all 0.15s; }
    .theme-btn:hover { color: var(--text); }
    .theme-btn.active { background: var(--surface); color: var(--accent); font-weight: 600; box-shadow: var(--shadow-sm); }
    .clock { font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 500; padding: 5px 13px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; }

    /* ── Canvas ── */
    .canvas {
      position: fixed; top: 56px; left: 0; right: 0; bottom: 52px;
      overflow: visible;
    }
    .lines-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }

    /* ── Node ── */
    .node { position: absolute; transform: translate(-50%,-50%); cursor: pointer; z-index: 3; transition: transform 0.2s; }
    .node:hover { transform: translate(-50%,-50%) translateY(-3px); z-index: 7; }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 15px; width: 188px;
      box-shadow: var(--shadow); transition: box-shadow 0.2s, border-color 0.2s;
    }
    .node:hover .card { box-shadow: var(--shadow-lg); border-color: var(--accent); }
    .card-emoji { font-size: 34px; display: block; margin-bottom: 7px; }
    .card-title { font-weight: 700; font-size: 15px; color: var(--text); margin-bottom: 3px; }
    .card-handle { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; color: var(--accent); display: block; margin-bottom: 7px; }
    .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; margin-bottom: 7px; min-height: 2.8em; }
    .card-ts { font-size: 10px; color: var(--text-dim); margin-bottom: 7px; }

    /* ── Hub card ── */
    .node.hub .card { background: var(--purple-soft); border: 2.5px solid var(--purple); width: 200px; }
    .node.hub:hover .card { border-color: var(--purple); box-shadow: 0 0 0 5px rgba(168,85,247,0.12), var(--shadow-lg); }
    .node.hub .card-title { color: var(--purple); }
    .node.hub .card-sub { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--purple); margin-bottom: 8px; opacity: 0.75; }

    /* ── Owner card ── */
    .node.owner .card { text-align: center; padding: 22px 15px; width: 190px; }
    .owner-avatar {
      width: 62px; height: 62px; border-radius: 50%;
      background: linear-gradient(135deg, #818cf8 0%, #a855f7 100%);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px; font-size: 30px;
      box-shadow: 0 0 0 5px var(--accent-soft);
    }
    .node.owner .card-title { font-size: 18px; text-align: center; }
    .node.owner .card-sub { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); text-align: center; }
    .node.owner:hover .card { border-color: var(--purple); }

    /* ── Placeholder card ── */
    .node.placeholder .card { background: transparent; border: 1.5px dashed var(--border-strong); box-shadow: none; opacity: 0.55; text-align: center; width: 175px; }
    .node.placeholder:hover .card { opacity: 0.9; border-color: var(--accent); }
    .node.placeholder .card-title { font-size: 13px; color: var(--text-muted); font-weight: 500; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .b-active  { background: var(--green-soft); color: var(--green); }
    .b-active .dot { animation: blink 1.6s infinite; }
    .b-working { background: var(--orange-soft); color: var(--orange); }
    .b-next    { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border-strong); }
    .b-wait    { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); }
    .b-stage   { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
    .b-hub     { background: var(--purple-soft); color: var(--purple); border: 1px solid rgba(168,85,247,0.4); cursor: pointer; }
    .b-hub:hover { background: var(--purple); color: #fff; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── Panel ── */
    .panel { position: fixed; top: 56px; right: 0; bottom: 52px; width: 460px; max-width: 92vw; background: var(--surface); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform 0.3s ease; z-index: 20; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
    .panel.open { transform: translateX(0); }
    .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .panel-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; width: 30px; height: 30px; border-radius: 8px; }
    .panel-close:hover { background: var(--surface-2); }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .p-section { margin-bottom: 20px; }
    .p-section h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 9px; font-weight: 600; }
    .p-text { font-size: 13px; color: var(--text-muted); }
    .agent-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .agent-chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
    .agent-chip:hover { border-color: var(--accent); color: var(--accent); }
    .events { display: flex; flex-direction: column; gap: 7px; }
    .ev { background: var(--surface-2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; padding: 9px 12px; font-size: 12px; }
    .ev .meta { display: flex; gap: 7px; align-items: center; color: var(--text-muted); font-size: 11px; margin-bottom: 3px; }
    .ev .ev-agent { color: var(--text); font-weight: 600; }
    .ev .ev-msg { color: var(--text); }
    .ev.start   { border-left-color: var(--blue); }
    .ev.step    { border-left-color: var(--green); }
    .ev.complete{ border-left-color: var(--green); background: var(--green-soft); }
    .ev.handoff { border-left-color: var(--purple); }
    .ev.error   { border-left-color: var(--red); }
    .ev.wait    { border-left-color: var(--orange); }
    .empty-ev { padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
    .back-btn { padding: 5px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; color: var(--text); }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Bottom bar ── */
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: var(--surface); border-top: 1px solid var(--border); z-index: 10; display: flex; align-items: center; padding: 0 16px; gap: 6px; overflow-x: auto; }
    .bar-hint { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .bar-sep { color: var(--border-strong); padding: 0 4px; }
    .bar-btn { display: flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; white-space: nowrap; font-size: 12px; font-family: inherit; color: var(--text-muted); transition: all 0.15s; }
    .bar-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
    .bar-btn .bh { color: var(--accent); font-family: 'SF Mono', Menlo, monospace; font-size: 11px; }

    /* ── Legend ── */
    .legend { position: fixed; bottom: 60px; left: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 9px 14px; z-index: 5; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 5px; }
    .leg-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .leg-line { width: 22px; border-top: 2px dashed; flex-shrink: 0; }
    .leg-line.blue   { border-color: var(--blue); }
    .leg-line.orange { border-color: var(--orange); }
    .leg-line.red    { border-color: var(--red); }

    /* ── Toasts ── */
    .toasts { position: fixed; bottom: 60px; right: 14px; z-index: 30; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 9px 13px; border-radius: 10px; font-size: 12px; max-width: 300px; box-shadow: var(--shadow-lg); color: var(--text); animation: tIn 0.25s ease; }
    @keyframes tIn { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .header-center { display: none; }
      .legend { display: none; }
      .card { width: 155px !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand"><span class="brand-dot"></span>Система агентов — Pavel</div>
  <div class="header-center">Галактика HairLove — Агенты — Связи</div>
  <div class="header-right">
    <div class="theme-switch" id="themeSwitch">
      <button class="theme-btn" data-mode="light">☀️ Светлая</button>
      <button class="theme-btn" data-mode="dark">🌙 Тёмная</button>
      <button class="theme-btn" data-mode="auto">⚙️ Авто</button>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="canvas" id="canvas">
  <svg class="lines-svg" id="linesSvg"></svg>
</div>

<aside class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-title" id="panelTitle">—</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</aside>

<div class="bottom-bar" id="bottomBar"></div>

<div class="legend">
  <div class="leg-item"><span class="leg-line blue"></span>Тексты → канал</div>
  <div class="leg-item"><span class="leg-line orange"></span>Конкуренты → анализ</div>
  <div class="leg-item"><span class="leg-line red"></span>Реклама → запуск</div>
</div>

<div class="toasts" id="toasts"></div>

<script>
  // ── Config ────────────────────────────────────────────────
  const PROJECT = 'hairlove';

  // Positions as % of canvas (left%, top%)
  const AGENTS = [
    { key:'strategy',    name:'Стратегия',     handle:'/hairlove-strategy',   emoji:'🧭', desc:'Центр сети, дорожная карта',           px:22, py:17, def:'working' },
    { key:'copy',        name:'Тексты бренда', handle:'/hairlove-texts',       emoji:'✍️', desc:'Контент для всех каналов',              px: 7, py:36, def:'active'  },
    { key:'site',        name:'Сайт',          handle:'/hairlove-site',        emoji:'🌐', desc:'B2B витрина, следующий приоритет',      px:38, py:31, def:'next'    },
    { key:'competitors', name:'Конкуренты',    handle:'/hairlove-competitors', emoji:'🔍', desc:'Данные для стратегии и рекламы',        px: 7, py:64, def:'wait'    },
    { key:'ads',         name:'Реклама',       handle:'/hairlove-ads',         emoji:'📢', desc:'Meta Ads, стреляет в сайт и Insta',    px:38, py:69, def:'stage'   },
    { key:'instagram',   name:'Instagram',     handle:'/hairlove-insta',       emoji:'📸', desc:'Публикация постов',                    px:22, py:83, def:'active'  },
  ];

  const HUB   = { px:22, py:50 };
  const OWNER = { px:64, py:50 };
  const EXTRA = [{ px:81, py:33 }, { px:81, py:68 }];

  // Workflow connections between agents
  const CONNS = [
    { from:'copy',        to:'instagram', color:'blue'   },
    { from:'copy',        to:'site',      color:'blue'   },
    { from:'competitors', to:'strategy',  color:'orange' },
    { from:'ads',         to:'instagram', color:'red'    },
    { from:'ads',         to:'site',      color:'red'    },
  ];

  const COLOR = { blue:'var(--blue)', orange:'var(--orange)', red:'var(--red)' };

  let projData   = null;
  let agentTs    = {};     // key → formatted timestamp string
  let lastEvTs   = '';
  let activePanel = null;

  // ── Theme ─────────────────────────────────────────────────
  function applyTheme(mode) {
    const actual = mode === 'auto'
      ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      : mode;
    document.documentElement.setAttribute('data-theme', actual);
    localStorage.setItem('theme', mode);
    document.querySelectorAll('.theme-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === mode));
  }
  document.querySelectorAll('.theme-btn').forEach(b =>
    b.addEventListener('click', () => applyTheme(b.dataset.mode)));
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if ((localStorage.getItem('theme') || 'light') === 'auto') applyTheme('auto');
  });
  applyTheme(localStorage.getItem('theme') || 'light');

  // ── Clock ─────────────────────────────────────────────────
  function tick() {
    const d = new Date();
    document.getElementById('clock').textContent =
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
  function pad(n) { return String(n).padStart(2,'0'); }
  setInterval(tick, 1000); tick();

  // ── API ───────────────────────────────────────────────────
  async function get(path) {
    try { return await (await fetch(path)).json(); } catch { return null; }
  }

  // ── Badge HTML ────────────────────────────────────────────
  function badge(status, custom) {
    const cfg = {
      active:  ['b-active',  custom || 'Активен'],
      working: ['b-working', custom || 'В работе'],
      next:    ['b-next',    custom || 'Следующий'],
      wait:    ['b-wait',    custom || 'Жёт задачи'],
      stage:   ['b-stage',   custom || 'Этап 2'],
      done:    ['b-active',  custom || 'Готово'],
    };
    const [cls, label] = cfg[status] || ['b-wait', custom || 'Ожидает'];
    return `<span class="badge ${cls}"><span class="dot"></span>${label}</span>`;
  }

  function agentStatus(a) {
    if (projData && projData.active_agent === a.key) return 'active';
    return a.def;
  }

  function fmtTs(ts) {
    if (!ts) return '';
    try {
      const d = new Date(ts);
      return `обновлён ${d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'2-digit'})} ${d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}`;
    } catch { return ''; }
  }

  // ── SVG line ──────────────────────────────────────────────
  function line(svg, x1, y1, x2, y2, stroke, dash, width, opacity) {
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke', stroke);
    l.setAttribute('stroke-width', width);
    l.setAttribute('stroke-dasharray', dash);
    l.setAttribute('opacity', opacity);
    l.setAttribute('stroke-linecap','round');
    svg.appendChild(l);
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    const canvas = document.getElementById('canvas');
    const svg    = document.getElementById('linesSvg');
    canvas.querySelectorAll('.node').forEach(n => n.remove());
    svg.innerHTML = '';

    const W = canvas.clientWidth;
    const H = canvas.clientHeight;
    const xy = pos => ({ x: pos.px/100*W, y: pos.py/100*H });

    // Hub ↔ each agent (gray)
    AGENTS.forEach(a => {
      const h = xy(HUB), p = xy(a);
      line(svg, h.x, h.y, p.x, p.y, 'var(--border-strong)', '3 5', 1, 0.5);
    });

    // Hub ↔ Owner (purple)
    { const h = xy(HUB), o = xy(OWNER);
      line(svg, h.x, h.y, o.x, o.y, 'var(--purple)', '4 6', 1.5, 0.45); }

    // Workflow connections (colored)
    CONNS.forEach(c => {
      const fa = AGENTS.find(a=>a.key===c.from);
      const ta = AGENTS.find(a=>a.key===c.to);
      if (!fa||!ta) return;
      const p1 = xy(fa), p2 = xy(ta);
      line(svg, p1.x, p1.y, p2.x, p2.y, COLOR[c.color], '5 4', 1.8, 0.7);
    });

    // Agent nodes
    AGENTS.forEach(a => {
      const p = xy(a);
      const el = mkNode('node', p.x, p.y);
      const ts = agentTs[a.key] || '';
      el.innerHTML = `<div class="card">
        <span class="card-emoji">${a.emoji}</span>
        <div class="card-title">${a.name}</div>
        <span class="card-handle">${a.handle}</span>
        <div class="card-desc">${a.desc}</div>
        ${ts ? `<div class="card-ts">${ts}</div>` : ''}
        ${badge(agentStatus(a))}
      </div>`;
      el.addEventListener('click', () => openPanel({ type:'agent', key:a.key }));
      canvas.appendChild(el);
    });

    // Hub (HairLove)
    { const p = xy(HUB);
      const el = mkNode('node hub', p.x, p.y);
      el.innerHTML = `<div class="card">
        <span class="card-emoji">🐱</span>
        <div class="card-title">HairLove</div>
        <div class="card-sub">ГАЛАКТИКА</div>
        <div class="card-desc">Бренд косметики для волос</div>
        <span class="badge b-hub">⚡ /full-cycle</span>
      </div>`;
      el.addEventListener('click', () => openPanel({ type:'project' }));
      canvas.appendChild(el); }

    // Owner (Pavel)
    { const p = xy(OWNER);
      const el = mkNode('node owner', p.x, p.y);
      el.innerHTML = `<div class="card">
        <div class="owner-avatar">👤</div>
        <div class="card-title">Павел</div>
        <div class="card-sub">ВЛАДЕЛЕЦ</div>
      </div>`;
      el.addEventListener('click', () => openPanel({ type:'owner' }));
      canvas.appendChild(el); }

    // Placeholders
    EXTRA.forEach(pos => {
      const p = xy(pos);
      const el = mkNode('node placeholder', p.x, p.y);
      el.innerHTML = `<div class="card">
        <span class="card-emoji">📦</span>
        <div class="card-title">Новое направление</div>
        <span class="badge b-stage"><span class="dot"></span>Скоро</span>
      </div>`;
      canvas.appendChild(el);
    });
  }

  function mkNode(cls, x, y) {
    const el = document.createElement('div');
    el.className = cls;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    return el;
  }

  // ── Bottom bar ────────────────────────────────────────────
  function renderBar() {
    const bar = document.getElementById('bottomBar');
    const links = AGENTS.map(a =>
      `<button class="bar-btn" data-key="${a.key}">
         <span class="bh">${a.handle}</span> ${a.name}
       </button>`
    ).join('');
    bar.innerHTML = `<span class="bar-hint">Нажми на планету → детали</span><span class="bar-sep">|</span>${links}`;
    bar.querySelectorAll('.bar-btn').forEach(b =>
      b.addEventListener('click', () => openPanel({ type:'agent', key: b.dataset.key })));
  }

  // ── Panel ─────────────────────────────────────────────────
  function openPanel(ctx) {
    activePanel = ctx;
    document.getElementById('panel').classList.add('open');
    renderPanel();
  }
  function closePanel() {
    activePanel = null;
    document.getElementById('panel').classList.remove('open');
  }

  async function renderPanel() {
    if (!activePanel) return;
    const titleEl = document.getElementById('panelTitle');
    const bodyEl  = document.getElementById('panelBody');

    if (activePanel.type === 'owner') {
      titleEl.textContent = '👤 Павел';
      bodyEl.innerHTML = `
        <div class="p-section">
          <h4>Роль</h4>
          <p class="p-text">Владелец системы агентов. Управляет направлениями через оркестратора каждого проекта.</p>
        </div>
        <div class="p-section">
          <h4>Направления</h4>
          <div class="agent-chips">
            <div class="agent-chip" onclick="openPanel({type:'project'})">🐱 HairLove</div>
          </div>
        </div>`;
      return;
    }

    if (activePanel.type === 'project') {
      titleEl.textContent = '🐱 HairLove';
      const evs = await get(`/api/agents/events?project=${PROJECT}&limit=40`) || [];
      bodyEl.innerHTML = `
        <div class="p-section">
          <h4>Агенты</h4>
          <div class="agent-chips">
            ${AGENTS.map(a=>`<div class="agent-chip" onclick="openPanel({type:'agent',key:'${a.key}'})">${a.emoji} ${a.name}</div>`).join('')}
          </div>
        </div>
        <div class="p-section">
          <h4>Лента событий (${evs.length})</h4>
          <div class="events">${evs.length ? [...evs].reverse().map(fmtEv).join('') : '<div class="empty-ev">событий пока нет</div>'}</div>
        </div>`;
      return;
    }

    if (activePanel.type === 'agent') {
      const a = AGENTS.find(x => x.key === activePanel.key);
      if (!a) return;
      titleEl.innerHTML = `${a.emoji} ${a.name}`;
      const evs = await get(`/api/agents/events?project=${PROJECT}&agent=${a.key}&limit=50`) || [];
      bodyEl.innerHTML = `
        <div class="p-section">
          <h4>Агент</h4>
          <div style="margin-bottom:6px"><code style="background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:6px;font-size:12px">${a.handle}</code></div>
          <p class="p-text">${a.desc}</p>
        </div>
        <div class="p-section">
          <button class="back-btn" onclick="openPanel({type:'project'})">← HairLove</button>
        </div>
        <div class="p-section">
          <h4>События (${evs.length})</h4>
          <div class="events">${evs.length ? [...evs].reverse().map(fmtEv).join('') : '<div class="empty-ev">агент ещё не работал</div>'}</div>
        </div>`;
      return;
    }
  }

  function fmtEv(e) {
    const time = (e.ts||'').slice(11,16);
    const type = e.type||'step';
    const a = AGENTS.find(x=>x.key===e.agent);
    return `<div class="ev ${type}">
      <div class="meta">
        <span>${time}</span>
        <span>${a?a.emoji:'•'}</span>
        <span class="ev-agent">${esc(a?a.name:(e.agent||'—'))}</span>
        <span style="margin-left:auto;font-size:10px;opacity:.7">${type}</span>
      </div>
      <div class="ev-msg">${esc(e.message||'')}</div>
    </div>`;
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ── Toast ─────────────────────────────────────────────────
  function toast(e) {
    const a = AGENTS.find(x=>x.key===e.agent);
    const div = document.createElement('div');
    div.className = 'toast';
    div.innerHTML = `${a?a.emoji:'•'} <b>${esc(a?a.name:(e.agent||'—'))}</b>: ${esc((e.message||'').slice(0,90))}`;
    document.getElementById('toasts').appendChild(div);
    setTimeout(()=>div.remove(), 4500);
  }

  // ── Polling ───────────────────────────────────────────────
  async function loadProject() {
    const list = await get('/api/agents/projects');
    if (list) {
      projData = list.find(p=>p.name===PROJECT)||null;
      render();
      if (activePanel) renderPanel();
    }
  }

  async function pollEvents() {
    const url = lastEvTs
      ? `/api/agents/events?project=${PROJECT}&since=${encodeURIComponent(lastEvTs)}&limit=20`
      : `/api/agents/events?project=${PROJECT}&limit=1`;
    const evs = await get(url);
    if (evs && evs.length) {
      evs.forEach(e => {
        if (e.ts > lastEvTs) {
          lastEvTs = e.ts;
          agentTs[e.agent] = fmtTs(e.ts);
          toast(e);
        }
      });
    }
  }

  // ── Init ──────────────────────────────────────────────────
  window.addEventListener('resize', render);
  document.addEventListener('keydown', e => { if (e.key==='Escape') closePanel(); });

  renderBar();

  (async () => {
    await loadProject();
    const last = await get(`/api/agents/events?project=${PROJECT}&limit=20`);
    if (last && last.length) {
      lastEvTs = last[last.length-1].ts;
      last.forEach(e => { if (!agentTs[e.agent]) agentTs[e.agent] = fmtTs(e.ts); });
      render();
    }
    setInterval(loadProject, 8000);
    setInterval(pollEvents, 3000);
  })();

  window.openPanel = openPanel;
  window.closePanel = closePanel;
</script>
</body>
</html>
