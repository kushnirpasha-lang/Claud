<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HairLove — Agent System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a14;
    color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.02);
    height: 54px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .header-brand .dot {
    width: 8px; height: 8px;
    background: #a78bfa;
    border-radius: 50%;
    box-shadow: 0 0 8px #a78bfa;
    animation: pulse-dot 2s infinite;
  }
  .header-center {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.3px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #10b981;
    background: rgba(16,185,129,0.1);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(16,185,129,0.2);
  }
  .header-status .s-dot {
    width: 6px; height: 6px;
    background: #10b981;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }
  .header-time {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  /* Canvas */
  .canvas {
    position: relative;
    width: 100vw;
    height: calc(100vh - 54px);
    overflow: hidden;
  }

  /* Pulse rings */
  .pulse-ring {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(99,102,241,0.18);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: ring-expand 3s ease-out infinite;
  }
  .pulse-ring:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
  .pulse-ring:nth-child(2) { width: 200px; height: 200px; animation-delay: 1s; }
  .pulse-ring:nth-child(3) { width: 200px; height: 200px; animation-delay: 2s; }

  @keyframes ring-expand {
    0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
    100% { transform: translate(-50%,-50%) scale(3.2); opacity: 0; }
  }

  /* SVG lines */
  svg.lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }

  .line {
    stroke: rgba(167, 139, 250, 0.2);
    stroke-width: 1.5;
    fill: none;
    stroke-dasharray: 6 5;
    animation: dash-anim 18s linear infinite;
  }
  .line.active {
    stroke: rgba(167, 139, 250, 0.45);
    stroke-width: 2;
    stroke-dasharray: 5 4;
    animation-duration: 10s;
  }

  @keyframes dash-anim {
    to { stroke-dashoffset: -200; }
  }

  /* Nodes */
  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 10;
    cursor: pointer;
  }

  /* Pavel — center */
  .node-center { left: 50%; top: 50%; }
  .node-center .card {
    width: 136px;
    background: linear-gradient(135deg, #1e1b4b, #2d2a7a);
    border: 2px solid rgba(99,102,241,0.8);
    border-radius: 20px;
    padding: 18px 14px;
    text-align: center;
    box-shadow: 0 0 36px rgba(99,102,241,0.28), 0 0 72px rgba(99,102,241,0.1);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .node-center .card:hover {
    box-shadow: 0 0 56px rgba(99,102,241,0.5), 0 0 100px rgba(99,102,241,0.15);
    transform: scale(1.04);
  }
  .avatar {
    width: 50px; height: 50px;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin: 0 auto 9px;
    box-shadow: 0 0 18px rgba(167,139,250,0.4);
  }
  .center-name {
    font-size: 14px; font-weight: 700;
    color: #fff;
  }
  .center-role {
    font-size: 9px;
    color: #a5b4fc;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  /* Agent nodes */
  .node .card {
    width: 148px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
    transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    backdrop-filter: blur(10px);
  }
  .node .card:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(167,139,250,0.5);
    transform: scale(1.05);
    box-shadow: 0 0 28px rgba(167,139,250,0.15);
  }

  .node .ico   { font-size: 26px; display: block; margin-bottom: 6px; line-height: 1; }
  .node .aname { font-size: 12px; font-weight: 600; color: #e2e8f0; margin-bottom: 2px; }
  .node .acmd  { font-size: 10px; color: #6366f1; font-family: 'SF Mono', ui-monospace, monospace; margin-bottom: 6px; display: block; }
  .node .adesc { font-size: 10px; color: #94a3b8; line-height: 1.4; margin-bottom: 8px; min-height: 26px; }
  .node .ats   { font-size: 9px; color: rgba(255,255,255,0.2); margin-bottom: 6px; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600; white-space: nowrap;
  }
  .badge .bd { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .b-active   { background: rgba(16,185,129,0.14); color: #10b981; border: 1px solid rgba(16,185,129,0.28); }
  .b-active .bd { animation: blink-bd 1.8s ease-in-out infinite; }
  .b-working  { background: rgba(245,158,11,0.14); color: #f59e0b; border: 1px solid rgba(245,158,11,0.28); }
  .b-pending  { background: rgba(107,114,128,0.12); color: #9ca3af; border: 1px solid rgba(107,114,128,0.2); }
  .b-stage    { background: rgba(107,114,128,0.08); color: #6b7280; border: 1px solid rgba(107,114,128,0.15); }

  @keyframes blink-bd { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Slide panel */
  .panel {
    position: fixed; top: 54px; right: 0; bottom: 0;
    width: 420px; max-width: 90vw;
    background: #0f0f1f;
    border-left: 1px solid rgba(255,255,255,0.09);
    transform: translateX(100%);
    transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
    z-index: 30; display: flex; flex-direction: column;
    box-shadow: -6px 0 40px rgba(0,0,0,0.5);
  }
  .panel.open { transform: none; }
  .panel-head {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .panel-close {
    width: 28px; height: 28px; border-radius: 8px;
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: rgba(255,255,255,0.35);
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .panel-close:hover { color: #fff; background: rgba(255,255,255,0.07); }
  .panel-body { flex: 1; overflow-y: auto; padding: 14px 18px; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .psec { margin-bottom: 18px; }
  .psec h4 { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
  .psec p  { font-size: 12px; color: #94a3b8; line-height: 1.5; }

  /* Events */
  .evlist { display: flex; flex-direction: column; gap: 6px; }
  .ev {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-left: 2.5px solid rgba(99,102,241,0.6);
    border-radius: 9px; padding: 8px 11px; font-size: 11px;
  }
  .ev .emeta { display: flex; gap: 6px; align-items: center; color: rgba(255,255,255,0.35); font-size: 10px; margin-bottom: 3px; }
  .ev .emeta b { color: #e2e8f0; font-weight: 600; }
  .ev .emsg { color: #cbd5e1; line-height: 1.4; }
  .ev.start    { border-left-color: #60a5fa; }
  .ev.step     { border-left-color: #10b981; }
  .ev.complete { border-left-color: #10b981; background: rgba(16,185,129,0.06); }
  .ev.handoff  { border-left-color: #a78bfa; }
  .ev.error    { border-left-color: #f87171; }
  .ev.wait     { border-left-color: #f59e0b; }
  .no-ev { padding: 20px; text-align: center; color: rgba(255,255,255,0.25); font-size: 12px; }

  /* Bottom bar */
  .bar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 48px;
    background: rgba(10,10,20,0.95);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center;
    padding: 0 20px; gap: 6px;
    backdrop-filter: blur(10px);
    z-index: 10; overflow-x: auto;
  }
  .bar::-webkit-scrollbar { display: none; }
  .bar-hint { font-size: 11px; color: rgba(255,255,255,0.25); white-space: nowrap; flex-shrink: 0; }
  .bar-sep  { color: rgba(255,255,255,0.1); flex-shrink: 0; padding: 0 4px; }
  .bar-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 7px; flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.09);
    font-size: 11px; cursor: pointer; font-family: inherit;
    color: rgba(255,255,255,0.5); transition: all 0.15s; white-space: nowrap;
  }
  .bar-btn:hover { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.35); color: #a78bfa; }
  .bar-btn .bh { color: #6366f1; font-family: 'SF Mono', ui-monospace, monospace; font-size: 10px; }

  /* Toasts */
  .toasts { position: fixed; bottom: 56px; right: 14px; z-index: 40; display: flex; flex-direction: column; gap: 7px; }
  .toast {
    background: rgba(15,15,30,0.97);
    border: 1px solid rgba(255,255,255,0.1);
    border-left: 3px solid #a78bfa;
    padding: 9px 13px; border-radius: 10px; font-size: 12px;
    max-width: 280px; color: #e2e8f0; backdrop-filter: blur(10px);
    animation: slide-in 0.2s ease;
  }
  @keyframes slide-in { from { transform: translateX(14px); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="dot"></div>
    HairLove — Agent System
  </div>
  <div class="header-center">Система агентов — Pavel · v2.1</div>
  <div class="header-right">
    <div class="header-status"><span class="s-dot"></span>Система активна</div>
    <div class="header-time" id="clock">--:--:--</div>
  </div>
</div>

<div class="canvas" id="canvas">
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>

  <svg class="lines" id="lines"></svg>

  <!-- Pavel center -->
  <div class="node node-center" id="nc" onclick="openPanel({t:'owner'})">
    <div class="card">
      <div class="avatar">👤</div>
      <div class="center-name">Павел</div>
      <div class="center-role">Orchestrator</div>
    </div>
  </div>

  <!-- Agents — rendered by JS -->
</div>

<!-- Slide panel -->
<aside class="panel" id="panel">
  <div class="panel-head">
    <div class="panel-title" id="ptitle">—</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="pbody"></div>
</aside>

<!-- Bottom bar -->
<div class="bar" id="bar"></div>

<!-- Toasts -->
<div class="toasts" id="toasts"></div>

<script>
const PRJ = 'hairlove';

const AGENTS = [
  { k:'texts',       n:'Тексты бренда', cmd:'/hairlove-texts',       ico:'✍️',  d:'Instagram, сайт, реклама, email',      lx:0.22, ly:0.22, def:'active'  },
  { k:'instagram',   n:'Instagram',     cmd:'/hairlove-insta',        ico:'📸',  d:'Публикация постов, контент-план',      lx:0.78, ly:0.22, def:'active'  },
  { k:'strategy',    n:'Стратегия',     cmd:'/hairlove-strategy',     ico:'🎯',  d:'Рост, позиционирование, план',         lx:0.14, ly:0.50, def:'working' },
  { k:'site',        n:'Сайт',          cmd:'/hairlove-site',         ico:'🌐',  d:'B2B витрина, тексты, SEO',             lx:0.86, ly:0.50, def:'pending' },
  { k:'competitors', n:'Конкуренты',    cmd:'/hairlove-competitors',  ico:'🔍',  d:'Анализ рынка, тренды',                 lx:0.22, ly:0.78, def:'pending' },
  { k:'ads',         n:'Реклама',       cmd:'/hairlove-ads',          ico:'📣',  d:'Meta Ads, Google Ads, таргетинг',      lx:0.78, ly:0.78, def:'stage'   },
];

const ACTIVE_LINES = ['texts', 'instagram'];
const BADGE_MAP = {
  active:  ['b-active',  '● Активен'],
  working: ['b-working', '◐ В работе'],
  pending: ['b-pending', '○ Предстоит'],
  stage:   ['b-stage',   '○ Этап 2'],
  done:    ['b-active',  '✓ Готово'],
};

let projData = null, aTs = {}, lastTs = '', panCtx = null;

/* ── Clock ── */
function tick() {
  const d = new Date();
  document.getElementById('clock').textContent =
    p2(d.getHours()) + ':' + p2(d.getMinutes()) + ':' + p2(d.getSeconds());
}
function p2(n) { return String(n).padStart(2,'0'); }
setInterval(tick, 1000); tick();

/* ── Badge ── */
function badge(st) {
  const [cls, lbl] = BADGE_MAP[st] || ['b-pending','○ Ожидает'];
  const dot = cls === 'b-active' ? '<span class="bd"></span>' : '';
  return `<span class="badge ${cls}">${dot}${lbl}</span>`;
}
function agSt(a) { return projData?.active_agent === a.k ? 'active' : a.def; }

/* ── Format ts ── */
function fts(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return 'обновлён ' + d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'2-digit'})
      + ' ' + d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  } catch { return ''; }
}

/* ── Render canvas ── */
function render() {
  const canvas = document.getElementById('canvas');
  const svg    = document.getElementById('lines');
  canvas.querySelectorAll('.node:not(#nc)').forEach(n => n.remove());
  svg.innerHTML = '';

  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  const cx = W * 0.5, cy = H * 0.5;

  AGENTS.forEach(a => {
    const x = W * a.lx, y = H * a.ly;
    const isActive = ACTIVE_LINES.includes(a.k) || projData?.active_agent === a.k;

    /* Line */
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', x);  line.setAttribute('y2', y);
    line.setAttribute('class', 'line' + (isActive ? ' active' : ''));
    svg.appendChild(line);

    /* Node */
    const el = document.createElement('div');
    el.className = 'node';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    const ts = aTs[a.k] ? `<div class="ats">${aTs[a.k]}</div>` : '';
    el.innerHTML = `<div class="card">
      <span class="ico">${a.ico}</span>
      <div class="aname">${a.n}</div>
      <span class="acmd">${a.cmd}</span>
      <div class="adesc">${a.d}</div>
      ${ts}
      ${badge(agSt(a))}
    </div>`;
    el.addEventListener('click', () => openPanel({t:'agent', k: a.k}));
    canvas.appendChild(el);
  });
}

/* ── Bottom bar ── */
function renderBar() {
  const bar = document.getElementById('bar');
  bar.innerHTML = `<span class="bar-hint">Нажми на агента →</span><span class="bar-sep">|</span>`
    + AGENTS.map(a =>
      `<button class="bar-btn" data-k="${a.k}"><span class="bh">${a.cmd}</span>${a.n}</button>`
    ).join('');
  bar.querySelectorAll('.bar-btn').forEach(b =>
    b.addEventListener('click', () => openPanel({t:'agent', k: b.dataset.k}))
  );
}

/* ── Panel ── */
function openPanel(ctx) { panCtx = ctx; document.getElementById('panel').classList.add('open'); drawPanel(); }
function closePanel()   { panCtx = null; document.getElementById('panel').classList.remove('open'); }

async function drawPanel() {
  if (!panCtx) return;
  const T = document.getElementById('ptitle'), B = document.getElementById('pbody');

  if (panCtx.t === 'owner') {
    T.innerHTML = '👤 Павел';
    B.innerHTML = `<div class="psec"><h4>Роль</h4><p>Владелец системы. Управляет всеми агентами HairLove через оркестратора.</p></div>
      <div class="psec"><h4>Проект</h4><p>🐱 HairLove — косметика для волос, Made in Italy</p></div>`;
    return;
  }

  if (panCtx.t === 'agent') {
    const a = AGENTS.find(x => x.k === panCtx.k);
    if (!a) return;
    T.innerHTML = `${a.ico} ${a.n}`;
    B.innerHTML = '<div class="psec"><p style="color:rgba(255,255,255,0.2);font-size:11px">загрузка событий…</p></div>';
    const evs = await get(`/api/agents/events?project=${PRJ}&agent=${a.k}&limit=50`) || [];
    B.innerHTML = `<div class="psec"><h4>Агент</h4>
      <div style="margin-bottom:6px"><code style="background:rgba(99,102,241,0.15);color:#818cf8;padding:2px 8px;border-radius:6px;font-size:11px;font-family:ui-monospace,'SF Mono',monospace">${a.cmd}</code></div>
      <p>${a.d}</p></div>
      <div class="psec"><h4>События (${evs.length})</h4>
      <div class="evlist">${evs.length ? [...evs].reverse().map(fe).join('') : '<div class="no-ev">агент ещё не работал</div>'}</div></div>`;
  }
}

function fe(e) {
  const t = (e.ts||'').slice(11,16), tp = e.type || 'step';
  const a = AGENTS.find(x => x.k === e.agent);
  return `<div class="ev ${tp}">
    <div class="emeta"><span>${t}</span><span>${a?a.ico:'•'}</span><b>${esc(a?a.n:(e.agent||'—'))}</b><span style="margin-left:auto;opacity:.5;font-size:9px">${tp}</span></div>
    <div class="emsg">${esc(e.message||'')}</div></div>`;
}
function esc(s) { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ── Toast ── */
function toast(e) {
  const a = AGENTS.find(x => x.k === e.agent);
  const d = document.createElement('div'); d.className = 'toast';
  d.innerHTML = `${a?a.ico:'•'} <b>${esc(a?a.n:(e.agent||''))}</b>: ${esc((e.message||'').slice(0,80))}`;
  document.getElementById('toasts').appendChild(d);
  setTimeout(() => d.remove(), 4500);
}

/* ── API ── */
async function get(u) { try { return await (await fetch(u)).json(); } catch { return null; } }

/* ── Polling ── */
async function loadProj() {
  const list = await get('/api/agents/projects');
  if (list) {
    projData = list.find(p => p.name === PRJ) || null;
    render();
    if (panCtx) drawPanel();
  }
}

async function poll() {
  const url = lastTs
    ? `/api/agents/events?project=${PRJ}&since=${encodeURIComponent(lastTs)}&limit=20`
    : `/api/agents/events?project=${PRJ}&limit=1`;
  const evs = await get(url);
  if (evs?.length) {
    evs.forEach(e => {
      if (e.ts > lastTs) { lastTs = e.ts; aTs[e.agent] = fts(e.ts); toast(e); }
    });
  }
}

/* ── Init ── */
window.addEventListener('resize', render);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

renderBar();

(async () => {
  await loadProj();
  const last = await get(`/api/agents/events?project=${PRJ}&limit=20`);
  if (last?.length) {
    lastTs = last[last.length-1].ts;
    last.forEach(e => { if (!aTs[e.agent]) aTs[e.agent] = fts(e.ts); });
    render();
  }
  setInterval(loadProj, 8000);
  setInterval(poll, 3000);
})();

window.openPanel = openPanel;
window.closePanel = closePanel;
</script>
</body>
</html>
