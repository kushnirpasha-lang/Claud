<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Агентная система</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --surface3: #252525;
      --border: #2a2a2a;
      --text: #e2e2e2;
      --text-muted: #666;
      --text-dim: #999;
      --accent: #2563eb;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Шапка ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    .header-sub { font-size: 12px; color: var(--text-muted); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
    }

    .pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-anim 2s infinite;
    }
    .pulse.dead { background: #444; animation: none; }

    @keyframes pulse-anim {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .header-link {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.15s;
    }
    .header-link:hover { color: var(--text); border-color: #444; background: var(--surface2); }

    /* ── Основная область ── */
    .main {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* ── Раздел проектов ── */
    .projects-section {
      flex-shrink: 0;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .projects-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-behavior: smooth;
    }

    .projects-scroll::-webkit-scrollbar { height: 4px; }
    .projects-scroll::-webkit-scrollbar-track { background: transparent; }
    .projects-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .project-card {
      flex-shrink: 0;
      width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      transition: border-color 0.2s;
      cursor: default;
    }

    .project-card.active {
      border-color: #2563eb55;
      background: #0d1829;
    }

    .project-card:hover { border-color: #3a3a3a; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.active { background: var(--green); box-shadow: 0 0 6px #22c55e88; animation: pulse-anim 2s infinite; }
    .status-dot.idle   { background: #444; }
    .status-dot.error  { background: var(--red); }

    .card-agent {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
      min-height: 18px;
    }

    .agent-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .card-events {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .card-event-row {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-event-row .ev-time {
      color: #444;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .card-event-row .ev-msg {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-empty {
      font-size: 11px;
      color: #444;
      font-style: italic;
    }

    /* Карточка "добавить проект" */
    .card-add {
      flex-shrink: 0;
      width: 160px;
      background: var(--surface);
      border: 1px dashed #2a2a2a;
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: default;
    }

    .card-add-icon {
      width: 32px; height: 32px;
      background: var(--surface2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: #444;
    }

    /* ── Лента событий ── */
    .feed-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px 20px 16px;
    }

    .feed-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .filter-chip {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .filter-chip:hover { border-color: #444; color: var(--text); }
    .filter-chip.selected { background: #1e3a8a33; border-color: var(--accent); color: #93c5fd; }

    .feed-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feed-list::-webkit-scrollbar { width: 4px; }
    .feed-list::-webkit-scrollbar-track { background: transparent; }
    .feed-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .feed-row {
      display: grid;
      grid-template-columns: 70px 80px 100px 1fr;
      gap: 8px;
      align-items: center;
      padding: 5px 10px;
      border-radius: 7px;
      font-size: 12px;
      transition: background 0.1s;
    }
    .feed-row:hover { background: var(--surface2); }
    .feed-row.new-event { animation: flash 0.6s ease-out; }

    @keyframes flash {
      0% { background: #1e3a8a33; }
      100% { background: transparent; }
    }

    .feed-time { color: #555; font-variant-numeric: tabular-nums; font-size: 11px; }

    .feed-project {
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
    }

    .feed-agent {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .feed-msg {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .type-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 600;
      margin-left: 4px;
    }
    .type-start    { background: #1e3a8a33; color: #60a5fa; }
    .type-step     { background: #14532d33; color: #86efac; }
    .type-complete { background: #14532d55; color: #4ade80; }
    .type-handoff  { background: #44337a33; color: #c084fc; }
    .type-error    { background: #7f1d1d33; color: #f87171; }
    .type-wait     { background: #44337a22; color: #a78bfa; }

    .feed-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }

    .feed-empty-icon {
      font-size: 32px;
      opacity: 0.3;
    }

    .feed-empty p { font-size: 13px; }
    .feed-empty code {
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      color: #f59e0b;
      font-family: monospace;
    }

    /* ── Индикатор загрузки ── */
    .loading-bar {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      position: fixed;
      top: 0; left: 0; right: 0;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
    }
    .loading-bar.visible { opacity: 1; }

    @keyframes loading {
      0% { background-position: -100% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── Уведомление о новом событии ── */
    .toast {
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text);
      box-shadow: 0 4px 20px #00000066;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      max-width: 300px;
      z-index: 200;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── Адаптив ── */
    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      .projects-section, .feed-section { padding-left: 14px; padding-right: 14px; }
      .feed-row { grid-template-columns: 60px 1fr; }
      .feed-project, .feed-agent { display: none; }
    }
  </style>
</head>
<body>

<div class="loading-bar" id="loading-bar"></div>

<header>
  <div class="header-left">
    <div class="logo">🤖</div>
    <div>
      <h1>Агентная система</h1>
      <div class="header-sub" id="last-update">загрузка...</div>
    </div>
  </div>
  <div class="header-right">
    <div class="stat-pill">
      <div class="pulse" id="live-dot"></div>
      <span id="stat-projects">0 проектов</span>
    </div>
    <div class="stat-pill" id="stat-events-pill">
      <span id="stat-events">0 событий</span>
    </div>
    <a href="/" class="header-link">💬 Чат</a>
  </div>
</header>

<div class="main">

  <!-- Проекты -->
  <div class="projects-section">
    <div class="section-label">
      Проекты
      <span id="active-count" style="color:#22c55e;font-weight:400;display:none;"></span>
    </div>
    <div class="projects-scroll" id="projects-scroll">
      <div class="project-card" style="opacity:0.4;">
        <div class="card-header">
          <div class="card-name" style="color:#555;">Загрузка...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Лента событий -->
  <div class="feed-section">
    <div class="feed-controls">
      <div class="section-label" style="margin-bottom:0;">Лента событий</div>
      <div id="filter-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-left:8px;"></div>
    </div>
    <div class="feed-list" id="feed-list">
      <div class="feed-empty">
        <div class="feed-empty-icon">📡</div>
        <p>Ожидаю события от агентов...</p>
        <code>curl -X POST http://188.166.67.237/events -H "Content-Type: application/json" -d '{"project":"demo","agent":"coordinator","type":"start","message":"тест"}'</code>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Константы ──────────────────────────────────────────────────────────────
const POLL_INTERVAL   = 3000;   // мс между опросами
const MAX_FEED_ROWS   = 200;    // максимум строк в ленте
const AGENT_EMOJI = {
  coordinator:  '🎯',
  planning:     '📋',
  competitors:  '🔍',
  strategy:     '🧭',
  site:         '🌐',
  ads:          '📢',
  growth:       '📈',
  instagram:    '📱',
  copy:         '✍️',
  'text-editor':'🖋️',
};
const TYPE_LABELS = {
  start: 'старт', step: 'шаг', complete: 'готово',
  handoff: 'передача', error: 'ошибка', wait: 'ожидание',
};

// ── Состояние ──────────────────────────────────────────────────────────────
let lastEventTs   = '';       // последний ts, чтобы не показывать дубли
let filterProject = null;     // активный фильтр по проекту
let feedItems     = [];       // текущие строки ленты
let isFirstLoad   = true;

// ── Утилиты ────────────────────────────────────────────────────────────────
function fmtTime(ts) {
  if (!ts) return '--:--';
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return ts.slice(11, 19) || '--:--'; }
}

function fmtAgo(ts) {
  if (!ts) return '';
  const sec = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (sec < 60)  return `${sec}с назад`;
  if (sec < 3600) return `${Math.floor(sec/60)}м назад`;
  return `${Math.floor(sec/3600)}ч назад`;
}

function agentEmoji(agent) {
  return AGENT_EMOJI[agent] || '🤖';
}

function typeBadge(type) {
  const label = TYPE_LABELS[type] || type;
  return `<span class="type-badge type-${type}">${label}</span>`;
}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Loading bar ────────────────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loading-bar').classList.toggle('visible', on);
}

// ── Рендер карточек проектов ───────────────────────────────────────────────
function renderProjects(projects) {
  const container = document.getElementById('projects-scroll');
  const activeProjs = projects.filter(p => p.active_agent);

  // Статистика в шапке
  document.getElementById('stat-projects').textContent =
    `${projects.length} ${plural(projects.length, 'проект', 'проекта', 'проектов')}`;

  const countEl = document.getElementById('active-count');
  if (activeProjs.length > 0) {
    countEl.textContent = `${activeProjs.length} активн.`;
    countEl.style.display = 'inline';
  } else {
    countEl.style.display = 'none';
  }

  // Перестраиваем карточки
  container.innerHTML = '';

  projects.forEach(proj => {
    const isActive = !!proj.active_agent;
    const card = document.createElement('div');
    card.className = `project-card ${isActive ? 'active' : ''}`;

    const events = proj.recent_events || [];
    const evRows = events.slice(-3).reverse().map(e =>
      `<div class="card-event-row">
        <span class="ev-time">${fmtTime(e.ts)}</span>
        <span class="ev-msg">${agentEmoji(e.agent)} ${escHtml(e.message || '')}</span>
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-header">
        <div class="card-name" title="${escHtml(proj.name)}">${escHtml(proj.name)}</div>
        <div class="status-dot ${isActive ? 'active' : 'idle'}"></div>
      </div>
      <div class="card-agent">
        ${isActive
          ? `<span class="agent-badge">${agentEmoji(proj.active_agent)} ${escHtml(proj.active_agent)}</span>`
          : `<span style="color:#444;font-size:11px;">${proj.last_event ? fmtAgo(proj.last_event.ts) : 'нет событий'}</span>`
        }
      </div>
      <div class="card-events">
        ${evRows || '<div class="card-empty">нет событий</div>'}
      </div>`;

    // Клик — фильтр ленты по проекту
    card.addEventListener('click', () => {
      filterProject = filterProject === proj.name ? null : proj.name;
      renderFilterChips(projects);
      renderFeed();
    });

    container.appendChild(card);
  });

  // Карточка «добавить»
  const addCard = document.createElement('div');
  addCard.className = 'card-add';
  addCard.innerHTML = `
    <div class="card-add-icon">＋</div>
    <div>новый проект</div>
    <div style="font-size:10px;color:#444;text-align:center;">~/projects/новый-проект.sh</div>`;
  container.appendChild(addCard);
}

// ── Рендер чипов фильтра ───────────────────────────────────────────────────
function renderFilterChips(projects) {
  const container = document.getElementById('filter-chips');
  container.innerHTML = '';

  const allChip = document.createElement('div');
  allChip.className = `filter-chip ${!filterProject ? 'selected' : ''}`;
  allChip.textContent = 'Все';
  allChip.addEventListener('click', () => { filterProject = null; renderFilterChips(projects); renderFeed(); });
  container.appendChild(allChip);

  projects.forEach(proj => {
    const chip = document.createElement('div');
    chip.className = `filter-chip ${filterProject === proj.name ? 'selected' : ''}`;
    chip.textContent = proj.name;
    chip.addEventListener('click', () => {
      filterProject = filterProject === proj.name ? null : proj.name;
      renderFilterChips(projects);
      renderFeed();
    });
    container.appendChild(chip);
  });
}

// ── Рендер ленты событий ──────────────────────────────────────────────────
function renderFeed(newItems) {
  const list = document.getElementById('feed-list');

  if (newItems) {
    feedItems = [...feedItems, ...newItems].slice(-MAX_FEED_ROWS);
  }

  const visible = filterProject
    ? feedItems.filter(e => e.project === filterProject)
    : feedItems;

  if (visible.length === 0) {
    list.innerHTML = `
      <div class="feed-empty">
        <div class="feed-empty-icon">📡</div>
        <p>Ожидаю события от агентов...</p>
        <code>bash ~/.claude/событие.sh demo coordinator start "начинаю работу"</code>
      </div>`;
    return;
  }

  // Рендер: новые сверху
  const reversed = [...visible].reverse();

  // Если только добавляем новые — вставляем наверх без полного перестроения
  if (newItems && newItems.length > 0 && list.children.length > 0 && list.children[0].className !== 'feed-empty') {
    const frag = document.createDocumentFragment();
    const toAdd = filterProject
      ? newItems.filter(e => e.project === filterProject)
      : newItems;
    toAdd.reverse().forEach(e => {
      const row = buildFeedRow(e, true);
      frag.appendChild(row);
    });
    list.insertBefore(frag, list.firstChild);

    // Удаляем лишние строки снизу
    while (list.children.length > MAX_FEED_ROWS) {
      list.removeChild(list.lastChild);
    }
    return;
  }

  // Полный перестрой
  list.innerHTML = '';
  reversed.forEach(e => list.appendChild(buildFeedRow(e, false)));
}

function buildFeedRow(e, isNew) {
  const row = document.createElement('div');
  row.className = `feed-row${isNew ? ' new-event' : ''}`;
  row.innerHTML = `
    <span class="feed-time">${fmtTime(e.ts)}</span>
    <span class="feed-project" title="${escHtml(e.project || '')}">${escHtml(e.project || '—')}</span>
    <span class="feed-agent">${agentEmoji(e.agent)} ${escHtml(e.agent || '—')}</span>
    <span class="feed-msg">
      ${typeBadge(e.type || 'step')}
      ${escHtml(e.message || '')}
      ${e.artifact ? `<span style="color:#555;font-size:10px;margin-left:6px;">→ ${escHtml(e.artifact)}</span>` : ''}
    </span>`;
  return row;
}

// ── Escape HTML ────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Plural ─────────────────────────────────────────────────────────────────
function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return `${n} ${one}`;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return `${n} ${few}`;
  return `${n} ${many}`;
}

// ── Опрос бэкенда ──────────────────────────────────────────────────────────
let currentProjects = [];

async function pollProjects() {
  try {
    const res = await fetch('/api/agents/projects');
    if (!res.ok) return;
    const data = await res.json();
    currentProjects = data;
    renderProjects(data);
    if (isFirstLoad) {
      renderFilterChips(data);
    }
  } catch (e) {
    document.getElementById('live-dot').classList.add('dead');
  }
}

async function pollEvents() {
  try {
    const url = '/api/agents/events?limit=50' + (lastEventTs ? '&since=' + encodeURIComponent(lastEventTs) : '');
    const res  = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();

    if (data.length > 0) {
      const newTs = data[data.length - 1].ts;
      if (newTs > lastEventTs) {
        if (!isFirstLoad) {
          const last = data[data.length - 1];
          showToast(`${agentEmoji(last.agent)} [${last.project}] ${last.message || ''}`);
        }
        renderFeed(isFirstLoad ? null : data);
        if (isFirstLoad) {
          feedItems = data.slice(-MAX_FEED_ROWS);
          renderFeed();
        }
        lastEventTs = newTs;
      }
    } else if (isFirstLoad) {
      renderFeed();
    }

    document.getElementById('live-dot').classList.remove('dead');
  } catch (e) {
    document.getElementById('live-dot').classList.add('dead');
  }
}

async function pollStats() {
  try {
    const res = await fetch('/api/agents/stats');
    if (!res.ok) return;
    const data = await res.json();
    document.getElementById('stat-events').textContent =
      `${data.total_events} ${plural(data.total_events, 'событие', 'события', 'событий')}`;
    const upd = document.getElementById('last-update');
    upd.textContent = data.last_event_ts
      ? `обновлено ${fmtTime(data.last_event_ts)}`
      : 'нет активности';
  } catch { /* тихо */ }
}

// ── Старт ──────────────────────────────────────────────────────────────────
async function init() {
  setLoading(true);
  await Promise.all([pollProjects(), pollEvents(), pollStats()]);
  setLoading(false);
  isFirstLoad = false;

  // Обновляем проекты каждые 5с
  setInterval(async () => {
    await pollProjects();
    renderFilterChips(currentProjects);
  }, 5000);

  // Обновляем ленту каждые 3с
  setInterval(pollEvents, POLL_INTERVAL);

  // Статистику каждые 10с
  setInterval(pollStats, 10000);
}

init();
</script>
</body>
</html>
