<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Галактика агентов</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #07070d;
      --bg: #0b0b14;
      --surface: rgba(20, 20, 32, 0.85);
      --surface-solid: #14141f;
      --border: rgba(120, 120, 180, 0.18);
      --text: #e8e8f0;
      --muted: #8a8aa3;
      --dim: #5a5a72;
      --accent: #6366f1;
      --green: #22c55e;
      --yellow: #eab308;
      --orange: #f59e0b;
      --red: #ef4444;
      --purple: #a855f7;
      --blue: #3b82f6;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at center, #14142a 0%, var(--bg) 50%, var(--bg-deep) 100%);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Звёздный фон ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, white, transparent),
        radial-gradient(1px 1px at 60% 70%, white, transparent),
        radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 80% 10%, rgba(180,180,255,0.8), transparent),
        radial-gradient(1px 1px at 90% 60%, white, transparent),
        radial-gradient(1px 1px at 33% 80%, white, transparent),
        radial-gradient(1px 1px at 15% 65%, rgba(180,200,255,0.7), transparent),
        radial-gradient(1px 1px at 70% 30%, white, transparent);
      background-size: 100% 100%;
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    /* ── Шапка ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 16px;
    }
    .brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .stats {
      display: flex; gap: 20px;
      color: var(--muted);
      font-size: 13px;
    }
    .stats b { color: var(--text); font-weight: 600; }

    /* ── Галактика ── */
    .galaxy {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    .galaxy svg.orbits {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Солнце ── */
    .sun {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 130px; height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffe89b, #f59e0b 50%, #b45309 100%);
      box-shadow:
        0 0 60px rgba(245, 158, 11, 0.6),
        0 0 120px rgba(245, 158, 11, 0.3),
        inset -10px -20px 40px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s;
      z-index: 5;
    }
    .sun:hover { transform: translate(-50%, -50%) scale(1.05); }
    .sun .label {
      font-weight: 700;
      color: #1a1a2e;
      font-size: 16px;
      text-shadow: 0 1px 2px rgba(255,255,255,0.4);
    }
    .sun .role {
      color: rgba(26,26,46,0.7);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Планета (проект) ── */
    .planet {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 3;
      transition: transform 0.2s;
    }
    .planet:hover { transform: translate(-50%, -50%) scale(1.08); z-index: 6; }

    .planet-body {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #6b7cff, #3b4cca 60%, #1e2a78 100%);
      box-shadow: 0 0 24px rgba(99, 102, 241, 0.4), inset -6px -10px 20px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      position: relative;
    }
    .planet.active .planet-body {
      background: radial-gradient(circle at 30% 30%, #86efac, #22c55e 60%, #14532d 100%);
      box-shadow: 0 0 32px rgba(34, 197, 94, 0.6), 0 0 64px rgba(34,197,94,0.2), inset -6px -10px 20px rgba(0,0,0,0.4);
      animation: planetPulse 2s infinite;
    }
    @keyframes planetPulse {
      0%, 100% { box-shadow: 0 0 32px rgba(34, 197, 94, 0.6), inset -6px -10px 20px rgba(0,0,0,0.4); }
      50% { box-shadow: 0 0 48px rgba(34, 197, 94, 0.9), 0 0 80px rgba(34,197,94,0.3), inset -6px -10px 20px rgba(0,0,0,0.4); }
    }
    .planet-name {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    .planet-status {
      position: absolute;
      top: calc(100% + 28px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Спутники (агенты вокруг проекта) ── */
    .moons {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .planet:hover .moons,
    .planet.expanded .moons {
      opacity: 1;
      pointer-events: auto;
    }
    .moon {
      position: absolute;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface-solid);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      transform: translate(-50%, -50%);
    }
    .moon:hover {
      transform: translate(-50%, -50%) scale(1.3);
      border-color: var(--accent);
      box-shadow: 0 0 16px rgba(99,102,241,0.5);
    }
    .moon.active {
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.6);
    }
    .moon-tooltip {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-solid);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .moon:hover .moon-tooltip { opacity: 1; }

    /* ── Кнопка "новый проект" ── */
    .planet.add .planet-body {
      background: transparent;
      border: 2px dashed var(--dim);
      box-shadow: none;
      color: var(--muted);
      font-size: 24px;
    }

    /* ── Side панель (детали) ── */
    .panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 460px;
      max-width: 90vw;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 20;
      display: flex;
      flex-direction: column;
    }
    .panel.open { transform: translateX(0); }
    .panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-size: 18px; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .panel-close {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 24px;
      width: 32px; height: 32px;
      border-radius: 6px;
    }
    .panel-close:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .panel-section { margin-bottom: 18px; }
    .panel-section h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 8px;
    }
    .agent-chip {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .agent-chip:hover { border-color: var(--accent); transform: translateY(-2px); }
    .agent-chip.active { border-color: var(--green); box-shadow: 0 0 10px rgba(34,197,94,0.3); }
    .agent-chip .emoji { font-size: 22px; }
    .agent-chip .name { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .events { display: flex; flex-direction: column; gap: 6px; }
    .event {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
    }
    .event .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }
    .event .agent-name { color: var(--text); font-weight: 600; }
    .event .msg { color: var(--text); }
    .event.start { border-left-color: var(--blue); }
    .event.step { border-left-color: var(--green); }
    .event.complete { border-left-color: #4ade80; background: rgba(34,197,94,0.05); }
    .event.handoff { border-left-color: var(--purple); }
    .event.error { border-left-color: var(--red); background: rgba(239,68,68,0.05); }
    .event.wait { border-left-color: var(--yellow); }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Toast ── */
    .toasts {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      max-width: 320px;
      animation: toastIn 0.3s ease;
    }
    @keyframes toastIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <header>
    <div class="brand">
      <span class="dot"></span>
      <span>Галактика агентов</span>
    </div>
    <div class="stats">
      <span>проектов: <b id="stat-projects">0</b></span>
      <span>событий: <b id="stat-events">0</b></span>
      <span><a href="/" style="color:var(--muted); text-decoration:none;">→ чат</a></span>
    </div>
  </header>

  <div class="galaxy" id="galaxy">
    <svg class="orbits" id="orbits"></svg>
    <div class="sun" id="sun" title="Pavel — главный оркестратор">
      <div style="font-size:34px">🧑</div>
      <div class="label">Pavel</div>
      <div class="role">оркестратор</div>
    </div>
  </div>

  <aside class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title">—</div>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </aside>

  <div class="toasts" id="toasts"></div>

  <script>
    const AGENTS = [
      { key: 'coordinator', emoji: '🎯', name: 'координатор' },
      { key: 'planning', emoji: '📋', name: 'планинг' },
      { key: 'competitors', emoji: '🔍', name: 'конкуренты' },
      { key: 'strategy', emoji: '🧭', name: 'стратегия' },
      { key: 'site', emoji: '🌐', name: 'сайт' },
      { key: 'ads', emoji: '📢', name: 'реклама' },
      { key: 'growth', emoji: '📈', name: 'рост' },
      { key: 'instagram', emoji: '📱', name: 'instagram' },
      { key: 'copy', emoji: '✍️', name: 'копирайт' },
      { key: 'text-editor', emoji: '🖋️', name: 'редактор' },
    ];
    const AGENT_MAP = Object.fromEntries(AGENTS.map(a => [a.key, a]));

    const TYPE_LABEL = {
      start: 'старт', step: 'шаг', complete: 'готово',
      handoff: 'передача', error: 'ошибка', wait: 'ожидание'
    };

    let projects = [];
    let lastEventTs = '';
    let activePanel = null; // { type: 'project'|'agent'|'sun', project, agent }

    // ── API ──
    async function api(path) {
      try {
        const r = await fetch(path);
        return await r.json();
      } catch (e) { return null; }
    }

    // ── Рендер галактики ──
    function renderGalaxy() {
      const galaxy = document.getElementById('galaxy');
      const svg = document.getElementById('orbits');
      const w = galaxy.clientWidth, h = galaxy.clientHeight;
      const cx = w / 2, cy = h / 2;

      // очистить старые планеты (но не sun и svg)
      [...galaxy.querySelectorAll('.planet')].forEach(el => el.remove());
      svg.innerHTML = '';

      // выбираем радиус: чем больше проектов — тем больше орбита
      const n = Math.max(projects.length + 1, 4); // +1 для "добавить"
      const R = Math.min(w, h) * 0.32;

      // орбита (линия)
      const orbit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      orbit.setAttribute('cx', cx);
      orbit.setAttribute('cy', cy);
      orbit.setAttribute('r', R);
      orbit.setAttribute('fill', 'none');
      orbit.setAttribute('stroke', 'rgba(120,120,180,0.15)');
      orbit.setAttribute('stroke-dasharray', '2 6');
      svg.appendChild(orbit);

      // планеты-проекты
      const items = [...projects, { name: '__add__' }];
      items.forEach((p, i) => {
        const angle = (i / items.length) * Math.PI * 2 - Math.PI / 2;
        const x = cx + Math.cos(angle) * R;
        const y = cy + Math.sin(angle) * R;
        const el = createPlanet(p, x, y);
        galaxy.appendChild(el);
      });
    }

    function createPlanet(p, x, y) {
      const el = document.createElement('div');
      el.className = 'planet';
      el.style.left = x + 'px';
      el.style.top = y + 'px';

      if (p.name === '__add__') {
        el.classList.add('add');
        el.innerHTML = `
          <div class="planet-body">+</div>
          <div class="planet-name">новый проект</div>
        `;
        el.addEventListener('click', () => {
          openPanel({ type: 'add' });
        });
        return el;
      }

      if (p.active_agent) el.classList.add('active');

      const moonsHtml = AGENTS.map((a, i) => {
        const angle = (i / AGENTS.length) * Math.PI * 2;
        const r = 80;
        const mx = Math.cos(angle) * r + 100; // +100 чтобы внутри 200px контейнера
        const my = Math.sin(angle) * r + 100;
        const isActive = p.active_agent === a.key;
        return `<div class="moon ${isActive ? 'active' : ''}" style="left:${mx}px;top:${my}px"
                     data-agent="${a.key}" data-project="${p.name}" title="${a.name}">
                  ${a.emoji}
                  <div class="moon-tooltip">${a.name}</div>
                </div>`;
      }).join('');

      el.innerHTML = `
        <div class="moons">${moonsHtml}</div>
        <div class="planet-body">🌍</div>
        <div class="planet-name">${escapeHtml(p.name)}</div>
        <div class="planet-status">${p.active_agent ? '● ' + p.active_agent : '○ покой'}</div>
      `;

      // клик по планете
      el.querySelector('.planet-body').addEventListener('click', (e) => {
        e.stopPropagation();
        openPanel({ type: 'project', project: p.name });
      });
      el.querySelector('.planet-name').addEventListener('click', (e) => {
        e.stopPropagation();
        openPanel({ type: 'project', project: p.name });
      });
      // клик по луне (агенту)
      el.querySelectorAll('.moon').forEach(m => {
        m.addEventListener('click', (e) => {
          e.stopPropagation();
          openPanel({
            type: 'agent',
            project: m.dataset.project,
            agent: m.dataset.agent,
          });
        });
      });

      return el;
    }

    // ── Панель ──
    function openPanel(ctx) {
      activePanel = ctx;
      const panel = document.getElementById('panel');
      panel.classList.add('open');
      renderPanel();
    }
    function closePanel() {
      activePanel = null;
      document.getElementById('panel').classList.remove('open');
    }

    async function renderPanel() {
      if (!activePanel) return;
      const titleEl = document.getElementById('panel-title');
      const bodyEl = document.getElementById('panel-body');

      if (activePanel.type === 'add') {
        titleEl.innerHTML = `<span>+ Новый проект</span>`;
        bodyEl.innerHTML = `
          <div class="empty">
            Создание через CLI на сервере:
            <pre style="margin-top:12px;background:var(--surface-solid);padding:10px;border-radius:6px;text-align:left;font-size:11px;color:var(--text)">~/projects/новый-проект.sh имя-проекта</pre>
          </div>
        `;
        return;
      }

      if (activePanel.type === 'sun') {
        titleEl.innerHTML = `🧑 Pavel — оркестратор`;
        bodyEl.innerHTML = `
          <div class="panel-section">
            <h4>Роль</h4>
            <p style="color:var(--muted);font-size:13px">
              Главный оркестратор всей системы. Каждый проект — это отдельная мини-вселенная
              со своим координатором и 9 агентами.
            </p>
          </div>
          <div class="panel-section">
            <h4>Все агенты</h4>
            <div class="agent-grid">
              ${AGENTS.map(a => `
                <div class="agent-chip">
                  <div class="emoji">${a.emoji}</div>
                  <div class="name">${a.name}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        return;
      }

      if (activePanel.type === 'project') {
        const p = projects.find(x => x.name === activePanel.project);
        if (!p) return;
        titleEl.innerHTML = `🌍 ${escapeHtml(p.name)}`;
        const events = await api(`/api/agents/events?project=${encodeURIComponent(p.name)}&limit=50`) || [];
        bodyEl.innerHTML = `
          <div class="panel-section">
            <h4>Состояние</h4>
            <div style="font-size:13px">
              ${p.active_agent
                ? `🟢 активен: <b>${escapeHtml(p.active_agent)}</b>`
                : '⚪ покой'}
            </div>
          </div>
          <div class="panel-section">
            <h4>Агенты проекта</h4>
            <div class="agent-grid">
              ${AGENTS.map(a => `
                <div class="agent-chip ${p.active_agent === a.key ? 'active' : ''}"
                     onclick='openPanel({type:"agent",project:${JSON.stringify(p.name)},agent:${JSON.stringify(a.key)}})'>
                  <div class="emoji">${a.emoji}</div>
                  <div class="name">${a.name}</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="panel-section">
            <h4>Лента событий (${events.length})</h4>
            <div class="events">
              ${events.length ? events.reverse().map(renderEvent).join('') : '<div class="empty">пока пусто</div>'}
            </div>
          </div>
        `;
        return;
      }

      if (activePanel.type === 'agent') {
        const a = AGENT_MAP[activePanel.agent];
        const proj = activePanel.project;
        titleEl.innerHTML = `${a.emoji} ${escapeHtml(a.name)} <span style="color:var(--muted);font-weight:400;font-size:13px">· ${escapeHtml(proj)}</span>`;
        const events = await api(`/api/agents/events?project=${encodeURIComponent(proj)}&agent=${encodeURIComponent(activePanel.agent)}&limit=50`) || [];
        bodyEl.innerHTML = `
          <div class="panel-section">
            <h4>← Назад</h4>
            <div class="agent-chip" style="display:inline-block;cursor:pointer" onclick='openPanel({type:"project",project:${JSON.stringify(proj)}})'>
              <div class="emoji">🌍</div>
              <div class="name">${escapeHtml(proj)}</div>
            </div>
          </div>
          <div class="panel-section">
            <h4>События агента (${events.length})</h4>
            <div class="events">
              ${events.length ? events.reverse().map(renderEvent).join('') : '<div class="empty">этот агент ещё не работал в проекте</div>'}
            </div>
          </div>
        `;
        return;
      }
    }

    function renderEvent(e) {
      const time = (e.ts || '').slice(11, 16);
      const type = e.type || 'step';
      const a = AGENT_MAP[e.agent] || { emoji: '•', name: e.agent || '—' };
      return `
        <div class="event ${type}">
          <div class="meta">
            <span>${time}</span>
            <span>${a.emoji}</span>
            <span class="agent-name">${escapeHtml(a.name)}</span>
            <span style="margin-left:auto">${TYPE_LABEL[type] || type}</span>
          </div>
          <div class="msg">${escapeHtml(e.message || '')}</div>
        </div>
      `;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ── Polling ──
    async function loadProjects() {
      const data = await api('/api/agents/projects');
      if (data) {
        projects = data;
        renderGalaxy();
        if (activePanel && (activePanel.type === 'project' || activePanel.type === 'agent')) {
          renderPanel();
        }
      }
    }
    async function loadStats() {
      const s = await api('/api/agents/stats');
      if (s) {
        document.getElementById('stat-projects').textContent = s.total_projects || 0;
        document.getElementById('stat-events').textContent = s.total_events || 0;
      }
    }
    async function pollNewEvents() {
      const url = lastEventTs
        ? `/api/agents/events?since=${encodeURIComponent(lastEventTs)}&limit=20`
        : `/api/agents/events?limit=1`;
      const events = await api(url);
      if (events && events.length) {
        events.forEach(e => {
          if (e.ts > lastEventTs) lastEventTs = e.ts;
          if (lastEventTs && Object.keys(AGENT_MAP).length) {
            // toast только для свежих
            showToast(e);
          }
        });
      }
    }
    function showToast(e) {
      const t = document.getElementById('toasts');
      const a = AGENT_MAP[e.agent] || { emoji: '•', name: e.agent };
      const div = document.createElement('div');
      div.className = 'toast';
      div.innerHTML = `${a.emoji} <b>${escapeHtml(e.project || '—')}</b> · ${escapeHtml(a.name)}: ${escapeHtml((e.message || '').slice(0, 80))}`;
      t.appendChild(div);
      setTimeout(() => div.remove(), 4000);
    }

    // ── Init ──
    document.getElementById('sun').addEventListener('click', () => openPanel({ type: 'sun' }));

    window.addEventListener('resize', () => renderGalaxy());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

    // первая загрузка + старт поллинга
    (async () => {
      await loadStats();
      await loadProjects();
      // инициализируем lastEventTs последним событием
      const last = await api('/api/agents/events?limit=1');
      if (last && last.length) lastEventTs = last[last.length - 1].ts;
      setInterval(loadProjects, 5000);
      setInterval(loadStats, 10000);
      setInterval(pollNewEvents, 3000);
    })();

    // экспорт для onclick в строках
    window.openPanel = openPanel;
    window.closePanel = closePanel;
  </script>
</body>
</html>
