<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Система агентов — Pavel</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f5f4ff;
  --bg2:      #ede9ff;
  --surface:  #ffffff;
  --surface2: #faf9ff;
  --border:   #e4e0f4;
  --border2:  #cdc8e8;
  --text:     #1a1a2e;
  --muted:    #6b6a85;
  --dim:      #a09fbe;
  --accent:   #6366f1;
  --acc-s:    #eef0ff;
  --green:    #22c55e;
  --green-s:  #dcfce7;
  --amber:    #f59e0b;
  --amber-s:  #fef3c7;
  --purple:   #8b5cf6;
  --purple-s: #f3e8ff;
  --purple-b: #c4b5fd;
  --lb:       #818cf8;
  --lo:       #fbbf24;
  --lr:       #fb7185;
  --lg:       #c8c5de;
  --sh:  0 1px 4px rgba(99,102,241,.07), 0 4px 18px rgba(99,102,241,.09);
  --shh: 0 2px 8px rgba(99,102,241,.12), 0 8px 36px rgba(99,102,241,.16);
  --r:   15px;
}
[data-theme="dark"] {
  --bg:       #0d0d1b;
  --bg2:      #08081a;
  --surface:  #16162c;
  --surface2: #111128;
  --border:   rgba(140,135,200,.18);
  --border2:  rgba(140,135,200,.30);
  --text:     #e8e8f6;
  --muted:    #9090b8;
  --dim:      #55557a;
  --accent:   #818cf8;
  --acc-s:    rgba(99,102,241,.14);
  --green-s:  rgba(34,197,94,.13);
  --amber-s:  rgba(245,158,11,.13);
  --purple-s: rgba(139,92,246,.14);
  --purple-b: rgba(196,181,253,.35);
  --lg:       rgba(180,175,220,.22);
  --sh:  0 1px 4px rgba(0,0,0,.4), 0 4px 18px rgba(0,0,0,.3);
  --shh: 0 2px 8px rgba(0,0,0,.5), 0 8px 36px rgba(0,0,0,.4);
}

html, body { height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(145deg, var(--bg) 0%, var(--bg2) 100%);
  color: var(--text);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  transition: background .35s, color .35s;
}

/* dot grid */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: radial-gradient(circle, var(--border2) 1px, transparent 1px);
  background-size: 36px 36px; opacity:.45;
  transition: opacity .35s;
}
[data-theme="dark"] body::before { opacity:.1; }

/* ── HEADER ── */
header {
  position:fixed; top:0; left:0; right:0; height:52px; z-index:20;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; gap:12px;
  transition: background .35s, border-color .35s;
}
.brand {
  display:flex; align-items:center; gap:8px;
  font-weight:700; font-size:14px; color:var(--text); white-space:nowrap;
}
.brand-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 0 3px var(--acc-s);
  animation: dot-pulse 2.5s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%,100% { box-shadow:0 0 0 3px var(--acc-s); }
  50%      { box-shadow:0 0 0 5px var(--acc-s); }
}
.h-mid { flex:1; text-align:center; font-size:12px; color:var(--muted); pointer-events:none; }
.h-right { display:flex; align-items:center; gap:10px; }

.tsw {
  display:inline-flex; align-items:center;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:999px; padding:3px;
  transition: background .35s, border-color .35s;
}
.tbtn {
  border:none; cursor:pointer; font-family:inherit;
  font-size:11.5px; padding:4px 11px; border-radius:999px;
  color:var(--muted); background:transparent;
  transition:all .18s; white-space:nowrap; line-height:1;
}
.tbtn:hover { color:var(--text); }
.tbtn.on {
  background:var(--surface); color:var(--accent); font-weight:600;
  box-shadow:0 1px 4px rgba(99,102,241,.18);
}
.clock {
  font-size:13px; font-weight:500; color:var(--text);
  padding:5px 12px; background:var(--surface2);
  border:1px solid var(--border); border-radius:999px;
  font-variant-numeric:tabular-nums; letter-spacing:.03em;
  transition: background .35s, border-color .35s;
}

/* ── CANVAS ── */
.canvas {
  position:fixed; top:52px; left:0; right:0; bottom:44px;
  z-index:1; overflow:hidden;
}
.svg-lines {
  position:absolute; inset:0; width:100%; height:100%;
  pointer-events:none; overflow:visible;
}

/* Animated lines */
.l-gray   { stroke:var(--lg); stroke-width:1.2; fill:none; stroke-dasharray:5 7; stroke-linecap:round;
            animation: flow-slow 22s linear infinite; }
.l-purple { stroke:var(--purple-b); stroke-width:1.5; fill:none; stroke-dasharray:5 6; stroke-linecap:round;
            animation: flow-slow 18s linear infinite; }
.l-color  { stroke-width:1.8; fill:none; stroke-dasharray:5 5; stroke-linecap:round;
            animation: flow-fast 12s linear infinite; }

@keyframes flow-slow { to { stroke-dashoffset: -200; } }
@keyframes flow-fast { to { stroke-dashoffset: -140; } }

/* ── NODES ── */
.node {
  position:absolute; transform:translate(-50%,-50%);
  cursor:pointer; z-index:5;
  transition:transform .26s cubic-bezier(.34,1.56,.64,1), z-index 0s;
}
.node:hover { transform:translate(-50%,-50%) translateY(-6px) scale(1.03); z-index:9; }

/* Agent card */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:13px 12px 12px;
  width:148px; box-shadow:var(--sh);
  text-align:center;
  transition: box-shadow .25s, border-color .25s, background .35s;
}
.node:hover .card {
  box-shadow:var(--shh);
  border-color:rgba(99,102,241,.4);
}
.c-ico  { font-size:26px; display:block; margin-bottom:6px; line-height:1; }
.c-name { font-weight:700; font-size:13px; color:var(--text); margin-bottom:2px; line-height:1.2; }
.c-cmd  {
  display:block; font-family:'SF Mono',ui-monospace,Menlo,monospace;
  font-size:10px; color:var(--accent); margin-bottom:5px;
  cursor:pointer; user-select:none;
  transition: opacity .15s;
}
.c-cmd:hover { opacity:.7; }
.c-cmd:active { opacity:.4; }
.c-desc { font-size:10.5px; color:var(--muted); line-height:1.4; margin-bottom:6px; min-height:28px; }
.c-ts   { font-size:9px; color:var(--dim); margin-bottom:6px; }

/* Hub */
.node.hub .card {
  width:162px;
  background:var(--purple-s); border:2px solid var(--purple-b);
  box-shadow:var(--sh), 0 0 0 0 rgba(139,92,246,.2);
  animation: hub-glow 3s ease-in-out infinite;
  transition: box-shadow .25s, border-color .25s;
}
.node.hub:hover .card { border-color:var(--purple); }
@keyframes hub-glow {
  0%,100% { box-shadow:var(--sh), 0 0 0 0 rgba(139,92,246,.15); }
  50%      { box-shadow:var(--sh), 0 0 0 8px rgba(139,92,246,.0); }
}
.node.hub .c-name { color:var(--purple); font-size:15px; }
.node.hub .c-sub  {
  font-size:9px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--purple); opacity:.6; margin-bottom:7px;
}

/* Pavel */
.node.owner .card {
  width:168px; text-align:center; padding:20px 13px 17px;
  border-color:rgba(99,102,241,.22);
}
.node.owner:hover .card { border-color:rgba(99,102,241,.5); }
.ava {
  width:56px; height:56px; border-radius:50%;
  background:linear-gradient(145deg,#818cf8,#a78bfa);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; margin:0 auto 10px;
  box-shadow:0 0 0 5px var(--acc-s), 0 4px 14px rgba(99,102,241,.25);
  transition: box-shadow .25s;
}
.node.owner:hover .ava { box-shadow:0 0 0 6px var(--acc-s), 0 6px 24px rgba(99,102,241,.35); }
.c-name-lg { font-weight:700; font-size:17px; color:var(--text); margin-bottom:3px; }
.c-sub  {
  font-size:9px; font-weight:700; letter-spacing:1.8px;
  text-transform:uppercase; color:var(--muted);
}

/* Placeholder */
.node.ph .card {
  width:138px; background:transparent;
  border:1.5px dashed var(--border2); box-shadow:none;
  text-align:center; opacity:.45;
}
.node.ph:hover .card { opacity:.75; border-color:rgba(99,102,241,.4); box-shadow:none; }
.node.ph .c-ico  { font-size:22px; opacity:.4; }
.node.ph .c-name { font-size:11.5px; color:var(--muted); font-weight:500; }

/* ── BADGES ── */
.badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 8px; border-radius:999px;
  font-size:10.5px; font-weight:600; line-height:1; white-space:nowrap;
}
.badge .dot { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
.b-active  { background:var(--green-s); color:var(--green); border:1px solid rgba(34,197,94,.22); }
.b-active .dot { animation: blink 1.8s ease-in-out infinite; }
.b-working { background:var(--amber-s); color:var(--amber); border:1px solid rgba(245,158,11,.22); }
.b-next    { color:var(--muted); border:1px solid var(--border2); }
.b-wait    { color:var(--dim);   border:1px solid var(--border); }
.b-stage   { color:var(--dim);   border:1px solid var(--border); }
.b-hub     { background:var(--purple-s); color:var(--purple); border:1px solid var(--purple-b);
             cursor:pointer; transition:all .15s; }
.b-hub:hover { background:var(--purple); color:#fff; }
.b-soon    { color:var(--dim); border:1px solid var(--border); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── PANEL ── */
.panel {
  position:fixed; top:52px; right:0; bottom:44px; width:420px; max-width:88vw;
  background:var(--surface); border-left:1px solid var(--border);
  transform:translateX(100%); transition:transform .26s cubic-bezier(.4,0,.2,1), background .35s;
  z-index:22; display:flex; flex-direction:column;
  box-shadow:-4px 0 30px rgba(99,102,241,.09);
}
.panel.open { transform:none; }
.ph-row {
  padding:14px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.ph-title { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
.ph-close {
  width:28px; height:28px; border-radius:8px;
  background:none; border:none; cursor:pointer; font-size:17px; color:var(--muted);
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.ph-close:hover { background:var(--surface2); color:var(--text); }
.pb { flex:1; overflow-y:auto; padding:15px 18px; }
.pb::-webkit-scrollbar { width:4px; }
.pb::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.psec { margin-bottom:18px; }
.psec h4 { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--dim); margin-bottom:8px; }
.psec p  { font-size:12px; color:var(--muted); line-height:1.5; }
.achips { display:flex; flex-wrap:wrap; gap:6px; }
.achip {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 10px; background:var(--surface2);
  border:1px solid var(--border); border-radius:8px;
  font-size:12px; cursor:pointer; transition:all .14s;
}
.achip:hover { border-color:var(--accent); color:var(--accent); }
.evs { display:flex; flex-direction:column; gap:6px; }
.ev {
  background:var(--surface2); border:1px solid var(--border);
  border-left:2.5px solid var(--accent);
  border-radius:9px; padding:8px 11px; font-size:11.5px;
}
.ev .meta { display:flex; gap:6px; align-items:center; color:var(--dim); font-size:10px; margin-bottom:3px; }
.ev .meta b { color:var(--text); font-weight:600; }
.ev .msg { color:var(--text); line-height:1.4; }
.ev.start   { border-left-color:#60a5fa; }
.ev.step    { border-left-color:var(--green); }
.ev.complete{ border-left-color:var(--green); background:var(--green-s); }
.ev.handoff { border-left-color:var(--purple); }
.ev.error   { border-left-color:#f87171; }
.ev.wait    { border-left-color:var(--amber); }
.no-ev { padding:20px; text-align:center; color:var(--dim); font-size:12px; }

/* ── BOTTOM BAR ── */
.bar {
  position:fixed; bottom:0; left:0; right:0; height:44px;
  background:var(--surface); border-top:1px solid var(--border);
  z-index:20; display:flex; align-items:center;
  padding:0 14px; gap:5px; overflow-x:auto;
  transition: background .35s;
}
.bar::-webkit-scrollbar { display:none; }
.bar-hint { font-size:11.5px; color:var(--muted); white-space:nowrap; flex-shrink:0; }
.bar-sep  { color:var(--border2); font-size:16px; flex-shrink:0; padding:0 3px; }
.bar-btn  {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 10px; border-radius:7px; flex-shrink:0;
  background:var(--surface2); border:1px solid var(--border);
  font-size:11px; cursor:pointer; font-family:inherit;
  color:var(--muted); transition:all .15s; white-space:nowrap;
}
.bar-btn:hover { background:var(--acc-s); border-color:rgba(99,102,241,.3); color:var(--accent); }
.bar-btn .bh { color:var(--accent); font-family:'SF Mono',ui-monospace,Menlo,monospace; font-size:10px; }

/* ── LEGEND ── */
.legend {
  position:fixed; bottom:52px; left:14px; z-index:6;
  background:var(--surface); border:1px solid var(--border);
  border-radius:11px; padding:9px 13px; box-shadow:var(--sh);
  display:flex; flex-direction:column; gap:5px;
  transition: background .35s;
}
.leg { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); white-space:nowrap; }

/* ── TOASTS ── */
.toasts { position:fixed; bottom:52px; right:14px; z-index:30; display:flex; flex-direction:column; gap:7px; }
.toast {
  background:var(--surface); border:1px solid var(--border);
  border-left:3px solid var(--accent);
  padding:9px 13px; border-radius:10px; font-size:12px;
  max-width:280px; box-shadow:var(--shh); color:var(--text);
  animation:sIn .22s ease;
}
@keyframes sIn { from{transform:translateX(14px);opacity:0} to{transform:none;opacity:1} }

@media(max-width:700px) { .h-mid,.legend{display:none;} }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="brand-dot"></span>Система агентов — Pavel</div>
  <div class="h-mid">Галактика HairLove · Агенты · Связи</div>
  <div class="h-right">
    <div class="tsw" id="tsw">
      <button class="tbtn" data-m="light">☀️ Светлая</button>
      <button class="tbtn" data-m="dark">🌙 Тёмная</button>
      <button class="tbtn" data-m="auto">⚙️ Авто</button>
    </div>
    <div class="clock" id="clk">--:--:--</div>
  </div>
</header>

<div class="canvas" id="cvs">
  <svg class="svg-lines" id="svgl"></svg>
</div>

<aside class="panel" id="panel">
  <div class="ph-row">
    <div class="ph-title" id="ptitle">—</div>
    <button class="ph-close" onclick="closeP()">✕</button>
  </div>
  <div class="pb" id="pbody"></div>
</aside>

<div class="bar" id="bar"></div>

<div class="legend">
  <div class="leg">
    <svg width="22" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="var(--lb)" stroke-width="2" stroke-dasharray="4 3" stroke-linecap="round"/></svg>
    Тексты → канал
  </div>
  <div class="leg">
    <svg width="22" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="var(--lo)" stroke-width="2" stroke-dasharray="4 3" stroke-linecap="round"/></svg>
    Конкуренты → анализ
  </div>
  <div class="leg">
    <svg width="22" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="var(--lr)" stroke-width="2" stroke-dasharray="4 3" stroke-linecap="round"/></svg>
    Реклама → запуск
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const PRJ = 'hairlove';

const AG = [
  { k:'strategy',    n:'Стратегия',  cmd:'/hairlove-strategy',   ico:'🎯', d:'Дорожная карта.',           px:22, py:16, def:'working' },
  { k:'copy',        n:'Тексты',     cmd:'/hairlove-texts',       ico:'✍️', d:'Контент для всех каналов.', px: 7, py:37, def:'active'  },
  { k:'site',        n:'Сайт',       cmd:'/hairlove-site',        ico:'🌐', d:'B2B-витрина.',               px:38, py:29, def:'next'    },
  { k:'competitors', n:'Конкуренты', cmd:'/hairlove-competitors', ico:'🔍', d:'Анализ рынка.',              px: 7, py:63, def:'wait'    },
  { k:'ads',         n:'Реклама',    cmd:'/hairlove-ads',         ico:'📣', d:'Meta Ads, таргетинг.',      px:38, py:71, def:'stage'   },
  { k:'instagram',   n:'Instagram',  cmd:'/hairlove-insta',       ico:'📸', d:'Публикация постов.',         px:22, py:84, def:'active'  },
];
const HUB  = { px:22, py:50 };
const OWN  = { px:64, py:50 };
const PH   = [{ px:81, py:32 }, { px:81, py:68 }];
const WFLOWS = [
  { f:'copy', t:'instagram', c:'var(--lb)' }, { f:'copy', t:'site', c:'var(--lb)' },
  { f:'competitors', t:'strategy', c:'var(--lo)' },
  { f:'ads', t:'instagram', c:'var(--lr)' }, { f:'ads', t:'site', c:'var(--lr)' },
];
const BMAP = {
  active:  ['b-active',  'Активен'],
  working: ['b-working', 'В работе'],
  next:    ['b-next',    'Следующий'],
  wait:    ['b-wait',    'Ждёт'],
  stage:   ['b-stage',   'Этап 2'],
  done:    ['b-active',  'Готово'],
};

let projData=null, aTs={}, lastTs='', panCtx=null;

/* Theme */
function setTheme(m) {
  const a = m==='auto'?(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):m;
  document.documentElement.setAttribute('data-theme', a);
  localStorage.setItem('th', m);
  document.querySelectorAll('.tbtn').forEach(b => b.classList.toggle('on', b.dataset.m===m));
}
document.querySelectorAll('.tbtn').forEach(b => b.addEventListener('click', ()=>setTheme(b.dataset.m)));
matchMedia('(prefers-color-scheme:dark)').addEventListener('change', ()=>{
  if (localStorage.getItem('th')==='auto') setTheme('auto');
});
setTheme(localStorage.getItem('th')||'light');

/* Clock */
function tick() {
  const d=new Date();
  document.getElementById('clk').textContent=p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());
}
function p2(n){return String(n).padStart(2,'0');}
setInterval(tick,1000); tick();

/* API */
async function get(u){try{return await(await fetch(u)).json();}catch{return null;}}

/* Badge */
function bdg(st) {
  const [cls,lbl]=BMAP[st]||['b-wait','Ожидает'];
  const dot=cls==='b-active'?'<span class="dot"></span>':'';
  return `<span class="badge ${cls}">${dot}${lbl}</span>`;
}
function agSt(a){return projData?.active_agent===a.k?'active':a.def;}
function fts(ts){
  if(!ts)return'';
  try{const d=new Date(ts);return'обновлён '+d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});}
  catch{return'';}
}

/* SVG path — quadratic bezier с плавным изгибом */
function addPath(svg, x1,y1,x2,y2, cls, stroke, dashDelay) {
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const dx=x2-x1, dy=y2-y1;
  const cx=mx-dy*.15, cy=my+dx*.15;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',`M${x1},${y1} Q${cx},${cy} ${x2},${y2}`);
  p.setAttribute('class', cls);
  if(stroke) p.setAttribute('stroke', stroke);
  if(dashDelay) p.style.animationDelay = dashDelay;
  svg.appendChild(p);
}

/* Render */
function render(){
  const cvs=document.getElementById('cvs');
  const svg=document.getElementById('svgl');
  cvs.querySelectorAll('.node').forEach(n=>n.remove());
  svg.innerHTML='';
  const W=cvs.clientWidth,H=cvs.clientHeight;
  const xy=p=>({x:p.px/100*W,y:p.py/100*H});

  /* Hub ↔ agents (gray) */
  AG.forEach((a,i)=>{
    const h=xy(HUB),pt=xy(a);
    addPath(svg,h.x,h.y,pt.x,pt.y,'l-gray',null,`${i*-1.5}s`);
  });

  /* Hub ↔ Pavel (purple) */
  {const h=xy(HUB),o=xy(OWN); addPath(svg,h.x,h.y,o.x,o.y,'l-purple',null,'0s');}

  /* Workflow colored */
  WFLOWS.forEach((w,i)=>{
    const fa=AG.find(a=>a.k===w.f),ta=AG.find(a=>a.k===w.t);
    if(!fa||!ta)return;
    const p1=xy(fa),p2=xy(ta);
    addPath(svg,p1.x,p1.y,p2.x,p2.y,'l-color',w.c,`${i*-0.8}s`);
  });

  /* Agent nodes */
  AG.forEach(a=>{
    const pt=xy(a),el=document.createElement('div');
    el.className='node';
    el.style.left=pt.x+'px'; el.style.top=pt.y+'px';
    const ts=aTs[a.k]?`<div class="c-ts">${aTs[a.k]}</div>`:'';
    el.innerHTML=`<div class="card">
      <span class="c-ico">${a.ico}</span>
      <div class="c-name">${a.n}</div>
      <span class="c-cmd" title="Нажми чтобы скопировать" onclick="copyCmd(event,'${a.cmd}')">${a.cmd}</span>
      <div class="c-desc">${a.d}</div>${ts}
      ${bdg(agSt(a))}
    </div>`;
    el.addEventListener('click',()=>openP({t:'agent',k:a.k}));
    cvs.appendChild(el);
  });

  /* Hub */
  {const pt=xy(HUB),el=document.createElement('div');
   el.className='node hub';
   el.style.left=pt.x+'px'; el.style.top=pt.y+'px';
   el.innerHTML=`<div class="card">
     <span class="c-ico">🐱</span>
     <div class="c-name">HairLove</div>
     <div class="c-sub">ГАЛАКТИКА</div>
     <span class="c-cmd" title="Нажми чтобы скопировать" onclick="copyCmd(event,'/hairlove')">/hairlove</span>
     <div class="c-desc">Косметика для волос.</div>
     <span class="badge b-hub">⚡ /full-cycle</span>
   </div>`;
   el.addEventListener('click',()=>openP({t:'project'}));
   cvs.appendChild(el);}

  /* Pavel */
  {const pt=xy(OWN),el=document.createElement('div');
   el.className='node owner';
   el.style.left=pt.x+'px'; el.style.top=pt.y+'px';
   el.innerHTML=`<div class="card">
     <div class="ava">👤</div>
     <div class="c-name-lg">Павел</div>
     <div class="c-sub">ВЛАДЕЛЕЦ</div>
   </div>`;
   el.addEventListener('click',()=>openP({t:'owner'}));
   cvs.appendChild(el);}

  /* Placeholders */
  PH.forEach(pos=>{
    const pt=xy(pos),el=document.createElement('div');
    el.className='node ph';
    el.style.left=pt.x+'px'; el.style.top=pt.y+'px';
    el.innerHTML=`<div class="card">
      <span class="c-ico">📦</span>
      <div class="c-name">Новое направление</div>
      <span class="badge b-soon">Скоро</span>
    </div>`;
    cvs.appendChild(el);
  });
}

/* Bottom bar */
function renderBar(){
  const bar=document.getElementById('bar');
  bar.innerHTML=`<span class="bar-hint">Нажми на агента →</span><span class="bar-sep">|</span>`
    +AG.map(a=>`<button class="bar-btn" data-k="${a.k}"><span class="bh">${a.cmd}</span>${a.n}</button>`).join('');
  bar.querySelectorAll('.bar-btn').forEach(b=>b.addEventListener('click',()=>openP({t:'agent',k:b.dataset.k})));
}

/* Panel */
function openP(ctx){panCtx=ctx;document.getElementById('panel').classList.add('open');drawP();}
function closeP(){panCtx=null;document.getElementById('panel').classList.remove('open');}

async function drawP(){
  if(!panCtx)return;
  const T=document.getElementById('ptitle'),B=document.getElementById('pbody');
  if(panCtx.t==='owner'){
    T.textContent='👤 Павел';
    B.innerHTML=`<div class="psec"><h4>Роль</h4><p>Владелец системы агентов. Управляет проектами через оркестратора.</p></div>
      <div class="psec"><h4>Проекты</h4><div class="achips"><div class="achip" onclick="openP({t:'project'})">🐱 HairLove</div></div></div>`;
    return;
  }
  if(panCtx.t==='project'){
    T.textContent='🐱 HairLove';
    const evs=await get(`/api/agents/events?project=${PRJ}&limit=40`)||[];
    B.innerHTML=`<div class="psec"><h4>Агенты (${AG.length})</h4>
      <div class="achips">${AG.map(a=>`<div class="achip" onclick="openP({t:'agent',k:'${a.k}'})">${a.ico} ${a.n}</div>`).join('')}</div></div>
      <div class="psec"><h4>Лента событий (${evs.length})</h4>
      <div class="evs">${evs.length?[...evs].reverse().map(fe).join(''):'<div class="no-ev">событий пока нет</div>'}</div></div>`;
    return;
  }
  if(panCtx.t==='agent'){
    const a=AG.find(x=>x.k===panCtx.k);if(!a)return;
    T.innerHTML=`${a.ico} ${a.n}`;
    const evs=await get(`/api/agents/events?project=${PRJ}&agent=${a.k}&limit=50`)||[];
    B.innerHTML=`<div class="psec"><h4>Агент</h4>
      <code style="background:var(--acc-s);color:var(--accent);padding:2px 8px;border-radius:6px;font-size:11px;font-family:'SF Mono',ui-monospace,monospace">${a.cmd}</code>
      <p style="margin-top:8px">${a.d}</p></div>
      <div class="psec"><button class="achip" onclick="openP({t:'project'})">← HairLove</button></div>
      <div class="psec"><h4>События (${evs.length})</h4>
      <div class="evs">${evs.length?[...evs].reverse().map(fe).join(''):'<div class="no-ev">агент ещё не работал</div>'}</div></div>`;
  }
}

function fe(e){
  const t=(e.ts||'').slice(11,16),tp=e.type||'step';
  const a=AG.find(x=>x.k===e.agent);
  return `<div class="ev ${tp}">
    <div class="meta"><span>${t}</span><span>${a?a.ico:'•'}</span><b>${esc(a?a.n:(e.agent||'—'))}</b>
    <span style="margin-left:auto;opacity:.5;font-size:9px">${tp}</span></div>
    <div class="msg">${esc(e.message||'')}</div></div>`;
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function copyCmd(e, cmd) {
  e.stopPropagation();
  navigator.clipboard.writeText(cmd).then(() => {
    const el = e.target;
    const orig = el.textContent;
    el.textContent = '✓ скопировано';
    setTimeout(() => { el.textContent = orig; }, 1200);
  });
}

function toast(e){
  const a=AG.find(x=>x.k===e.agent);
  const d=document.createElement('div');d.className='toast';
  d.innerHTML=`${a?a.ico:'•'} <b>${esc(a?a.n:(e.agent||''))}</b>: ${esc((e.message||'').slice(0,80))}`;
  document.getElementById('toasts').appendChild(d);
  setTimeout(()=>d.remove(),4500);
}

async function loadProj(){
  const list=await get('/api/agents/projects');
  if(list){projData=list.find(p=>p.name===PRJ)||null;render();if(panCtx)drawP();}
}
async function poll(){
  const url=lastTs?`/api/agents/events?project=${PRJ}&since=${encodeURIComponent(lastTs)}&limit=20`:`/api/agents/events?project=${PRJ}&limit=1`;
  const evs=await get(url);
  if(evs?.length)evs.forEach(e=>{if(e.ts>lastTs){lastTs=e.ts;aTs[e.agent]=fts(e.ts);toast(e);}});
}

window.addEventListener('resize',render);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeP();});

renderBar();

(async()=>{
  await loadProj();
  const last=await get(`/api/agents/events?project=${PRJ}&limit=20`);
  if(last?.length){
    lastTs=last[last.length-1].ts;
    last.forEach(e=>{if(!aTs[e.agent])aTs[e.agent]=fts(e.ts);});
    render();
  }
  setInterval(loadProj,8000);
  setInterval(poll,3000);
})();

window.openP=openP;window.closeP=closeP;
</script>
</body>
</html>
