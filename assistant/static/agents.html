<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Система агентов — Pavel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f3f3f8;
      --surface:       #ffffff;
      --surface-2:     #f8f8fc;
      --border:        #e9e7f3;
      --border-mid:    #d8d5ec;
      --text:          #1b1b2d;
      --text-muted:    #71708a;
      --text-dim:      #a5a4be;
      --accent:        #6366f1;
      --accent-soft:   #eef0ff;
      --green:         #22c55e;
      --green-soft:    #f0fdf4;
      --amber:         #f59e0b;
      --amber-soft:    #fffbeb;
      --purple:        #8b5cf6;
      --purple-light:  #f5f3ff;
      --purple-border: #c4b5fd;
      --line-blue:     #818cf8;
      --line-orange:   #fbbf24;
      --line-red:      #fb7185;
      --line-gray:     #c8c5de;
      --shadow-card:   0 1px 2px rgba(0,0,0,0.04), 0 3px 12px rgba(99,102,241,0.06);
      --shadow-hover:  0 4px 20px rgba(99,102,241,0.13), 0 1px 4px rgba(0,0,0,0.06);
      --shadow-panel:  -4px 0 24px rgba(99,102,241,0.08);
      --r:             14px;
    }

    [data-theme="dark"] {
      --bg:            #0d0d1a;
      --surface:       #16162a;
      --surface-2:     #1c1c30;
      --border:        rgba(130,130,200,0.18);
      --border-mid:    rgba(130,130,200,0.32);
      --text:          #e6e6f2;
      --text-muted:    #9090b0;
      --text-dim:      #606080;
      --accent:        #818cf8;
      --accent-soft:   rgba(99,102,241,0.14);
      --green-soft:    rgba(34,197,94,0.12);
      --amber-soft:    rgba(245,158,11,0.12);
      --purple-light:  rgba(139,92,246,0.12);
      --purple-border: rgba(196,181,253,0.4);
      --line-gray:     rgba(180,176,220,0.3);
      --shadow-card:   0 1px 2px rgba(0,0,0,0.3), 0 3px 12px rgba(0,0,0,0.25);
      --shadow-hover:  0 4px 20px rgba(0,0,0,0.4);
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══ HEADER ═══ */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 54px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 0; z-index: 10;
    }
    .brand {
      display: flex; align-items: center; gap: 7px;
      font-weight: 650; font-size: 14px; color: var(--text); white-space: nowrap;
    }
    .brand-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .h-center {
      flex: 1; text-align: center;
      font-size: 12.5px; color: var(--text-muted); pointer-events: none;
    }
    .h-right { display: flex; align-items: center; gap: 10px; }

    /* Theme switch */
    .tsw {
      display: inline-flex; align-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
    }
    .tbtn {
      border: none; cursor: pointer; font-family: inherit;
      font-size: 12px; padding: 4px 10px;
      border-radius: 999px; color: var(--text-muted);
      background: transparent; transition: all 0.18s; white-space: nowrap;
      line-height: 1;
    }
    .tbtn:hover { color: var(--text); }
    .tbtn.on {
      background: var(--surface); color: var(--accent);
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(99,102,241,0.15);
    }
    .clock {
      font-size: 13px; font-weight: 500;
      color: var(--text); padding: 5px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    /* ═══ CANVAS ═══ */
    .canvas {
      position: fixed;
      top: 54px; left: 0; right: 0; bottom: 50px;
      overflow: visible;
    }
    .svg-lines {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; overflow: visible;
    }

    /* ═══ NODES ═══ */
    .node {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer; z-index: 4;
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .node:hover { transform: translate(-50%, -50%) translateY(-4px); z-index: 8; }

    /* ═══ CARDS ═══ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 13px 13px 12px;
      width: 148px;
      box-shadow: var(--shadow-card);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .node:hover .card {
      box-shadow: var(--shadow-hover);
      border-color: rgba(99,102,241,0.35);
    }
    .c-ico  { font-size: 30px; display: block; margin-bottom: 7px; line-height: 1; }
    .c-name { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 2px; line-height: 1.2; }
    .c-cmd  {
      font-family: 'SF Mono', ui-monospace, Menlo, monospace;
      font-size: 10.5px; color: var(--accent);
      display: block; margin-bottom: 6px;
      word-break: break-all; line-height: 1.3;
    }
    .c-desc { font-size: 11.5px; color: var(--text-muted); line-height: 1.4; margin-bottom: 6px; min-height: 32px; }
    .c-ts   { font-size: 10px; color: var(--text-dim); margin-bottom: 7px; }

    /* Hub card */
    .node.hub .card {
      width: 165px;
      background: var(--purple-light);
      border: 2px solid var(--purple-border);
    }
    .node.hub:hover .card {
      border-color: var(--purple);
      box-shadow: 0 0 0 4px rgba(139,92,246,0.1), var(--shadow-hover);
    }
    .node.hub .c-name { color: var(--purple); font-size: 15px; }
    .node.hub .c-sub  {
      font-size: 10px; font-weight: 700; letter-spacing: 1.4px;
      text-transform: uppercase; color: var(--purple);
      opacity: 0.65; margin-bottom: 8px;
    }
    .node.hub .c-desc { color: var(--purple); opacity: 0.6; }

    /* Owner (Pavel) card */
    .node.owner .card {
      width: 172px;
      text-align: center;
      padding: 20px 13px 18px;
      border-color: rgba(99,102,241,0.25);
    }
    .node.owner:hover .card {
      border-color: rgba(99,102,241,0.5);
    }
    .avatar {
      width: 58px; height: 58px; border-radius: 50%;
      background: linear-gradient(145deg, #818cf8 0%, #a78bfa 100%);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 11px;
      box-shadow: 0 0 0 5px var(--accent-soft), 0 3px 12px rgba(99,102,241,0.25);
      font-size: 26px; line-height: 1;
    }
    .node.owner .c-name { font-size: 17px; text-align: center; }
    .node.owner .c-sub  {
      font-size: 10px; font-weight: 700; letter-spacing: 1.6px;
      text-transform: uppercase; color: var(--text-muted);
    }

    /* Placeholder */
    .node.ph .card {
      width: 140px;
      background: transparent;
      border: 1.5px dashed var(--border-mid);
      box-shadow: none;
      text-align: center;
      opacity: 0.55;
    }
    .node.ph:hover .card { opacity: 0.85; border-color: rgba(99,102,241,0.4); }
    .node.ph .c-name { font-size: 12.5px; color: var(--text-muted); font-weight: 500; }
    .node.ph .c-ico { opacity: 0.45; font-size: 26px; }

    /* ═══ BADGES ═══ */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px 3px 6px;
      border-radius: 999px;
      font-size: 11px; font-weight: 500; line-height: 1;
      white-space: nowrap;
    }
    .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .b-active  { background: var(--green-soft);  color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .b-active .dot { animation: blink 1.8s ease-in-out infinite; }
    .b-working { background: var(--amber-soft);  color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .b-next    { color: var(--text-muted); border: 1px solid var(--border-mid); }
    .b-wait    { color: var(--text-dim);   border: 1px solid var(--border); }
    .b-stage   { color: var(--text-dim);   border: 1px solid var(--border); }
    .b-hub     { background: var(--purple-light); color: var(--purple); border: 1px solid var(--purple-border); cursor: pointer; font-size: 11px; }
    .b-hub:hover { background: var(--purple); color: #fff; border-color: var(--purple); }
    .b-soon    { color: var(--text-dim);   border: 1px solid var(--border); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ═══ PANEL ═══ */
    .panel {
      position: fixed; top: 54px; right: 0; bottom: 50px;
      width: 440px; max-width: 88vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      z-index: 20; display: flex; flex-direction: column;
      box-shadow: var(--shadow-panel);
    }
    .panel.open { transform: none; }
    .ph-row {
      padding: 15px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .ph-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .ph-close {
      width: 28px; height: 28px; border-radius: 8px;
      background: none; border: none; cursor: pointer;
      font-size: 17px; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
    }
    .ph-close:hover { background: var(--surface-2); color: var(--text); }
    .pb { flex: 1; overflow-y: auto; padding: 15px 18px; }
    .ps { margin-bottom: 18px; }
    .ps h4 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
    .ps p  { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }
    .achips { display: flex; flex-wrap: wrap; gap: 6px; }
    .achip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .achip:hover { border-color: var(--accent); color: var(--accent); }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 12px; cursor: pointer; font-family: inherit; color: var(--text);
      transition: all 0.15s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .evs { display: flex; flex-direction: column; gap: 6px; }
    .ev {
      background: var(--surface-2); border: 1px solid var(--border);
      border-left: 2.5px solid var(--accent);
      border-radius: 9px; padding: 8px 11px; font-size: 11.5px;
    }
    .ev .meta {
      display: flex; gap: 6px; align-items: center;
      color: var(--text-muted); font-size: 10.5px; margin-bottom: 3px;
    }
    .ev .meta b { color: var(--text); font-weight: 600; }
    .ev .msg { color: var(--text); line-height: 1.4; }
    .ev.start   { border-left-color: #60a5fa; }
    .ev.step    { border-left-color: var(--green); }
    .ev.complete{ border-left-color: var(--green); background: var(--green-soft); }
    .ev.handoff { border-left-color: var(--purple); }
    .ev.error   { border-left-color: #f87171; }
    .ev.wait    { border-left-color: var(--amber); }
    .no-ev { padding: 18px; text-align: center; color: var(--text-muted); font-size: 12px; }

    /* ═══ BOTTOM BAR ═══ */
    .bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
      background: var(--surface); border-top: 1px solid var(--border);
      z-index: 10; display: flex; align-items: center;
      padding: 0 16px; gap: 5px; overflow-x: auto;
    }
    .bar::-webkit-scrollbar { display: none; }
    .bar-hint { font-size: 12px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .bar-sep  { color: var(--border-mid); font-size: 18px; line-height: 1; flex-shrink: 0; padding: 0 3px; }
    .bar-btn  {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 7px; flex-shrink: 0;
      background: var(--surface-2); border: 1px solid var(--border);
      font-size: 11.5px; cursor: pointer; font-family: inherit;
      color: var(--text-muted); transition: all 0.15s; white-space: nowrap;
    }
    .bar-btn:hover { background: var(--accent-soft); border-color: rgba(99,102,241,0.3); color: var(--accent); }
    .bar-btn .bh  { color: var(--accent); font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 10.5px; }

    /* ═══ LEGEND ═══ */
    .legend {
      position: fixed; bottom: 58px; left: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 11px; padding: 9px 13px; z-index: 5;
      box-shadow: var(--shadow-card);
      display: flex; flex-direction: column; gap: 5px;
    }
    .leg { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .leg-l { width: 20px; border-top: 2px dashed; flex-shrink: 0; }
    .leg-l.b { border-color: var(--line-blue); }
    .leg-l.o { border-color: var(--line-orange); }
    .leg-l.r { border-color: var(--line-red); }

    /* ═══ TOASTS ═══ */
    .toasts { position: fixed; bottom: 58px; right: 14px; z-index: 30; display: flex; flex-direction: column; gap: 7px; }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 9px 13px; border-radius: 10px; font-size: 12px;
      max-width: 290px; box-shadow: var(--shadow-hover); color: var(--text);
      animation: sIn 0.22s ease;
    }
    @keyframes sIn { from { transform: translateX(14px); opacity: 0; } to { transform: none; opacity: 1; } }

    @media (max-width: 700px) {
      .h-center, .legend { display: none; }
      .card { width: 130px !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand"><span class="brand-dot"></span>Система агентов — Pavel</div>
  <div class="h-center">Галактика HairLove — Агенты — Связи</div>
  <div class="h-right">
    <div class="tsw" id="tsw">
      <button class="tbtn" data-m="light">☀️ Светлая</button>
      <button class="tbtn" data-m="dark">🌙 Тёмная</button>
      <button class="tbtn" data-m="auto">⚙️ Авто</button>
    </div>
    <div class="clock" id="clk">--:--:--</div>
  </div>
</header>

<div class="canvas" id="cvs">
  <svg class="svg-lines" id="svgl"></svg>
</div>

<aside class="panel" id="panel">
  <div class="ph-row">
    <div class="ph-title" id="ptitle">—</div>
    <button class="ph-close" onclick="closeP()">✕</button>
  </div>
  <div class="pb" id="pbody"></div>
</aside>

<div class="bar" id="bar"></div>

<div class="legend">
  <div class="leg"><span class="leg-l b"></span>Тексты → канал</div>
  <div class="leg"><span class="leg-l o"></span>Конкуренты → анализ</div>
  <div class="leg"><span class="leg-l r"></span>Реклама → запуск</div>
</div>

<div class="toasts" id="toasts"></div>

<script>
  const PRJ = 'hairlove';

  /* Node layout — positions as % of canvas (left%, top%) */
  const AG = [
    { k:'strategy',    n:'Стратегия',     cmd:'/hairlove-strategy',   ico:'🎯', d:'Центр сети, дорожная карта',           px:22, py:16, def:'working' },
    { k:'copy',        n:'Тексты бренда', cmd:'/hairlove-texts',       ico:'✍️', d:'Контент для всех каналов',              px: 7, py:35, def:'active'  },
    { k:'site',        n:'Сайт',          cmd:'/hairlove-site',        ico:'🌐', d:'B2B витрина, следующий приоритет',      px:38, py:30, def:'next'    },
    { k:'competitors', n:'Конкуренты',    cmd:'/hairlove-competitors', ico:'🔍', d:'Данные для стратегии и рекламы',        px: 7, py:65, def:'wait'    },
    { k:'ads',         n:'Реклама',       cmd:'/hairlove-ads',         ico:'📣', d:'Meta Ads, стреляет в сайт и Insta',    px:38, py:70, def:'stage'   },
    { k:'instagram',   n:'Instagram',     cmd:'/hairlove-insta',       ico:'📸', d:'Публикация постов',                    px:22, py:84, def:'active'  },
  ];
  const HUB  = { px:22, py:50 };
  const OWN  = { px:64, py:50 };
  const EXTR = [{ px:81, py:33 }, { px:81, py:68 }];
  const WFLOWS = [
    { f:'copy', t:'instagram', c:'b' }, { f:'copy', t:'site', c:'b' },
    { f:'competitors', t:'strategy', c:'o' },
    { f:'ads', t:'instagram', c:'r' }, { f:'ads', t:'site', c:'r' },
  ];
  const LCOL = { b:'var(--line-blue)', o:'var(--line-orange)', r:'var(--line-red)' };

  let projData = null, aTs = {}, lastTs = '', panCtx = null;

  /* ── Theme ── */
  function setTheme(m) {
    const a = m==='auto' ? (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light') : m;
    document.documentElement.setAttribute('data-theme', a);
    localStorage.setItem('th', m);
    document.querySelectorAll('.tbtn').forEach(b => b.classList.toggle('on', b.dataset.m===m));
  }
  document.querySelectorAll('.tbtn').forEach(b => b.addEventListener('click', ()=>setTheme(b.dataset.m)));
  matchMedia('(prefers-color-scheme:dark)').addEventListener('change', ()=>{ if(localStorage.getItem('th')==='auto') setTheme('auto'); });
  setTheme(localStorage.getItem('th')||'light');

  /* ── Clock ── */
  const clk = document.getElementById('clk');
  function tick(){ const d=new Date(); clk.textContent=`${p2(d.getHours())}:${p2(d.getMinutes())}:${p2(d.getSeconds())}`; }
  function p2(n){ return String(n).padStart(2,'0'); }
  setInterval(tick,1000); tick();

  /* ── API ── */
  async function get(u){ try{ return await(await fetch(u)).json(); }catch{ return null; } }

  /* ── Badge ── */
  const BMAP = {
    active:  ['b-active',  'Активен'],
    working: ['b-working', 'В работе'],
    next:    ['b-next',    'Следующий'],
    wait:    ['b-wait',    'Жёт задачи'],
    stage:   ['b-stage',   'Этап 2'],
    done:    ['b-active',  'Готово'],
  };
  function bdg(st, lbl) {
    const [cls, label] = BMAP[st] || ['b-wait', lbl||'Ожидает'];
    return `<span class="badge ${cls}"><span class="dot"></span>${lbl||label}</span>`;
  }
  function agSt(a){ return projData?.active_agent===a.k ? 'active' : a.def; }

  /* ── Format ts ── */
  function fts(ts){
    if(!ts) return '';
    try {
      const d=new Date(ts);
      return `обновлён ${d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'2-digit'})} ${d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}`;
    } catch { return ''; }
  }

  /* ── SVG line ── */
  function ln(svg,x1,y1,x2,y2,stroke,dash,w,op){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke',stroke); l.setAttribute('stroke-width',w);
    l.setAttribute('stroke-dasharray',dash); l.setAttribute('opacity',op);
    l.setAttribute('stroke-linecap','round');
    svg.appendChild(l);
  }

  /* ── Node helper ── */
  function mk(cls,x,y){
    const el=document.createElement('div');
    el.className=cls; el.style.left=x+'px'; el.style.top=y+'px';
    return el;
  }

  /* ── Render ── */
  function render(){
    const cvs=document.getElementById('cvs');
    const svg=document.getElementById('svgl');
    cvs.querySelectorAll('.node').forEach(n=>n.remove());
    svg.innerHTML='';
    const W=cvs.clientWidth, H=cvs.clientHeight;
    const xy=p=>({ x:p.px/100*W, y:p.py/100*H });

    /* Hub↔agents gray lines */
    AG.forEach(a=>{ const h=xy(HUB),p=xy(a); ln(svg,h.x,h.y,p.x,p.y,'var(--line-gray)','3 6',1,0.45); });

    /* Hub↔Pavel purple line */
    { const h=xy(HUB),o=xy(OWN); ln(svg,h.x,h.y,o.x,o.y,'var(--purple-border)','4 7',1.2,0.5); }

    /* Workflow colored lines */
    WFLOWS.forEach(w=>{
      const fa=AG.find(a=>a.k===w.f), ta=AG.find(a=>a.k===w.t);
      if(!fa||!ta) return;
      const p1=xy(fa),p2=xy(ta);
      ln(svg,p1.x,p1.y,p2.x,p2.y,LCOL[w.c],'5 5',1.6,0.7);
    });

    /* Agent nodes */
    AG.forEach(a=>{
      const p=xy(a), el=mk('node',p.x,p.y);
      const ts=aTs[a.k]||'';
      el.innerHTML=`<div class="card">
        <span class="c-ico">${a.ico}</span>
        <div class="c-name">${a.n}</div>
        <span class="c-cmd">${a.cmd}</span>
        <div class="c-desc">${a.d}</div>
        ${ts?`<div class="c-ts">${ts}</div>`:''}
        ${bdg(agSt(a))}
      </div>`;
      el.addEventListener('click',()=>openP({t:'agent',k:a.k}));
      cvs.appendChild(el);
    });

    /* Hub */
    { const p=xy(HUB), el=mk('node hub',p.x,p.y);
      el.innerHTML=`<div class="card">
        <span class="c-ico">🐱</span>
        <div class="c-name">HairLove</div>
        <div class="c-sub">ГАЛАКТИКА</div>
        <div class="c-desc">Бренд косметики для волос</div>
        <span class="badge b-hub">⚡ /full-cycle</span>
      </div>`;
      el.addEventListener('click',()=>openP({t:'project'}));
      cvs.appendChild(el); }

    /* Owner */
    { const p=xy(OWN), el=mk('node owner',p.x,p.y);
      el.innerHTML=`<div class="card">
        <div class="avatar">👤</div>
        <div class="c-name">Павел</div>
        <div class="c-sub">ВЛАДЕЛЕЦ</div>
      </div>`;
      el.addEventListener('click',()=>openP({t:'owner'}));
      cvs.appendChild(el); }

    /* Placeholders */
    EXTR.forEach(pos=>{
      const p=xy(pos), el=mk('node ph',p.x,p.y);
      el.innerHTML=`<div class="card">
        <span class="c-ico">📦</span>
        <div class="c-name">Новое направление</div>
        <span class="badge b-soon"><span class="dot"></span>Скоро</span>
      </div>`;
      cvs.appendChild(el);
    });
  }

  /* ── Bottom bar ── */
  function renderBar(){
    const bar=document.getElementById('bar');
    bar.innerHTML=`<span class="bar-hint">Нажми на планету → детали</span><span class="bar-sep">|</span>`
      + AG.map(a=>`<button class="bar-btn" data-k="${a.k}"><span class="bh">${a.cmd}</span>${a.n}</button>`).join('');
    bar.querySelectorAll('.bar-btn').forEach(b=>b.addEventListener('click',()=>openP({t:'agent',k:b.dataset.k})));
  }

  /* ── Panel ── */
  function openP(ctx){ panCtx=ctx; document.getElementById('panel').classList.add('open'); drawP(); }
  function closeP(){ panCtx=null; document.getElementById('panel').classList.remove('open'); }

  async function drawP(){
    if(!panCtx) return;
    const T=document.getElementById('ptitle'), B=document.getElementById('pbody');

    if(panCtx.t==='owner'){
      T.textContent='👤 Павел';
      B.innerHTML=`<div class="ps"><h4>Роль</h4><p>Владелец системы агентов. Управляет направлениями через оркестратора каждого проекта.</p></div>
        <div class="ps"><h4>Направления</h4><div class="achips"><div class="achip" onclick="openP({t:'project'})">🐱 HairLove</div></div></div>`;
      return;
    }

    if(panCtx.t==='project'){
      T.textContent='🐱 HairLove';
      const evs=await get(`/api/agents/events?project=${PRJ}&limit=40`)||[];
      B.innerHTML=`<div class="ps"><h4>Агенты (${AG.length})</h4>
        <div class="achips">${AG.map(a=>`<div class="achip" onclick="openP({t:'agent',k:'${a.k}'})">${a.ico} ${a.n}</div>`).join('')}</div>
        </div>
        <div class="ps"><h4>Лента событий (${evs.length})</h4>
        <div class="evs">${evs.length?[...evs].reverse().map(fe).join(''):'<div class="no-ev">событий пока нет</div>'}</div></div>`;
      return;
    }

    if(panCtx.t==='agent'){
      const a=AG.find(x=>x.k===panCtx.k); if(!a) return;
      T.innerHTML=`${a.ico} ${a.n}`;
      const evs=await get(`/api/agents/events?project=${PRJ}&agent=${a.k}&limit=50`)||[];
      B.innerHTML=`<div class="ps"><h4>Агент</h4>
        <div style="margin-bottom:6px"><code style="background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:6px;font-size:11px;font-family:ui-monospace,'SF Mono',monospace">${a.cmd}</code></div>
        <p>${a.d}</p></div>
        <div class="ps"><button class="back-btn" onclick="openP({t:'project'})">← HairLove</button></div>
        <div class="ps"><h4>События (${evs.length})</h4>
        <div class="evs">${evs.length?[...evs].reverse().map(fe).join(''):'<div class="no-ev">агент ещё не работал</div>'}</div></div>`;
    }
  }

  function fe(e){
    const t=(e.ts||'').slice(11,16), tp=e.type||'step';
    const a=AG.find(x=>x.k===e.agent);
    return `<div class="ev ${tp}">
      <div class="meta"><span>${t}</span><span>${a?a.ico:'•'}</span><b>${esc(a?a.n:(e.agent||'—'))}</b><span style="margin-left:auto;opacity:.6;font-size:9.5px">${tp}</span></div>
      <div class="msg">${esc(e.message||'')}</div></div>`;
  }
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  /* ── Toast ── */
  function toast(e){
    const a=AG.find(x=>x.k===e.agent);
    const d=document.createElement('div'); d.className='toast';
    d.innerHTML=`${a?a.ico:'•'} <b>${esc(a?a.n:(e.agent||'—'))}</b>: ${esc((e.message||'').slice(0,88))}`;
    document.getElementById('toasts').appendChild(d);
    setTimeout(()=>d.remove(),4500);
  }

  /* ── Polling ── */
  async function loadPrj(){
    const list=await get('/api/agents/projects');
    if(list){ projData=list.find(p=>p.name===PRJ)||null; render(); if(panCtx) drawP(); }
  }
  async function poll(){
    const url=lastTs
      ?`/api/agents/events?project=${PRJ}&since=${encodeURIComponent(lastTs)}&limit=20`
      :`/api/agents/events?project=${PRJ}&limit=1`;
    const evs=await get(url);
    if(evs?.length) evs.forEach(e=>{ if(e.ts>lastTs){ lastTs=e.ts; aTs[e.agent]=fts(e.ts); toast(e); } });
  }

  /* ── Init ── */
  window.addEventListener('resize', render);
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeP(); });

  renderBar();

  (async()=>{
    await loadPrj();
    const last=await get(`/api/agents/events?project=${PRJ}&limit=20`);
    if(last?.length){
      lastTs=last[last.length-1].ts;
      last.forEach(e=>{ if(!aTs[e.agent]) aTs[e.agent]=fts(e.ts); });
      render();
    }
    setInterval(loadPrj,8000);
    setInterval(poll,3000);
  })();

  window.openP=openP; window.closeP=closeP;
</script>
</body>
</html>
