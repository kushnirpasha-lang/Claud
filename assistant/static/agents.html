<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Система агентов — Pavel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4ff;
      --bg-grad-1: #f8f6ff;
      --bg-grad-2: #eee9ff;
      --surface: #ffffff;
      --surface-2: #faf9ff;
      --border: #e5e1f5;
      --border-strong: #d4cfeb;
      --text: #1a1a2e;
      --text-muted: #6b6a85;
      --text-dim: #9594ad;
      --accent: #6366f1;
      --accent-soft: #eef0ff;
      --green: #22c55e;
      --green-soft: #dcfce7;
      --orange: #f59e0b;
      --orange-soft: #fef3c7;
      --purple: #a855f7;
      --purple-soft: #f3e8ff;
      --red: #ef4444;
      --red-soft: #fee2e2;
      --blue: #3b82f6;
      --blue-soft: #dbeafe;
      --shadow-sm: 0 1px 2px rgba(26, 26, 46, 0.04);
      --shadow: 0 2px 8px rgba(99, 102, 241, 0.08), 0 1px 2px rgba(26, 26, 46, 0.04);
      --shadow-lg: 0 8px 24px rgba(99, 102, 241, 0.12), 0 2px 8px rgba(26, 26, 46, 0.06);
      --radius: 16px;
      --radius-sm: 10px;
    }

    [data-theme="dark"] {
      --bg: #0e0e1a;
      --bg-grad-1: #14142a;
      --bg-grad-2: #0a0a14;
      --surface: #1a1a2e;
      --surface-2: #14142a;
      --border: rgba(120, 120, 180, 0.2);
      --border-strong: rgba(120, 120, 180, 0.35);
      --text: #e8e8f0;
      --text-muted: #9594ad;
      --text-dim: #6b6a85;
      --accent: #818cf8;
      --accent-soft: rgba(99, 102, 241, 0.15);
      --green-soft: rgba(34, 197, 94, 0.15);
      --orange-soft: rgba(245, 158, 11, 0.15);
      --purple-soft: rgba(168, 85, 247, 0.15);
      --red-soft: rgba(239, 68, 68, 0.15);
      --blue-soft: rgba(59, 130, 246, 0.15);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body {
      position: relative;
      min-height: 100vh;
    }

    /* Декоративный фон с точками */
    .bg-decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(circle, var(--border-strong) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
    }
    [data-theme="dark"] .bg-decor { opacity: 0.15; }

    /* Орбиты */
    .orbits-bg {
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      width: 90vh; height: 90vh;
      max-width: 90vw; max-height: 90vw;
      border-radius: 50%;
      border: 1px dashed var(--border-strong);
      opacity: 0.6;
    }
    .orbits-bg::before, .orbits-bg::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px dashed var(--border-strong);
    }
    .orbits-bg::before { width: 65%; height: 65%; }
    .orbits-bg::after { width: 35%; height: 35%; }

    /* ── Шапка ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      gap: 16px;
    }
    .brand {
      display: flex; align-items: center; gap: 8px;
      font-weight: 600; font-size: 15px;
      color: var(--text);
    }
    .brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .header-center {
      color: var(--text-muted);
      font-size: 13px;
    }
    .header-center .sep { color: var(--text-dim); margin: 0 6px; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-switch {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
      box-shadow: var(--shadow-sm);
    }
    .theme-btn {
      border: none;
      background: transparent;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
      font-family: inherit;
    }
    .theme-btn:hover { color: var(--text); }
    .theme-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }

    .clock {
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Галактика ── */
    .galaxy {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    .links {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Карточка-планета ── */
    .node {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 3;
      transition: transform 0.2s ease;
    }
    .node:hover { transform: translate(-50%, -50%) translateY(-3px); z-index: 6; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      width: 200px;
      transition: all 0.2s ease;
    }
    .node:hover .card {
      box-shadow: var(--shadow-lg);
      border-color: var(--accent);
    }
    .card-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }
    .card-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-handle {
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .card-sub {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 10px;
      min-height: 2.8em;
    }
    .card-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 999px;
      font-weight: 500;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .badge.green { background: var(--green-soft); color: var(--green); }
    .badge.orange { background: var(--orange-soft); color: var(--orange); }
    .badge.purple { background: var(--purple-soft); color: var(--purple); }
    .badge.gray { background: var(--surface-2); color: var(--text-muted); }
    .badge .dot-mini {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }
    .badge.green.pulse .dot-mini { animation: pulseDot 1.5s infinite; }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Центральная карточка (Pavel — солнце) */
    .node.sun .card {
      background: linear-gradient(135deg, #ffe89b 0%, #f59e0b 100%);
      border: none;
      box-shadow: 0 0 60px rgba(245, 158, 11, 0.3), 0 0 120px rgba(245, 158, 11, 0.15);
      width: 220px;
      text-align: center;
    }
    .node.sun .card-title, .node.sun .card-handle, .node.sun .card-sub {
      color: #1a1a2e;
    }
    .node.sun .card-handle { color: rgba(26, 26, 46, 0.7); }
    [data-theme="dark"] .node.sun .card { box-shadow: 0 0 80px rgba(245, 158, 11, 0.4); }

    /* Карточка "новый проект" */
    .node.add .card {
      background: transparent;
      border: 2px dashed var(--border-strong);
      box-shadow: none;
      opacity: 0.6;
      text-align: center;
    }
    .node.add:hover .card { opacity: 1; border-color: var(--accent); }

    /* ── Side панель ── */
    .panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 480px;
      max-width: 90vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 20;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }
    .panel.open { transform: translateX(0); }
    .panel-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-size: 17px; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .panel-close {
      background: transparent; border: none;
      color: var(--text-muted); cursor: pointer;
      font-size: 22px; width: 32px; height: 32px;
      border-radius: 8px;
    }
    .panel-close:hover { background: var(--surface-2); color: var(--text); }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px 22px; }
    .panel-section { margin-bottom: 22px; }
    .panel-section h4 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); margin-bottom: 10px; font-weight: 600;
    }
    .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap: 8px; }
    .agent-chip {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 6px; text-align: center;
      cursor: pointer; transition: all 0.15s;
    }
    .agent-chip:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
    .agent-chip.active { border-color: var(--green); background: var(--green-soft); }
    .agent-chip .emoji { font-size: 22px; }
    .agent-chip .name { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    .events { display: flex; flex-direction: column; gap: 8px; }
    .event {
      background: var(--surface-2); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-radius: 10px;
      padding: 10px 12px; font-size: 12px;
    }
    .event .meta {
      display: flex; gap: 8px; align-items: center;
      color: var(--text-muted); font-size: 11px; margin-bottom: 4px;
    }
    .event .agent-name { color: var(--text); font-weight: 600; }
    .event .msg { color: var(--text); }
    .event.start { border-left-color: var(--blue); }
    .event.step { border-left-color: var(--green); }
    .event.complete { border-left-color: var(--green); background: var(--green-soft); }
    .event.handoff { border-left-color: var(--purple); }
    .event.error { border-left-color: var(--red); background: var(--red-soft); }
    .event.wait { border-left-color: var(--orange); }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Toast ── */
    .toasts {
      position: fixed;
      bottom: 24px; left: 24px;
      z-index: 30;
      display: flex; flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      max-width: 320px;
      box-shadow: var(--shadow-lg);
      animation: toastIn 0.3s ease;
      color: var(--text);
    }
    @keyframes toastIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ── Легенда ── */
    .legend {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 11px;
      color: var(--text-muted);
      box-shadow: var(--shadow-sm);
      z-index: 5;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-line {
      width: 16px; height: 2px;
      border-radius: 2px;
    }

    /* ── Адаптив ── */
    @media (max-width: 720px) {
      header { flex-direction: column; padding: 10px; gap: 8px; }
      .header-center { display: none; }
      .card { width: 160px; padding: 12px; }
      .legend { font-size: 10px; padding: 6px 12px; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="bg-decor"></div>
  <div class="orbits-bg"></div>

  <header>
    <div class="brand">
      <span class="dot"></span>
      <span>Система агентов — Pavel</span>
    </div>
    <div class="header-center">
      <span id="hc-stat-projects">0 проектов</span>
      <span class="sep">—</span>
      <span id="hc-stat-events">0 событий</span>
      <span class="sep">—</span>
      <span>живая лента</span>
    </div>
    <div class="header-right">
      <div class="theme-switch" id="theme-switch">
        <button class="theme-btn" data-theme="light">☀️ Светлая</button>
        <button class="theme-btn" data-theme="dark">🌙 Тёмная</button>
        <button class="theme-btn" data-theme="auto">⚙️ Авто</button>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </header>

  <div class="galaxy" id="galaxy">
    <svg class="links" id="links"></svg>
  </div>

  <aside class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title">—</div>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </aside>

  <div class="toasts" id="toasts"></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-line" style="background:var(--green)"></span>активный проект</div>
    <div class="legend-item"><span class="legend-line" style="background:var(--accent)"></span>обычная связь</div>
    <div class="legend-item"><span class="legend-line" style="background:var(--purple)"></span>передача</div>
  </div>

  <script>
    const AGENTS = [
      { key: 'coordinator', emoji: '🎯', name: 'координатор' },
      { key: 'planning', emoji: '📋', name: 'планинг' },
      { key: 'competitors', emoji: '🔍', name: 'конкуренты' },
      { key: 'strategy', emoji: '🧭', name: 'стратегия' },
      { key: 'site', emoji: '🌐', name: 'сайт' },
      { key: 'ads', emoji: '📢', name: 'реклама' },
      { key: 'growth', emoji: '📈', name: 'рост' },
      { key: 'instagram', emoji: '📱', name: 'instagram' },
      { key: 'copy', emoji: '✍️', name: 'тексты бренда' },
      { key: 'text-editor', emoji: '🖋️', name: 'редактор' },
    ];
    const AGENT_MAP = Object.fromEntries(AGENTS.map(a => [a.key, a]));

    const TYPE_LABEL = {
      start: 'старт', step: 'шаг', complete: 'готово',
      handoff: 'передача', error: 'ошибка', wait: 'ожидание'
    };

    let projects = [];
    let lastEventTs = '';
    let activePanel = null;

    // ── Тема ─────────────────────────────────────────────────────
    function applyTheme(mode) {
      const actual = mode === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : mode;
      document.documentElement.setAttribute('data-theme', actual);
      localStorage.setItem('theme-mode', mode);
      document.querySelectorAll('.theme-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.theme === mode);
      });
    }
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.addEventListener('click', () => applyTheme(b.dataset.theme));
    });
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      const mode = localStorage.getItem('theme-mode') || 'light';
      if (mode === 'auto') applyTheme('auto');
    });
    applyTheme(localStorage.getItem('theme-mode') || 'light');

    // ── Часы ─────────────────────────────────────────────────────
    function tickClock() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
    }
    setInterval(tickClock, 1000); tickClock();

    // ── API ──────────────────────────────────────────────────────
    async function api(path) {
      try { const r = await fetch(path); return await r.json(); } catch { return null; }
    }

    // ── Рендер галактики ─────────────────────────────────────────
    function renderGalaxy() {
      const galaxy = document.getElementById('galaxy');
      const links = document.getElementById('links');
      const w = galaxy.clientWidth, h = galaxy.clientHeight;
      const cx = w / 2, cy = h / 2;

      [...galaxy.querySelectorAll('.node')].forEach(el => el.remove());
      links.innerHTML = '';

      // Sun (Pavel) в центре
      const sun = document.createElement('div');
      sun.className = 'node sun';
      sun.style.left = cx + 'px';
      sun.style.top = cy + 'px';
      sun.innerHTML = `
        <div class="card">
          <div class="card-icon">🧑</div>
          <div class="card-title">Pavel</div>
          <div class="card-handle">/orchestrator</div>
          <div class="card-sub">главный оркестратор всей системы</div>
          <span class="badge orange"><span class="dot-mini"></span>владелец</span>
        </div>
      `;
      sun.addEventListener('click', () => openPanel({ type: 'sun' }));
      galaxy.appendChild(sun);

      // Радиус орбиты
      const R = Math.min(w, h) * 0.32;

      // Проекты-планеты
      const items = [...projects, { name: '__add__' }];
      items.forEach((p, i) => {
        const angle = (i / items.length) * Math.PI * 2 - Math.PI / 2;
        const x = cx + Math.cos(angle) * R;
        const y = cy + Math.sin(angle) * R;

        // линия к солнцу
        if (p.name !== '__add__') {
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', cx);
          line.setAttribute('y1', cy);
          line.setAttribute('x2', x);
          line.setAttribute('y2', y);
          line.setAttribute('stroke', p.active_agent ? 'var(--green)' : 'var(--border-strong)');
          line.setAttribute('stroke-width', p.active_agent ? '2' : '1');
          line.setAttribute('stroke-dasharray', '4 6');
          line.setAttribute('opacity', p.active_agent ? '0.8' : '0.5');
          links.appendChild(line);
        }

        const el = createNode(p, x, y);
        galaxy.appendChild(el);
      });
    }

    function createNode(p, x, y) {
      const el = document.createElement('div');
      el.className = 'node';
      el.style.left = x + 'px';
      el.style.top = y + 'px';

      if (p.name === '__add__') {
        el.classList.add('add');
        el.innerHTML = `
          <div class="card">
            <div class="card-icon">➕</div>
            <div class="card-title" style="color:var(--text-muted)">Новое направление</div>
            <div class="card-handle">/новый-проект</div>
            <span class="badge gray">скоро</span>
          </div>
        `;
        el.addEventListener('click', () => openPanel({ type: 'add' }));
        return el;
      }

      const lastEv = p.last_event;
      const lastTime = lastEv ? formatTime(lastEv.ts) : '';
      const isActive = !!p.active_agent;
      const agentInfo = isActive ? AGENT_MAP[p.active_agent] : null;
      const subText = lastEv ? (lastEv.message || '').slice(0, 60) : 'нет событий';

      const badgeHtml = isActive
        ? `<span class="badge green pulse"><span class="dot-mini"></span>${agentInfo ? agentInfo.emoji + ' ' + agentInfo.name : p.active_agent}</span>`
        : `<span class="badge gray"><span class="dot-mini"></span>покой</span>`;

      el.innerHTML = `
        <div class="card">
          <div class="card-icon">🌍</div>
          <div class="card-title">${escapeHtml(p.name)}</div>
          <div class="card-handle">/${escapeHtml(p.name)}</div>
          <div class="card-sub">${escapeHtml(subText)}</div>
          ${lastTime ? `<div class="card-meta">обновлён ${lastTime}</div>` : ''}
          ${badgeHtml}
        </div>
      `;

      el.addEventListener('click', () => openPanel({ type: 'project', project: p.name }));
      return el;
    }

    function formatTime(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts);
        const date = d.toLocaleDateString('ru', { day: '2-digit', month: '2-digit', year: '2-digit' });
        const time = d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
        return `${date} ${time}`;
      } catch { return ts.slice(0, 16).replace('T', ' '); }
    }

    // ── Панель ───────────────────────────────────────────────────
    function openPanel(ctx) {
      activePanel = ctx;
      document.getElementById('panel').classList.add('open');
      renderPanel();
    }
    function closePanel() {
      activePanel = null;
      document.getElementById('panel').classList.remove('open');
    }

    async function renderPanel() {
      if (!activePanel) return;
      const titleEl = document.getElementById('panel-title');
      const bodyEl = document.getElementById('panel-body');

      if (activePanel.type === 'add') {
        titleEl.innerHTML = `<span>➕ Новый проект</span>`;
        bodyEl.innerHTML = `
          <div class="empty">
            Создание через CLI на сервере:
            <pre style="margin-top:14px;background:var(--surface-2);border:1px solid var(--border);padding:12px;border-radius:10px;text-align:left;font-size:12px;color:var(--text);font-family:'SF Mono',monospace;">~/projects/новый-проект.sh имя-проекта</pre>
          </div>`;
        return;
      }

      if (activePanel.type === 'sun') {
        titleEl.innerHTML = `🧑 Pavel — оркестратор`;
        bodyEl.innerHTML = `
          <div class="panel-section">
            <h4>Роль</h4>
            <p style="color:var(--text-muted);font-size:13px">
              Главный оркестратор всей системы. Каждый проект — мини-вселенная
              со своим координатором и 9 агентами.
            </p>
          </div>
          <div class="panel-section">
            <h4>Все агенты системы</h4>
            <div class="agent-grid">
              ${AGENTS.map(a => `
                <div class="agent-chip">
                  <div class="emoji">${a.emoji}</div>
                  <div class="name">${a.name}</div>
                </div>
              `).join('')}
            </div>
          </div>`;
        return;
      }

      if (activePanel.type === 'project') {
        const p = projects.find(x => x.name === activePanel.project);
        if (!p) return;
        titleEl.innerHTML = `🌍 ${escapeHtml(p.name)}`;
        const events = await api(`/api/agents/events?project=${encodeURIComponent(p.name)}&limit=50`) || [];
        bodyEl.innerHTML = `
          <div class="panel-section">
            <h4>Состояние</h4>
            <div style="font-size:13px">
              ${p.active_agent
                ? `🟢 активен: <b>${escapeHtml(p.active_agent)}</b>`
                : '⚪ покой'}
            </div>
          </div>
          <div class="panel-section">
            <h4>Агенты проекта</h4>
            <div class="agent-grid">
              ${AGENTS.map(a => `
                <div class="agent-chip ${p.active_agent === a.key ? 'active' : ''}"
                     onclick='openPanel({type:"agent",project:${JSON.stringify(p.name)},agent:${JSON.stringify(a.key)}})'>
                  <div class="emoji">${a.emoji}</div>
                  <div class="name">${a.name}</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="panel-section">
            <h4>Лента событий (${events.length})</h4>
            <div class="events">
              ${events.length ? events.reverse().map(renderEvent).join('') : '<div class="empty">пока пусто</div>'}
            </div>
          </div>`;
        return;
      }

      if (activePanel.type === 'agent') {
        const a = AGENT_MAP[activePanel.agent];
        const proj = activePanel.project;
        titleEl.innerHTML = `${a.emoji} ${escapeHtml(a.name)} <span style="color:var(--text-muted);font-weight:400;font-size:13px">· ${escapeHtml(proj)}</span>`;
        const events = await api(`/api/agents/events?project=${encodeURIComponent(proj)}&agent=${encodeURIComponent(activePanel.agent)}&limit=50`) || [];
        bodyEl.innerHTML = `
          <div class="panel-section">
            <h4>← Назад</h4>
            <div class="agent-chip" style="display:inline-block;cursor:pointer" onclick='openPanel({type:"project",project:${JSON.stringify(proj)}})'>
              <div class="emoji">🌍</div>
              <div class="name">${escapeHtml(proj)}</div>
            </div>
          </div>
          <div class="panel-section">
            <h4>События агента (${events.length})</h4>
            <div class="events">
              ${events.length ? events.reverse().map(renderEvent).join('') : '<div class="empty">этот агент ещё не работал в проекте</div>'}
            </div>
          </div>`;
        return;
      }
    }

    function renderEvent(e) {
      const time = (e.ts || '').slice(11, 16);
      const type = e.type || 'step';
      const a = AGENT_MAP[e.agent] || { emoji: '•', name: e.agent || '—' };
      return `
        <div class="event ${type}">
          <div class="meta">
            <span>${time}</span>
            <span>${a.emoji}</span>
            <span class="agent-name">${escapeHtml(a.name)}</span>
            <span style="margin-left:auto">${TYPE_LABEL[type] || type}</span>
          </div>
          <div class="msg">${escapeHtml(e.message || '')}</div>
        </div>`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ── Polling ──────────────────────────────────────────────────
    async function loadProjects() {
      const data = await api('/api/agents/projects');
      if (data) {
        projects = data;
        renderGalaxy();
        if (activePanel && (activePanel.type === 'project' || activePanel.type === 'agent')) {
          renderPanel();
        }
      }
    }
    async function loadStats() {
      const s = await api('/api/agents/stats');
      if (s) {
        document.getElementById('hc-stat-projects').textContent = (s.total_projects || 0) + ' проектов';
        document.getElementById('hc-stat-events').textContent = (s.total_events || 0) + ' событий';
      }
    }
    async function pollNewEvents() {
      const url = lastEventTs
        ? `/api/agents/events?since=${encodeURIComponent(lastEventTs)}&limit=20`
        : `/api/agents/events?limit=1`;
      const events = await api(url);
      if (events && events.length) {
        events.forEach(e => {
          if (e.ts > lastEventTs) {
            lastEventTs = e.ts;
            showToast(e);
          }
        });
      }
    }
    function showToast(e) {
      const t = document.getElementById('toasts');
      const a = AGENT_MAP[e.agent] || { emoji: '•', name: e.agent };
      const div = document.createElement('div');
      div.className = 'toast';
      div.innerHTML = `${a.emoji} <b>${escapeHtml(e.project || '—')}</b> · ${escapeHtml(a.name)}: ${escapeHtml((e.message || '').slice(0, 80))}`;
      t.appendChild(div);
      setTimeout(() => div.remove(), 4000);
    }

    window.addEventListener('resize', () => renderGalaxy());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

    (async () => {
      await loadStats();
      await loadProjects();
      const last = await api('/api/agents/events?limit=1');
      if (last && last.length) lastEventTs = last[last.length - 1].ts;
      setInterval(loadProjects, 5000);
      setInterval(loadStats, 10000);
      setInterval(pollNewEvents, 3000);
    })();

    window.openPanel = openPanel;
    window.closePanel = closePanel;
  </script>
</body>
</html>
