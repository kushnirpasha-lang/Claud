<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram — HairLove</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .header-logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .header h1 { font-size: 22px; color: #262626; font-weight: 600; }
    .header p { font-size: 13px; color: #8e8e8e; }

    .card {
      background: #fff;
      border: 1px solid #dbdbdb;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 16px;
    }

    .account-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .account-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f09433, #bc1888);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: white; font-weight: 700;
      flex-shrink: 0;
    }

    .account-name { font-weight: 600; color: #262626; font-size: 15px; }
    .account-stats { font-size: 13px; color: #8e8e8e; margin-top: 2px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #262626;
      margin-bottom: 6px;
    }

    input[type="text"], textarea {
      width: 100%;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: #262626;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: #0095f6;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .field { margin-bottom: 18px; }

    .preview-box {
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      overflow: hidden;
      background: #f0f0f0;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8e8e8e;
      font-size: 14px;
      margin-top: 8px;
    }

    .preview-box img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      display: block;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #0095f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #0081d6; }
    .btn:disabled { background: #b2dffc; cursor: not-allowed; }

    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .status.success { background: #d4edda; color: #155724; display: block; }
    .status.error   { background: #f8d7da; color: #721c24; display: block; }
    .status.loading { background: #d1ecf1; color: #0c5460; display: block; }

    .hint {
      font-size: 12px;
      color: #8e8e8e;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo">📸</div>
    <div>
      <h1>Публикация в Instagram</h1>
      <p>hair_love_company</p>
    </div>
  </div>

  <div class="card" id="accountCard">
    <div class="account-info">
      <div class="account-avatar">H</div>
      <div>
        <div class="account-name" id="accName">Загрузка...</div>
        <div class="account-stats" id="accStats"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label>Ссылка на фото (публичный URL)</label>
      <input type="text" id="imageUrl" placeholder="https://example.com/photo.jpg" oninput="previewImage()">
      <p class="hint">Фото должно быть доступно по прямой ссылке (JPG/PNG)</p>
    </div>

    <div class="field">
      <label>Предпросмотр</label>
      <div class="preview-box" id="preview">Введите ссылку выше</div>
    </div>

    <div class="field">
      <label>Подпись</label>
      <textarea id="caption" placeholder="Напишите подпись к публикации...&#10;&#10;#hairlove #hair #beauty"></textarea>
    </div>

    <button class="btn" id="publishBtn" onclick="publish()">Опубликовать</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    async function loadAccountInfo() {
      try {
        const r = await fetch('/api/instagram/info');
        const data = await r.json();
        if (data.username) {
          document.getElementById('accName').textContent = '@' + data.username;
          document.getElementById('accStats').textContent =
            `Публикаций: ${data.media_count ?? '—'} · Подписчиков: ${data.followers_count ?? '—'}`;
        }
      } catch (e) {
        document.getElementById('accName').textContent = '@hair_love_company';
      }
    }

    function previewImage() {
      const url = document.getElementById('imageUrl').value.trim();
      const box = document.getElementById('preview');
      if (!url) {
        box.innerHTML = 'Введите ссылку выше';
        return;
      }
      box.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='Не удалось загрузить фото'" alt="preview">`;
    }

    async function publish() {
      const imageUrl = document.getElementById('imageUrl').value.trim();
      const caption  = document.getElementById('caption').value.trim();
      const btn      = document.getElementById('publishBtn');
      const status   = document.getElementById('status');

      if (!imageUrl) {
        status.className = 'status error';
        status.textContent = 'Введите ссылку на фото';
        return;
      }

      btn.disabled = true;
      status.className = 'status loading';
      status.textContent = 'Публикуем...';

      try {
        const r = await fetch('/api/instagram/post', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image_url: imageUrl, caption })
        });
        const data = await r.json();

        if (data.ok) {
          status.className = 'status success';
          status.textContent = '✅ Пост опубликован в @hair_love_company!';
          document.getElementById('imageUrl').value = '';
          document.getElementById('caption').value = '';
          document.getElementById('preview').innerHTML = 'Введите ссылку выше';
          loadAccountInfo();
        } else {
          status.className = 'status error';
          status.textContent = '❌ Ошибка: ' + (data.error || 'неизвестная ошибка');
        }
      } catch (e) {
        status.className = 'status error';
        status.textContent = '❌ Ошибка соединения с сервером';
      }

      btn.disabled = false;
    }

    loadAccountInfo();
  </script>
</body>
</html>
