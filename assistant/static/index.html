<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Личный ИИ-ассистент</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --text: #e2e2e2;
      --text-muted: #666;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --user-bg: #1e3a8a;
      --assistant-bg: #1a1a1a;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 16px; font-weight: 600; color: #fff; }
    header p  { font-size: 12px; color: var(--text-muted); }

    .header-actions { display: flex; gap: 8px; }

    .btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn:hover { border-color: #444; color: var(--text); background: var(--surface2); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .message-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .message-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .msg-avatar.ai   { background: linear-gradient(135deg, #2563eb, #7c3aed); }
    .msg-avatar.user { background: #1e3a8a; }

    .bubble {
      max-width: min(72%, 720px);
      padding: 12px 16px;
      border-radius: var(--radius);
      word-break: break-word;
    }

    .user .bubble {
      background: var(--user-bg);
      color: #e0eaff;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: var(--assistant-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown inside assistant bubble */
    .bubble p      { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 14px 0 6px; color: #fff; }
    .bubble ul,.bubble ol { padding-left: 20px; margin-bottom: 10px; }
    .bubble li { margin-bottom: 4px; }
    .bubble strong { color: #fff; }
    .bubble em { color: #aaa; }
    .bubble a  { color: #60a5fa; text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    .bubble code {
      background: #111;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
      color: #f59e0b;
    }

    .bubble pre {
      background: #111 !important;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
      position: relative;
    }
    .bubble pre code {
      background: none !important;
      padding: 0;
      color: inherit;
      font-size: 13px;
    }

    .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: #999;
      margin: 8px 0;
    }

    /* Typing indicator */
    .typing-bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); background: #555; }
      30% { transform: translateY(-6px); background: var(--accent); }
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      gap: 20px;
    }
    .welcome-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #2563eb22, #7c3aed22);
      border: 1px solid #2563eb44;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .welcome h2 { font-size: 22px; color: #888; font-weight: 500; }
    .welcome p  { font-size: 14px; max-width: 420px; }
    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 500px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--accent); color: #fff; background: #1e3a8a22; }

    /* ── Input area ── */
    #input-area {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      max-height: 140px;
      transition: border-color 0.15s;
    }
    #msg-input::placeholder { color: var(--text-muted); }
    #msg-input:focus { border-color: var(--accent); }

    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { background: #333; cursor: not-allowed; opacity: 0.6; }

    .input-hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 4px 0 0;
    }

    @media (max-width: 600px) {
      #messages { padding: 14px 12px; }
      .bubble { max-width: 88%; }
      header { padding: 12px 14px; }
      #input-area { padding: 10px 12px; }
      .welcome-chips { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <div class="avatar">🤖</div>
    <div>
      <h1>Личный ИИ-ассистент</h1>
      <p>на базе Claude</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="newChat()">＋ Новый чат</button>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>Привет! Чем могу помочь?</h2>
    <p>Ищу информацию, пишу тексты, помогаю с бизнесом, сайтами и техникой. Задавай любой вопрос.</p>
    <div class="welcome-chips">
      <span class="chip" onclick="sendChip(this)">Найди поставщика</span>
      <span class="chip" onclick="sendChip(this)">Напиши пост для Instagram</span>
      <span class="chip" onclick="sendChip(this)">Помоги с рекламой</span>
      <span class="chip" onclick="sendChip(this)">Разбери ошибку на сервере</span>
      <span class="chip" onclick="sendChip(this)">Составь коммерческое предложение</span>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea
    id="msg-input"
    rows="1"
    placeholder="Напиши сообщение... (Enter — отправить, Shift+Enter — новая строка)"
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"
  ></textarea>
  <button id="send-btn" onclick="sendMessage()">Отправить</button>
</div>

<script>
  // ── Session ID ──────────────────────────────────────────────
  let sessionId = localStorage.getItem('ai_session');
  if (!sessionId) {
    sessionId = Math.random().toString(36).slice(2, 11) + Date.now().toString(36);
    localStorage.setItem('ai_session', sessionId);
  }

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');

  // ── Marked.js setup ─────────────────────────────────────────
  marked.setOptions({
    breaks: true,
    gfm: true,
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });

  // ── Helpers ─────────────────────────────────────────────────
  function removeWelcome() {
    const el = document.getElementById('welcome');
    if (el) el.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(text, role) {
    removeWelcome();

    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    const ava = document.createElement('div');
    ava.className = `msg-avatar ${role === 'user' ? 'user' : 'ai'}`;
    ava.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'assistant') {
      bubble.innerHTML = marked.parse(text);
      bubble.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    } else {
      bubble.textContent = text;
    }

    row.appendChild(ava);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    removeWelcome();
    const row = document.createElement('div');
    row.className = 'message-row assistant';
    row.id = 'typing-row';

    const ava = document.createElement('div');
    ava.className = 'msg-avatar ai';
    ava.textContent = '🤖';

    const tb = document.createElement('div');
    tb.className = 'typing-bubble';
    tb.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    row.appendChild(ava);
    row.appendChild(tb);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  // ── Send ────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    autoResize(inputEl);
    sendBtn.disabled = true;

    addMessage(text, 'user');
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });

      const data = await res.json();
      hideTyping();

      if (data.reply) {
        addMessage(data.reply, 'assistant');
      } else {
        addMessage('Что-то пошло не так. Попробуй ещё раз.', 'assistant');
      }
    } catch (e) {
      hideTyping();
      addMessage('Ошибка соединения. Проверь интернет и попробуй снова.', 'assistant');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  async function newChat() {
    await fetch('/api/new', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    }).catch(() => {});

    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Новый чат!</h2>
        <p>История очищена. Чем могу помочь?</p>
      </div>`;
  }

  function sendChip(el) {
    inputEl.value = el.textContent;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  inputEl.focus();
</script>
</body>
</html>
