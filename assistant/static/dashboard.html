<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0f;--sidebar:#0f0f17;--card:#151520;--card-hover:#1c1c2a;
  --border:#ffffff0d;--border2:#ffffff18;--text:#e2e2ec;--text2:#8b8ba8;--text3:#55556a;
  --accent:#7c6af7;--accent-glow:rgba(124,106,247,.15);
  --green:#3ecf8e;--green-bg:rgba(62,207,142,.1);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);
  --red:#f05c5c;--red-bg:rgba(240,92,92,.1);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.1);
  --r:10px;--transition:.15s ease;
}
[data-theme="light"]{
  --bg:#f6f6fa;--sidebar:#ededf5;--card:#fff;--card-hover:#f0f0f8;
  --border:#0000000d;--border2:#00000018;--text:#1a1a2e;--text2:#5a5a78;--text3:#9a9ab8;
  --accent:#5b4de0;--accent-glow:rgba(91,77,224,.08);
  --green:#059669;--green-bg:rgba(5,150,105,.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,.08);
  --blue:#2563eb;--blue-bg:rgba(37,99,235,.08);
}

body{background:var(--bg);color:var(--text);font:13.5px/1.5 -apple-system,'Inter','Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden}

.sidebar{width:220px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:14px;font-weight:600;letter-spacing:-.3px;color:var(--text)}
.sidebar-logo span{font-size:11px;color:var(--text3);display:block;margin-top:1px}
.sidebar-section{padding:10px 8px 4px}
.sidebar-section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:4px}
.proj-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background var(--transition)}
.proj-item:hover{background:var(--card-hover)}
.proj-item.active{background:var(--accent-glow)}
.proj-item.active .proj-name{color:var(--accent)}
.proj-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.proj-dot.has-active{background:var(--green)}
.proj-name{font-size:13px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-count{font-size:10px;color:var(--text3);background:var(--border2);border-radius:4px;padding:1px 5px}
.sidebar-nav{padding:10px 8px;border-top:1px solid var(--border);margin-top:auto}
.nav-link{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;color:var(--text2);text-decoration:none;font-size:12.5px;transition:all var(--transition)}
.nav-link:hover{background:var(--card-hover);color:var(--text)}
.nav-link svg{width:14px;height:14px;opacity:.6}

.stat-bar{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0}
.stat{flex:1;padding:12px 16px;background:var(--bg)}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-.5px;color:var(--text);line-height:1}
.stat-label{font-size:10.5px;color:var(--text3);margin-top:2px;font-weight:500;letter-spacing:.03em}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.main-title{font-size:14px;font-weight:600;color:var(--text)}
.main-subtitle{font-size:11.5px;color:var(--text3);margin-top:1px}
.header-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;transition:all var(--transition)}
.btn:hover{background:var(--card-hover);color:var(--text)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.body-split{flex:1;display:flex;overflow:hidden}
.agent-area{flex:1;overflow-y:auto;padding:16px 20px}
.agent-area::-webkit-scrollbar{width:5px}
.agent-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}

.agent-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:all var(--transition)}
.agent-card:hover{border-color:var(--border2);background:var(--card-hover)}
.agent-card.active{border-color:rgba(62,207,142,.3)}
.agent-card.error{border-color:rgba(240,92,92,.3)}
.agent-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.agent-icon{width:32px;height:32px;border-radius:8px;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.status-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;letter-spacing:.03em;white-space:nowrap}
.status-badge.active{background:var(--green-bg);color:var(--green)}
.status-badge.wait{background:var(--amber-bg);color:var(--amber)}
.status-badge.done{background:var(--blue-bg);color:var(--blue)}
.status-badge.error{background:var(--red-bg);color:var(--red)}
.status-badge.idle{background:var(--border);color:var(--text3)}
.agent-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.agent-desc{font-size:11.5px;color:var(--text3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.agent-meta{margin-top:10px;display:flex;align-items:center;justify-content:space-between}
.agent-last{font-size:10.5px;color:var(--text3)}
.agent-task{font-size:10.5px;color:var(--text2);max-width:60%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);gap:8px}
.empty-state p{font-size:13px}

.event-panel{width:300px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.event-panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.event-panel-header h3{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.event-count{font-size:10px;color:var(--text3);background:var(--border2);border-radius:4px;padding:1px 6px}
.event-list{flex:1;overflow-y:auto;padding:8px}
.event-list::-webkit-scrollbar{width:4px}
.event-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.event-item{display:flex;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:2px;transition:background var(--transition);align-items:flex-start}
.event-item:hover{background:var(--card-hover)}
.event-item.new{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.event-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px}
.event-icon.start{background:var(--blue-bg);color:var(--blue)}
.event-icon.step{background:var(--amber-bg);color:var(--amber)}
.event-icon.complete{background:var(--green-bg);color:var(--green)}
.event-icon.error{background:var(--red-bg);color:var(--red)}
.event-icon.info{background:var(--border2);color:var(--text3)}
.event-body{flex:1;min-width:0}
.event-agent{font-size:11px;font-weight:600;color:var(--text2)}
.event-msg{font-size:11.5px;color:var(--text);margin-top:1px;line-height:1.4;word-break:break-word}
.event-time{font-size:10px;color:var(--text3);margin-top:3px}

.theme-toggle{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--transition)}
.theme-toggle:hover{background:var(--card-hover)}

@media(max-width:900px){.event-panel{display:none}.sidebar{width:180px}}
@media(max-width:640px){.sidebar{display:none}.stat-bar{display:none}}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>Agent Monitor</h1>
    <span id="sidebar-status">загрузка...</span>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Проекты</div>
    <div id="proj-list"></div>
  </div>
  <div class="sidebar-nav">
    <a class="nav-link" href="/agents">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><circle cx="8" cy="8" r="6.5"/></svg>
      Галактика
    </a>
    <a class="nav-link" href="/map">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="5" height="5" rx="1"/><rect x="9.5" y="1.5" width="5" height="5" rx="1"/><rect x="1.5" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/></svg>
      Карта
    </a>
  </div>
</nav>

<div class="main">
  <div class="stat-bar">
    <div class="stat"><div class="stat-val" id="s-events">—</div><div class="stat-label">СОБЫТИЯ</div></div>
    <div class="stat"><div class="stat-val" id="s-agents">—</div><div class="stat-label">АГЕНТОВ</div></div>
    <div class="stat"><div class="stat-val" id="s-active">—</div><div class="stat-label">АКТИВЕН</div></div>
    <div class="stat"><div class="stat-val" id="s-last">—</div><div class="stat-label">ПОСЛЕДНЕЕ</div></div>
  </div>

  <div class="main-header">
    <div>
      <div class="main-title" id="project-title">Выбери проект</div>
      <div class="main-subtitle" id="project-sub">—</div>
    </div>
    <div class="header-actions">
      <div class="live-dot" title="Live"></div>
      <button class="btn" onclick="refresh()">↻ Обновить</button>
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
    </div>
  </div>

  <div class="body-split">
    <div class="agent-area">
      <div class="agent-grid" id="agent-grid">
        <div class="empty-state"><p>Выбери проект из списка слева</p></div>
      </div>
    </div>
    <div class="event-panel">
      <div class="event-panel-header">
        <h3><span class="live-dot"></span> Live события</h3>
        <span class="event-count" id="event-count">0</span>
      </div>
      <div class="event-list" id="event-list">
        <div class="empty-state" style="height:100px"><p>Нет событий</p></div>
      </div>
    </div>
  </div>
</div>

<script>
let currentProject=null,agentStatuses={},eventSource=null,eventBuffer=[],eventTotal=0;
const ICONS={coordinator:'🎯',planning:'📋',competitors:'🔍',strategy:'🧭',instagram:'📱',copy:'✍️','text-editor':'📝',ads:'📢',site:'🌐',growth:'🚀',brandbook:'🎨',documents:'📄'};
const TYPE_ICON={start:'▶',step:'⚡',complete:'✓',error:'✕',info:'·'};

function toggleTheme(){
  const dark=document.documentElement.dataset.theme==='dark';
  document.documentElement.dataset.theme=dark?'light':'dark';
  document.getElementById('theme-btn').textContent=dark?'☀️':'🌙';
  localStorage.setItem('theme',dark?'light':'dark');
}
(function(){
  const t=localStorage.getItem('theme')||'dark';
  document.documentElement.dataset.theme=t;
  addEventListener('DOMContentLoaded',()=>{document.getElementById('theme-btn').textContent=t==='dark'?'🌙':'☀️'});
})();

function timeAgo(ts){
  if(!ts)return'—';
  const s=Math.floor((Date.now()-new Date(ts))/1000);
  if(s<5)return'только что';if(s<60)return s+'с назад';
  if(s<3600)return Math.floor(s/60)+'м назад';if(s<86400)return Math.floor(s/3600)+'ч назад';
  return Math.floor(s/86400)+'д назад';
}
function shortTime(ts){if(!ts)return'';const d=new Date(ts);return[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':')}

async function loadProjects(){
  try{
    const[pr,sr]=await Promise.all([fetch('/api/agents/projects').then(r=>r.json()),fetch('/api/agents/stats').then(r=>r.json())]);
    document.getElementById('s-events').textContent=sr.total_events||0;
    document.getElementById('s-last').textContent=timeAgo(sr.last_event_ts);
    document.getElementById('sidebar-status').textContent=sr.total_projects+' проектов';
    renderSidebar(pr);
    if(!currentProject&&pr.length)selectProject(pr[0].name);
  }catch(e){console.error(e)}
}

function renderSidebar(list){
  const el=document.getElementById('proj-list');
  if(!list.length){el.innerHTML='<div style="padding:8px;font-size:11.5px;color:var(--text3)">Нет данных</div>';return}
  el.innerHTML=list.map(p=>`<div class="proj-item ${p.name===currentProject?'active':''}" onclick="selectProject('${p.name}')">
    <div class="proj-dot ${p.active_agent?'has-active':''}"></div>
    <span class="proj-name">${p.name}</span>
    <span class="proj-count">${p.recent_events.length}</span>
  </div>`).join('');
}

async function selectProject(name){
  currentProject=name;
  document.querySelectorAll('.proj-item').forEach(el=>el.classList.toggle('active',el.querySelector('.proj-name').textContent===name));
  document.getElementById('project-title').textContent=name;
  document.getElementById('project-sub').textContent='загрузка...';
  await Promise.all([loadAgents(name),loadEvents(name)]);
  startSSE(name);
}

async function loadAgents(project){
  try{
    const[agR,evR]=await Promise.all([
      fetch('/api/agents/list?project='+project).then(r=>r.json()),
      fetch('/api/agents/events?project='+project+'&limit=200').then(r=>r.json()),
    ]);
    agentStatuses={};
    for(const e of evR){
      const ag=e.agent;if(!ag)continue;
      if(!agentStatuses[ag])agentStatuses[ag]={status:'idle',lastSeen:null,task:''};
      const s=agentStatuses[ag];s.lastSeen=e.ts;
      if(e.type==='start'){s.status='active';s.task=e.message||''}
      if(e.type==='step'){s.status='active';s.task=e.message||''}
      if(e.type==='complete'){s.status='done';s.task=e.message||''}
      if(e.type==='error'){s.status='error';s.task=e.message||''}
    }
    const agents=agR.agents||[];
    const active=Object.values(agentStatuses).filter(a=>a.status==='active').length;
    document.getElementById('s-agents').textContent=agents.length;
    document.getElementById('s-active').textContent=active||'0';
    document.getElementById('project-sub').textContent=agents.length+' агентов · '+(active?active+' активно':'в ожидании');
    renderAgents(agents);
  }catch(e){console.error(e);document.getElementById('project-sub').textContent='ошибка загрузки'}
}

function renderAgents(agents){
  const grid=document.getElementById('agent-grid');
  if(!agents.length){grid.innerHTML='<div class="empty-state"><p>Нет агентов в проекте</p></div>';return}
  const L={active:'Активен',wait:'Ожидает',done:'Завершил',error:'Ошибка',idle:'Готов'};
  grid.innerHTML=agents.map(ag=>{
    const st=agentStatuses[ag.name]||{status:'idle',lastSeen:null,task:''};
    const icon=ICONS[ag.name]||'🤖';
    const desc=(ag.description||'').slice(0,90);
    return`<div class="agent-card ${st.status==='active'?'active':st.status==='error'?'error':''}">
      <div class="agent-card-top"><div class="agent-icon">${icon}</div><span class="status-badge ${st.status}">${L[st.status]||'Готов'}</span></div>
      <div class="agent-name">${ag.name}</div>
      <div class="agent-desc">${desc||'Агент проекта'}</div>
      <div class="agent-meta">
        <span class="agent-last">${st.lastSeen?timeAgo(st.lastSeen):'не запускался'}</span>
        ${st.task?`<span class="agent-task" title="${st.task}">${st.task.slice(0,28)}…</span>`:''}
      </div>
    </div>`;
  }).join('');
}

async function loadEvents(project){
  try{
    const events=await fetch('/api/agents/events?project='+project+'&limit=60').then(r=>r.json());
    eventBuffer=[...events].reverse();eventTotal=events.length;renderEvents();
  }catch(e){console.error(e)}
}

function renderEvents(){
  const list=document.getElementById('event-list');
  document.getElementById('event-count').textContent=eventTotal;
  if(!eventBuffer.length){list.innerHTML='<div class="empty-state" style="height:100px"><p>Нет событий</p></div>';return}
  list.innerHTML=eventBuffer.slice(0,80).map(e=>renderEventItem(e,false)).join('');
}

function renderEventItem(e,isNew){
  const type=e.type||'info';const msg=(e.message||e.task||'').slice(0,120);
  return`<div class="event-item ${isNew?'new':''}">
    <div class="event-icon ${type}">${TYPE_ICON[type]||'·'}</div>
    <div class="event-body">
      <div class="event-agent">${e.agent||'—'}</div>
      ${msg?`<div class="event-msg">${msg}</div>`:''}
      <div class="event-time">${shortTime(e.ts)}</div>
    </div>
  </div>`;
}

function prependEvent(e){
  eventBuffer.unshift(e);if(eventBuffer.length>100)eventBuffer.pop();
  eventTotal++;
  document.getElementById('event-count').textContent=eventTotal;
  document.getElementById('s-last').textContent=timeAgo(e.ts);
  const list=document.getElementById('event-list');
  const empty=list.querySelector('.empty-state');if(empty)empty.remove();
  const div=document.createElement('div');div.innerHTML=renderEventItem(e,true);
  list.prepend(div.firstChild);
  while(list.children.length>80)list.removeChild(list.lastChild);
}

function startSSE(project){
  if(eventSource){eventSource.close();eventSource=null}
  const lastTs=eventBuffer.length?eventBuffer[0].ts:'';
  eventSource=new EventSource('/api/agents/stream?project='+project+'&since='+encodeURIComponent(lastTs));
  eventSource.onmessage=ev=>{
    try{
      const e=JSON.parse(ev.data);prependEvent(e);
      const ag=e.agent;
      if(ag){
        if(!agentStatuses[ag])agentStatuses[ag]={status:'idle',lastSeen:null,task:''};
        const s=agentStatuses[ag];s.lastSeen=e.ts;
        if(e.type==='start'){s.status='active';s.task=e.message||''}
        if(e.type==='step'){s.status='active';s.task=e.message||''}
        if(e.type==='complete'){s.status='done';s.task=e.message||''}
        if(e.type==='error'){s.status='error';s.task=e.message||''}
        loadAgents(currentProject);
      }
    }catch(_){}
  };
  eventSource.onerror=()=>setTimeout(()=>{if(currentProject)startSSE(currentProject)},5000);
}

async function refresh(){
  await loadProjects();
  if(currentProject)await Promise.all([loadAgents(currentProject),loadEvents(currentProject)]);
}

loadProjects();
setInterval(()=>{if(eventBuffer.length)document.getElementById('s-last').textContent=timeAgo(eventBuffer[0].ts)},30000);
setInterval(loadProjects,60000);
</script>
</body>
</html>
